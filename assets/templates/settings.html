<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ pagename }} | dronmakr v{{ version }}</title>
  {% include '_app_favicons.html' %}
  <link rel="stylesheet" href="/static/vendor/fonts/fragment-mono.css">
  <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css">
  {% include '_app_ui_vendor.html' %}
  <style>
    {% include '_app_css_root.html' %}

    html {
      height: 100%;
    }

    body {
      box-sizing: border-box;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
    }

    main {
      width: min(100%, 40rem);
      max-width: 40rem;
      height: calc(100vh - var(--toolbar-height) - 1rem);
      max-height: calc(100vh - var(--toolbar-height) - 1rem);
      margin: 0 auto;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 0.75rem;
    }

    .settings-panel {
      border: 1px solid var(--theme-a);
      border-radius: 6px;
      padding: 1.25rem;
      background: #050505;
      box-sizing: border-box;
      flex: 1 1 auto;
      min-height: 0;
      height: 80vh;
      max-height: 80vh;
      overflow: hidden;
    }

    .settings-panel.os-host {
      overflow: hidden !important;
    }

    .settings-actions {
      flex-shrink: 0;
      display: flex;
      justify-content: flex-start;
      padding-top: 0.15rem;
    }

    .settings-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      min-width: 0;
    }

    .field-group > label:first-of-type {
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field-row,
    .append-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
      width: 100%;
      min-width: 0;
    }

    .field-row textarea,
    .append-row input[type="text"] {
      flex: 1 1 auto;
      min-width: 0;
      width: auto;
    }

    .settings-textarea-scroll {
      flex: 1 1 auto;
      min-width: 0;
      box-sizing: border-box;
      border: 1px solid var(--dron-control-border);
      border-radius: var(--dron-control-radius);
      background: var(--dron-control-bg);
      min-height: 2.5rem;
      max-height: 2.5rem;
    }

    .settings-textarea-scroll:focus-within {
      border-color: var(--primary);
    }

    .settings-textarea-scroll textarea {
      display: block;
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      resize: none;
      border: none;
      border-radius: 0;
      background: transparent;
      box-sizing: border-box;
    }

    .settings-textarea-scroll textarea:focus {
      outline: none;
    }

    .field-group--tall .settings-textarea-scroll {
      min-height: 5.5rem;
      max-height: 5.5rem;
    }

    .field-group--ignore-plugins .settings-textarea-scroll {
      min-height: 8.25rem;
      max-height: 8.25rem;
    }

    .btn-add {
      flex-shrink: 0;
      width: var(--dron-control-h);
      height: var(--dron-control-h);
      min-height: var(--dron-control-h);
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--dron-control-bg);
      border: 1px solid var(--dron-control-border);
      border-radius: var(--dron-control-radius);
      color: var(--primary);
      cursor: pointer;
      font-size: 0.75rem;
      transition: background 0.15s ease, border-color 0.15s ease;
      box-sizing: border-box;
    }

    .btn-add:hover:not(:disabled) {
      border-color: var(--primary);
      background: rgba(255, 149, 5, 0.15);
    }

    .btn-add:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .append-row {
      margin-top: 0.35rem;
    }

    .settings-actions .btn-save {
      padding: 0.55rem 1rem;
      font-family: inherit;
      font-size: var(--dron-control-font);
      background: var(--primary);
      color: var(--secondary);
      border: 1px solid var(--primary);
      border-radius: var(--dron-control-radius);
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    .btn-save:hover {
      opacity: 0.9;
    }

    .btn-save:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #settingsSavedModal {
      position: fixed;
      inset: 0;
      z-index: 10060;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    #settingsSavedModal.hidden {
      display: none !important;
    }

    #settingsSavedModal .settings-saved-dialog {
      width: min(94vw, 520px);
      max-height: min(86vh, 480px);
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      padding: 0.9rem 1rem 1rem;
      border-radius: 8px;
      background: color-mix(in srgb, var(--secondary) 96%, transparent);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--primary);
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.5);
      min-height: 0;
    }

    #settingsSavedModal h3.settings-saved-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--theme-a);
    }

    .settings-saved-intro {
      margin: 0;
      font-size: 0.75rem;
      color: color-mix(in srgb, var(--theme-a) 78%, transparent);
      line-height: 1.4;
    }

    .settings-saved-list {
      margin: 0;
      padding: 0;
      list-style: none;
      flex: 1 1 auto;
      min-height: 0;
      max-height: min(50vh, 320px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .settings-saved-item {
      padding: 0.5rem 0.65rem;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(0, 0, 0, 0.22);
      font-size: 0.75rem;
      line-height: 1.4;
    }

    .settings-saved-item-key {
      display: block;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--theme-a);
      margin-bottom: 0.25rem;
    }

    .settings-saved-item-value {
      display: block;
      color: var(--primary);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .settings-saved-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.35rem;
      margin-top: 0.15rem;
    }

    button.settings-saved-dismiss {
      font-family: inherit;
      cursor: pointer;
      font-size: var(--dron-control-font);
      padding: 0.55rem 1rem;
      border-radius: var(--dron-control-radius);
      background: var(--primary);
      border: 1px solid var(--primary);
      color: var(--secondary);
    }

    button.settings-saved-dismiss:hover {
      opacity: 0.9;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.6rem 0.9rem;
      background: #050505;
      border: 1px solid var(--theme-a);
      border-radius: 4px;
      font-size: 0.75rem;
      z-index: 2000;
      animation: fadeIn 0.2s ease;
    }

    .toast.error {
      border-color: var(--theme-c);
      color: var(--theme-c);
    }

    .section-title {
      font-size: var(--dron-label-size);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--theme-a);
      margin: 0.75rem 0 0;
      padding-top: 0.75rem;
      border-top: 1px solid color-mix(in srgb, var(--theme-a) 65%, transparent);
    }

    .section-title:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .preset-toolbar {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      width: 100%;
      min-width: 0;
      flex-wrap: wrap;
    }

    .preset-toolbar .field-group {
      flex: 1 1 12rem;
      min-width: 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(0.5rem);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #app-version-chip {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 1100;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.35rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--theme-a);
      background: rgba(0, 0, 0, 0.82);
      color: var(--primary);
      font-size: 0.72rem;
      backdrop-filter: blur(3px);
    }

    #app-version-chip a {
      color: var(--primary);
      text-decoration: none;
      opacity: 0.9;
    }

    #app-version-chip a:hover {
      opacity: 1;
    }
  </style>
</head>

<body>
  {% include '_loading_overlay.html' %}
  {% include '_app_toolbar.html' %}

  <main>
    <div id="settingsPanel" class="settings-panel dron-list-scroll">
    <form id="settingsForm" class="settings-form">
      <div class="field-group field-group--tall" data-key="PLUGIN_PATHS" data-is-path="true">
        <label for="PLUGIN_PATHS">PLUGIN_PATHS</label>
        <div class="field-row">
          <textarea id="PLUGIN_PATHS" name="PLUGIN_PATHS" rows="4"
            placeholder="macOS: VST3 + AU folders only (omit legacy Plug-Ins/VST — .vst not supported); comma-separated"></textarea>
          <button type="button" class="btn-add" title="Select folder"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
      <div class="field-group field-group--ignore-plugins" data-key="IGNORE_PLUGINS" data-append-type="plugin">
        <label for="IGNORE_PLUGINS">IGNORE_PLUGINS</label>
        <div class="field-row">
          <textarea id="IGNORE_PLUGINS" name="IGNORE_PLUGINS" rows="6"
            placeholder="Plugin names to ignore"></textarea>
        </div>
        <div class="append-row">
          <input type="text" id="IGNORE_PLUGINS_append" placeholder="Add plugin name..." data-target="IGNORE_PLUGINS">
          <button type="button" class="btn-add" title="Append"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
      <div class="section-title">Storage</div>
      <div class="field-group" data-key="FILES_ROOT" data-is-path="true">
        <label for="FILES_ROOT">FILES_ROOT</label>
        <div class="field-row">
          <textarea id="FILES_ROOT" name="FILES_ROOT" rows="2"
            placeholder="Path to dronmakr-files root directory"></textarea>
          <button type="button" class="btn-add" title="Select folder"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
      <div class="section-title">Drum Sample Paths</div>
      <div class="preset-toolbar">
        <div class="field-group">
          <label for="drumPresetSelect">Drum Path Preset</label>
          <select id="drumPresetSelect"></select>
        </div>
        <button type="button" id="deleteDrumPresetBtn" class="btn-add" title="Delete preset" disabled><i
            class="fa-solid fa-trash"></i></button>
        <div class="field-group">
          <label for="drumPresetNewName">Create New Preset</label>
          <input type="text" id="drumPresetNewName" placeholder="Preset name..." maxlength="48">
        </div>
        <button type="button" id="createDrumPresetBtn" class="btn-add" title="Create preset"><i
            class="fa-solid fa-plus"></i></button>
      </div>
      <div class="field-group" data-key="DRUM_KICK_PATHS" data-is-path="true">
        <label for="DRUM_KICK_PATHS">DRUM_KICK_PATHS</label>
        <div class="field-row">
          <textarea id="DRUM_KICK_PATHS" name="DRUM_KICK_PATHS" rows="2"
            placeholder="Path(s) to kick samples"></textarea>
          <button type="button" class="btn-add" title="Select folder"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
      <div class="field-group" data-key="DRUM_SNARE_PATHS" data-is-path="true">
        <label for="DRUM_SNARE_PATHS">DRUM_SNARE_PATHS</label>
        <div class="field-row">
          <textarea id="DRUM_SNARE_PATHS" name="DRUM_SNARE_PATHS" rows="2"
            placeholder="Path(s) to snare samples"></textarea>
          <button type="button" class="btn-add" title="Select folder"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
      <div class="field-group" data-key="DRUM_HIHAT_PATHS" data-is-path="true">
        <label for="DRUM_HIHAT_PATHS">DRUM_HIHAT_PATHS</label>
        <div class="field-row">
          <textarea id="DRUM_HIHAT_PATHS" name="DRUM_HIHAT_PATHS" rows="2"
            placeholder="Path(s) to hihat samples"></textarea>
          <button type="button" class="btn-add" title="Select folder"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
      <div class="field-group" data-key="DRUM_CLAP_PATHS" data-is-path="true">
        <label for="DRUM_CLAP_PATHS">DRUM_CLAP_PATHS</label>
        <div class="field-row">
          <textarea id="DRUM_CLAP_PATHS" name="DRUM_CLAP_PATHS" rows="2"
            placeholder="Path(s) to clap samples"></textarea>
          <button type="button" class="btn-add" title="Select folder"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
      <div class="field-group" data-key="DRUM_PERC_PATHS" data-is-path="true">
        <label for="DRUM_PERC_PATHS">DRUM_PERC_PATHS</label>
        <div class="field-row">
          <textarea id="DRUM_PERC_PATHS" name="DRUM_PERC_PATHS" rows="2"
            placeholder="Path(s) to percussion samples"></textarea>
          <button type="button" class="btn-add" title="Select folder"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
      <div class="field-group" data-key="DRUM_TOM_PATHS" data-is-path="true">
        <label for="DRUM_TOM_PATHS">DRUM_TOM_PATHS</label>
        <div class="field-row">
          <textarea id="DRUM_TOM_PATHS" name="DRUM_TOM_PATHS" rows="2"
            placeholder="Path(s) to tom samples"></textarea>
          <button type="button" class="btn-add" title="Select folder"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
      <div class="field-group" data-key="DRUM_SHAKER_PATHS" data-is-path="true">
        <label for="DRUM_SHAKER_PATHS">DRUM_SHAKER_PATHS</label>
        <div class="field-row">
          <textarea id="DRUM_SHAKER_PATHS" name="DRUM_SHAKER_PATHS" rows="2"
            placeholder="Path(s) to shaker samples"></textarea>
          <button type="button" class="btn-add" title="Select folder"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
      <div class="field-group" data-key="DRUM_CYMBAL_PATHS" data-is-path="true">
        <label for="DRUM_CYMBAL_PATHS">DRUM_CYMBAL_PATHS</label>
        <div class="field-row">
          <textarea id="DRUM_CYMBAL_PATHS" name="DRUM_CYMBAL_PATHS" rows="2"
            placeholder="Path(s) to cymbal samples"></textarea>
          <button type="button" class="btn-add" title="Select folder"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
    </form>
    </div>
    <div class="settings-actions">
      <button type="submit" form="settingsForm" id="saveSettingsBtn" class="btn-save">Save settings</button>
    </div>
  </main>
  <div id="settingsSavedModal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="settingsSavedModalTitle">
    <div class="settings-saved-dialog">
      <h3 id="settingsSavedModalTitle" class="settings-saved-title">Settings saved</h3>
      <p class="settings-saved-intro">The following fields were updated:</p>
      <ul id="settingsSavedList" class="settings-saved-list dron-list-scroll"></ul>
      <div class="settings-saved-actions">
        <button type="button" id="settingsSavedDismiss" class="settings-saved-dismiss">OK</button>
      </div>
    </div>
  </div>
  {% include '_app_version_chip.html' %}
  <div id="toast" class="toast" style="display: none;"></div>
  <script>
    const form = document.getElementById("settingsForm");
    const settingsPanel = document.getElementById("settingsPanel");
    const saveSettingsBtn = document.getElementById("saveSettingsBtn");
    const settingsSavedModal = document.getElementById("settingsSavedModal");
    const settingsSavedList = document.getElementById("settingsSavedList");
    const settingsSavedDismiss = document.getElementById("settingsSavedDismiss");
    const toast = document.getElementById("toast");
    const drumPresetSelect = document.getElementById("drumPresetSelect");
    const drumPresetNewName = document.getElementById("drumPresetNewName");
    const createDrumPresetBtn = document.getElementById("createDrumPresetBtn");
    const deleteDrumPresetBtn = document.getElementById("deleteDrumPresetBtn");
    const drumPathKeys = [
      "DRUM_KICK_PATHS",
      "DRUM_SNARE_PATHS",
      "DRUM_HIHAT_PATHS",
      "DRUM_CLAP_PATHS",
      "DRUM_PERC_PATHS",
      "DRUM_TOM_PATHS",
      "DRUM_SHAKER_PATHS",
      "DRUM_CYMBAL_PATHS",
    ];

    let drumPresets = {};
    let activeDrumPreset = "";
    let defaultDrumPreset = "default";
    let settingsSnapshot = {};

    function collectFormData() {
      const data = {};
      document.querySelectorAll("input[name], textarea[name]").forEach((el) => {
        if (el.name && !el.name.endsWith("_append")) data[el.name] = el.value;
      });
      return data;
    }

    function captureSettingsSnapshot() {
      settingsSnapshot = collectFormData();
    }

    function truncateSettingValue(value, maxLen = 120) {
      const text = String(value ?? "");
      if (!text) return "(empty)";
      if (text.length <= maxLen) return text;
      return `${text.slice(0, maxLen)}…`;
    }

    function computeSettingChanges(before, after) {
      const keys = new Set([...Object.keys(before || {}), ...Object.keys(after || {})]);
      const changes = [];
      keys.forEach((key) => {
        const prev = before?.[key] ?? "";
        const next = after?.[key] ?? "";
        if (prev !== next) changes.push({ key, before: prev, after: next });
      });
      return changes.sort((a, b) => a.key.localeCompare(b.key));
    }

    function showSettingsSavedModal(changes) {
      settingsSavedList.innerHTML = "";
      changes.forEach(({ key, after }) => {
        const item = document.createElement("li");
        item.className = "settings-saved-item";
        item.innerHTML =
          `<span class="settings-saved-item-key">${key}</span>` +
          `<span class="settings-saved-item-value">${truncateSettingValue(after)}</span>`;
        settingsSavedList.appendChild(item);
      });
      settingsSavedModal.classList.remove("hidden");
      if (window.dronmakrUi) window.dronmakrUi.refreshScrollbars(settingsSavedList);
    }

    function hideSettingsSavedModal() {
      settingsSavedModal.classList.add("hidden");
    }

    settingsSavedDismiss.addEventListener("click", hideSettingsSavedModal);
    settingsSavedModal.addEventListener("click", (e) => {
      if (e.target === settingsSavedModal) hideSettingsSavedModal();
    });

    function wrapSettingsTextareas() {
      form.querySelectorAll(".field-row > textarea").forEach((ta) => {
        if (ta.closest(".settings-textarea-scroll")) return;
        const wrap = document.createElement("div");
        wrap.className = "settings-textarea-scroll dron-list-scroll";
        ta.parentNode.insertBefore(wrap, ta);
        wrap.appendChild(ta);
      });
    }

    function syncSettingsTextareaHeight(ta) {
      const host = ta.closest(".settings-textarea-scroll");
      const minHost = host ? host.clientHeight : 0;
      ta.style.height = "0px";
      ta.style.height = `${Math.max(ta.scrollHeight, minHost)}px`;
      if (host && window.dronmakrUi) {
        window.dronmakrUi.refreshScrollbars(host);
      }
    }

    function syncAllSettingsTextareaHeights() {
      form.querySelectorAll(".settings-textarea-scroll textarea").forEach(syncSettingsTextareaHeight);
      refreshSettingsScrollbars();
    }

    function refreshSettingsScrollbars() {
      if (!window.dronmakrUi) return;
      if (settingsPanel) window.dronmakrUi.refreshScrollbars(settingsPanel);
    }

    function initSettingsScrollUi() {
      wrapSettingsTextareas();
      form.querySelectorAll(".field-row > textarea").forEach((ta) => {
        if (ta.dataset.scrollSyncBound === "true") return;
        ta.dataset.scrollSyncBound = "true";
        ta.addEventListener("input", () => syncSettingsTextareaHeight(ta));
      });
      syncAllSettingsTextareaHeights();
      refreshSettingsScrollbars();
    }

    function showToast(msg, isError = false) {
      toast.textContent = msg;
      toast.className = "toast" + (isError ? " error" : "");
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 3500);
    }

    function appendComma(current, addition) {
      const cur = (current || "").trim();
      const add = (addition || "").trim();
      if (!add) return cur;
      if (!cur) return add;
      return cur + "," + add;
    }

    function escapePathCsvToken(path) {
      const s = String(path || "").trim();
      if (!s) return "";
      let out = "";
      for (let i = 0; i < s.length; i++) {
        const ch = s[i];
        if (ch === "\\") out += "\\\\";
        else if (ch === ",") out += "\\,";
        else out += ch;
      }
      return out;
    }

    function applyDrumPresetToFields(name) {
      const preset = drumPresets[name] || {};
      drumPathKeys.forEach((key) => {
        const input = document.getElementById(key);
        if (!input) return;
        input.value = typeof preset[key] === "string" ? preset[key] : "";
      });
    }

    function collectDrumFields() {
      const out = {};
      drumPathKeys.forEach((key) => {
        const input = document.getElementById(key);
        out[key] = input ? input.value : "";
      });
      return out;
    }

    function syncDeleteDrumPresetBtn() {
      const selected = drumPresetSelect.value;
      deleteDrumPresetBtn.disabled = !selected || selected === defaultDrumPreset;
    }

    function renderDrumPresetOptions() {
      drumPresetSelect.innerHTML = "";
      const names = Object.keys(drumPresets).sort((a, b) => a.localeCompare(b));
      names.forEach((name) => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        drumPresetSelect.appendChild(option);
      });
      if (activeDrumPreset && drumPresets[activeDrumPreset]) {
        drumPresetSelect.value = activeDrumPreset;
      }
      syncDeleteDrumPresetBtn();
    }

    async function loadDrumPathPresets() {
      const res = await fetch("/api/drum-path-presets");
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || "Failed to load drum path presets");
      }
      drumPresets = (data && data.presets) || {};
      activeDrumPreset = data.activePreset || "default";
      defaultDrumPreset = data.defaultPreset || "default";
      renderDrumPresetOptions();
      applyDrumPresetToFields(activeDrumPreset);
    }

    // Path + button: call folder picker API and append path
    document.querySelectorAll("[data-is-path='true'] .btn-add").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const group = btn.closest(".field-group");
        const key = group.dataset.key;
        const input = document.getElementById(key);
        showToast("Opening folder picker — check for a dialog (may be behind this window)...");
        try {
          const res = await fetch("/api/settings/pick-folder", { method: "POST" });
          const data = await res.json();
          if (data.path) {
            input.value = appendComma(input.value, escapePathCsvToken(data.path));
            syncSettingsTextareaHeight(input);
            showToast("Folder added.");
          } else if (data.cancelled) {
            showToast("Folder selection cancelled.");
          } else if (data.error) {
            showToast("Folder picker failed: " + data.error, true);
          }
        } catch (e) {
          showToast("Failed to open folder picker: " + e.message, true);
        }
      });
    });

    // Append + button for IGNORE_PLUGINS
    document.querySelectorAll("[data-append-type='plugin'] .append-row .btn-add").forEach((btn) => {
      btn.addEventListener("click", () => {
        const appendInput = btn.previousElementSibling;
        const targetId = appendInput.dataset.target;
        const mainInput = document.getElementById(targetId);
        const add = appendInput.value.trim();
        if (add) {
          mainInput.value = appendComma(mainInput.value, add);
          syncSettingsTextareaHeight(mainInput);
          appendInput.value = "";
        }
      });
    });

    drumPresetSelect.addEventListener("change", async () => {
      const selected = drumPresetSelect.value;
      syncDeleteDrumPresetBtn();
      if (!selected || selected === activeDrumPreset) return;
      try {
        if (activeDrumPreset) {
          drumPresets[activeDrumPreset] = collectDrumFields();
        }
        const res = await fetch("/api/drum-path-presets/active", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: selected }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Failed to switch preset");
        activeDrumPreset = data.activePreset;
        applyDrumPresetToFields(activeDrumPreset);
        syncDeleteDrumPresetBtn();
        showToast(`Switched to "${activeDrumPreset}".`);
      } catch (err) {
        showToast(err.message, true);
        renderDrumPresetOptions();
      }
    });

    createDrumPresetBtn.addEventListener("click", async () => {
      const name = (drumPresetNewName.value || "").trim();
      if (!name) {
        showToast("Preset name is required.", true);
        return;
      }
      try {
        const res = await fetch("/api/drum-path-presets", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, cloneFromActive: true }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Failed to create preset");
        drumPresetNewName.value = "";
        await loadDrumPathPresets();
        drumPresetSelect.value = name;
        drumPresetSelect.dispatchEvent(new Event("change"));
      } catch (err) {
        showToast(err.message, true);
      }
    });

    deleteDrumPresetBtn.addEventListener("click", async () => {
      const name = drumPresetSelect.value;
      if (!name) return;
      if (name === defaultDrumPreset) {
        showToast("default preset cannot be deleted.", true);
        return;
      }
      if (!confirm(`Delete drum preset "${name}"?`)) return;
      try {
        const res = await fetch(`/api/drum-path-presets/${encodeURIComponent(name)}`, {
          method: "DELETE",
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Failed to delete preset");
        await loadDrumPathPresets();
        showToast(`Deleted "${name}".`);
      } catch (err) {
        showToast(err.message, true);
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = saveSettingsBtn;
      btn.disabled = true;
      const data = collectFormData();
      const changes = computeSettingChanges(settingsSnapshot, data);
      if (!changes.length) {
        showToast("No changes to save.");
        btn.disabled = false;
        return;
      }
      try {
        const res = await fetch("/api/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const result = await res.json();
        if (res.ok && result.ok) {
          if (activeDrumPreset) {
            drumPresets[activeDrumPreset] = collectDrumFields();
          }
          captureSettingsSnapshot();
          showSettingsSavedModal(changes);
        } else {
          showToast(result.error || "Failed to save.", true);
        }
      } catch (err) {
        showToast("Error: " + err.message, true);
      }
      btn.disabled = false;
    });

    async function loadSettingsFromApi() {
      const res = await fetch("/api/settings");
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || "Failed to load settings");
      }
      document.querySelectorAll("input[name], textarea[name]").forEach((el) => {
        if (el.name && !el.name.endsWith("_append") && data[el.name] != null) {
          el.value = data[el.name];
        }
      });
    }

    loadSettingsFromApi()
      .then(() => loadDrumPathPresets())
      .then(() => syncAllSettingsTextareaHeights())
      .then(() => captureSettingsSnapshot())
      .catch((err) => showToast(err.message, true));
    document.addEventListener("DOMContentLoaded", function () {
      initSettingsScrollUi();
      if (window.__pageReady) window.__pageReady();
    });
  </script>
</body>

</html>
