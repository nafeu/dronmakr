name: Release desktop builds

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  desktop-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm ci

      - name: Vendor FFmpeg binary
        run: |
          source venv/bin/activate
          python scripts/vendor_ffmpeg.py

      - name: Require committed macOS app icon
        run: test -f assets/static/branding/macos/dronmakr.icns

      - name: Build frontend, sidecar, and Tauri app
        run: |
          source venv/bin/activate
          bash scripts/build_sidecar.sh
          npm run tauri build
          bash scripts/sign_mac_app.sh

      - name: Verify bundled macOS sidecar
        run: |
          source venv/bin/activate
          python scripts/verify_frozen_soundfile_macos.py \
            src-tauri/target/release/bundle/macos/dronmakr.app

      - name: Verify macOS app backend launch
        run: bash scripts/verify_macos_app_launch.sh

      - name: Verify macOS app signature
        run: codesign --verify --deep --strict --verbose=2 src-tauri/target/release/bundle/macos/dronmakr.app

      - name: Create archive and DMG
        run: |
          source venv/bin/activate
          VERSION=$(PYTHONPATH=backend python -c "from dronmakr.version import __version__; print(__version__)")
          mkdir -p dist-artifacts
          APP="src-tauri/target/release/bundle/macos/dronmakr.app"
          test -d "$APP"
          tar -czf "dist-artifacts/dronmakr-v${VERSION}-macos-arm64.tar.gz" -C "$(dirname "$APP")" "$(basename "$APP")"
          APP_PATH="$APP" bash scripts/package_mac_dmg.sh

      - uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\python -m pip install --upgrade pip
          .\venv\Scripts\python -m pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm ci

      - name: Vendor FFmpeg binary
        shell: pwsh
        run: |
          .\venv\Scripts\python scripts/vendor_ffmpeg.py

      - name: Build frontend, sidecar, and Tauri app
        shell: pwsh
        run: |
          .\scripts\build_sidecar.ps1
          # Tauri beforeBuildCommand runs `python scripts/build_frontend.py` — use venv on PATH.
          .\venv\Scripts\Activate.ps1
          npm run tauri build

      - name: Create zip
        shell: pwsh
        run: |
          $v = .\venv\Scripts\python -c "import sys; sys.path.insert(0, 'backend'); from dronmakr.version import __version__; print(__version__)"
          New-Item -ItemType Directory -Path dist-artifacts -Force | Out-Null
          $bundleRoot = "src-tauri/target/release/bundle"
          if (-not (Test-Path $bundleRoot)) {
            throw "Tauri bundle directory missing at $bundleRoot"
          }
          $zipPath = "dist-artifacts/dronmakr-v$v-windows-x64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $bundleRoot "*") -DestinationPath $zipPath

      - uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1 libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm ci

      - name: Vendor FFmpeg binary
        run: |
          source venv/bin/activate
          python scripts/vendor_ffmpeg.py

      - name: Build frontend, sidecar, and Tauri app
        run: |
          source venv/bin/activate
          bash scripts/build_sidecar.sh
          npm run tauri build

      - name: Create archive
        run: |
          source venv/bin/activate
          VERSION=$(PYTHONPATH=backend python -c "from dronmakr.version import __version__; print(__version__)")
          BUNDLE_DIR="src-tauri/target/release/bundle"
          test -d "$BUNDLE_DIR"
          mkdir -p dist-artifacts
          tar -czf "dist-artifacts/dronmakr-v${VERSION}-linux-x64.tar.gz" -C "$BUNDLE_DIR" .

      - uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
