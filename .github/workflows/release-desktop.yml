name: Release desktop builds

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: Platform to build
        type: choice
        options:
          - all
          - macos
          - windows
        default: windows

permissions:
  contents: write

jobs:
  desktop-macos:
    if: >-
      github.event_name == 'release'
      || github.event.inputs.target == 'all'
      || github.event.inputs.target == 'macos'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm ci

      - name: Vendor FFmpeg binary
        run: |
          source venv/bin/activate
          python scripts/vendor_ffmpeg.py

      - name: Require committed macOS app icon
        run: test -f assets/static/branding/macos/dronmakr.icns

      - name: Build frontend, sidecar, and Tauri app
        run: |
          source venv/bin/activate
          bash scripts/build_sidecar.sh
          npm run tauri build
          bash scripts/sign_mac_app.sh

      - name: Create archive and DMG
        run: |
          source venv/bin/activate
          VERSION=$(PYTHONPATH=backend python -c "from dronmakr.version import __version__; print(__version__)")
          mkdir -p dist-artifacts
          APP="src-tauri/target/release/bundle/macos/dronmakr.app"
          test -d "$APP"
          tar -czf "dist-artifacts/dronmakr-v${VERSION}-macos-arm64.tar.gz" -C "$(dirname "$APP")" "$(basename "$APP")"
          APP_PATH="$APP" bash scripts/package_mac_dmg.sh

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: dist-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: dronmakr-macos-arm64
          path: dist-artifacts/*
          if-no-files-found: error

  desktop-windows:
    if: >-
      github.event_name == 'release'
      || github.event.inputs.target == 'all'
      || github.event.inputs.target == 'windows'
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Require committed Windows icon
        shell: pwsh
        run: |
          if (-not (Test-Path "src-tauri/icons/icon.ico")) {
            throw "Missing src-tauri/icons/icon.ico"
          }

      - name: Build Windows desktop app
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\python -m pip install --upgrade pip
          .\venv\Scripts\python -m pip install -r requirements.txt pyinstaller
          .\scripts\build_app.ps1

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: dist-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: dronmakr-windows-x64
          path: dist-artifacts/*
          if-no-files-found: error

  # Linux desktop builds disabled until release path is stable on macOS + Windows.
  # desktop-linux:
  #   runs-on: ubuntu-latest
  #   ...
