name: Release desktop builds

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: Platform to build
        type: choice
        options:
          - all
          - macos
          - windows
          - linux
        default: windows

permissions:
  contents: write

jobs:
  desktop-macos:
    if: >-
      github.event_name == 'release'
      || github.event.inputs.target == 'all'
      || github.event.inputs.target == 'macos'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm ci

      - name: Vendor FFmpeg binary
        run: |
          source venv/bin/activate
          python scripts/vendor_ffmpeg.py

      - name: Require committed macOS app icon
        run: test -f assets/static/branding/macos/dronmakr.icns

      - name: Build frontend, sidecar, and Tauri app
        run: |
          source venv/bin/activate
          bash scripts/build_sidecar.sh
          npm run tauri build
          bash scripts/sign_mac_app.sh

      - name: Create archive and DMG
        run: |
          source venv/bin/activate
          VERSION=$(PYTHONPATH=backend python -c "from dronmakr.version import __version__; print(__version__)")
          mkdir -p dist-artifacts
          APP="src-tauri/target/release/bundle/macos/dronmakr.app"
          test -d "$APP"
          tar -czf "dist-artifacts/dronmakr-v${VERSION}-macos-arm64.tar.gz" -C "$(dirname "$APP")" "$(basename "$APP")"
          APP_PATH="$APP" bash scripts/package_mac_dmg.sh

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: dist-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: dronmakr-macos-arm64
          path: dist-artifacts/*
          if-no-files-found: error

  desktop-windows:
    if: >-
      github.event_name == 'release'
      || github.event.inputs.target == 'all'
      || github.event.inputs.target == 'windows'
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Require committed Windows icon
        shell: pwsh
        run: |
          $ico = "src-tauri/icons/icon.ico"
          if (-not (Test-Path $ico)) {
            throw "Missing $ico — run: npm run icons:windows"
          }
          $bytes = [System.IO.File]::ReadAllBytes($ico)
          if ($bytes.Length -lt 4 -or $bytes[0] -ne 0 -or $bytes[1] -ne 0 -or $bytes[2] -ne 1 -or $bytes[3] -ne 0) {
            throw "$ico is not a valid ICO file"
          }
          $count = [BitConverter]::ToUInt16($bytes, 4)
          if ($count -lt 7) {
            throw "$ico has $count embedded sizes; expected at least 7 (16–256 px). Run: npm run icons:windows"
          }
          if ($bytes.Length -lt 20000) {
            throw "$ico looks too small ($($bytes.Length) bytes) for multi-resolution icons. Run: npm run icons:windows"
          }

      - name: Build Windows desktop app
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\python -m pip install --upgrade pip
          .\venv\Scripts\python -m pip install -r requirements.txt pyinstaller
          .\scripts\build_app.ps1

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: dist-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: dronmakr-windows-x64
          path: dist-artifacts/*
          if-no-files-found: error

  desktop-linux:
    if: >-
      github.event_name == 'release'
      || github.event.inputs.target == 'all'
      || github.event.inputs.target == 'linux'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsndfile1 \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm ci

      - name: Vendor FFmpeg binary
        run: |
          source venv/bin/activate
          python scripts/vendor_ffmpeg.py

      - name: Build frontend, sidecar, and Tauri app
        run: |
          source venv/bin/activate
          bash scripts/build_sidecar.sh
          npm run tauri build

      - name: Create archive
        run: |
          source venv/bin/activate
          VERSION=$(PYTHONPATH=backend python -c "from dronmakr.version import __version__; print(__version__)")
          BUNDLE_DIR="src-tauri/target/release/bundle"
          test -d "$BUNDLE_DIR"
          mkdir -p dist-artifacts
          tar -czf "dist-artifacts/dronmakr-v${VERSION}-linux-x64.tar.gz" -C "$BUNDLE_DIR" .

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: dist-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: dronmakr-linux-x64
          path: dist-artifacts/*
          if-no-files-found: error
