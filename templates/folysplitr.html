<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>┌ dronmakr v{{ version }} ■ folysplitr ┐</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏳</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous">
  <style>
    :root {
      --secondary: #000000;
      --primary: #ff9505;
      --theme-a: #353531;
      --theme-b: #016fb9;
      --theme-c: #ec4e20;
      --toolbar-height: 48px;
    }

    html {
      scrollbar-gutter: stable;
    }

    body {
      background-color: var(--secondary);
      color: var(--primary);
      font-family: "Fragment Mono", monospace;
      padding: 1rem;
      padding-top: calc(var(--toolbar-height) + 1rem);
      margin: 0;
    }

    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--toolbar-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      padding-right: 0.5rem;
      background-color: var(--secondary);
      border-bottom: 1px solid var(--theme-a);
      z-index: 1000;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    #toolbar-brand {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--primary);
      min-width: 20ch;
      flex-shrink: 0;
      text-decoration: none;
      outline: none;
    }

    .toolbar-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }

    .toolbar-nav a {
      color: var(--primary);
      text-decoration: none;
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--theme-a);
      border-radius: 4px;
      background: var(--theme-a);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .toolbar-nav a:hover {
      border-color: var(--primary);
      background: rgba(255, 149, 5, 0.15);
    }

    .toolbar-nav a.active {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--secondary);
    }

    .toolbar-settings {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      text-decoration: none;
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--theme-a);
      border-radius: 4px;
      background: var(--theme-a);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .toolbar-settings:hover {
      border-color: var(--primary);
      background: rgba(255, 149, 5, 0.15);
    }

    .toolbar-settings.active {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--secondary);
    }

    main {
      max-width: 48rem;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    p {
      color: var(--theme-b);
      line-height: 1.6;
      font-size: 0.9rem;
      margin: 0;
    }
  </style>
</head>

<body>
  {% include '_loading_overlay.html' %}
  <header id="toolbar">
    <div class="toolbar-left">
      <a id="toolbar-brand" href="/">┌ dronmakr v{{ version }} ┐</a>
      <nav class="toolbar-nav">
        <a href="/auditionr"><i class="fa-solid fa-wave-square"></i> auditionr</a>
        <a href="/beatbuildr"><i class="fa-solid fa-drum"></i> beatbuildr</a>
        <a href="/collections"><i class="fa-solid fa-folder-open"></i> collections</a>
        <a href="/folysplitr" class="active"><i class="fa-solid fa-seedling"></i> folysplitr</a>
      </nav>
    </div>
    <a href="/settings" class="toolbar-settings" title="settings"><i class="fa-solid fa-gear"></i></a>
  </header>

  <main>
    <h1><i class="fa-solid fa-seedling"></i> folysplitr</h1>
    <p>Placeholder page for the upcoming folysplitr feature.</p>
  </main>
  <script>document.addEventListener('DOMContentLoaded', function() { if (window.__pageReady) window.__pageReady(); });</script>
</body>

</html>
