<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>┌ dronmakr v{{ version }} ■ folysplitr ┐</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wavesurfer.js/7.4.0/wavesurfer.min.js"></script>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏳</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous">
  <style>
    :root {
      --secondary: #000000;
      --primary: #ff9505;
      --theme-a: #353531;
      --theme-b: #016fb9;
      --theme-c: #ec4e20;
      --toolbar-height: 48px;
    }

    html {
      scrollbar-gutter: stable;
    }

    body {
      background-color: var(--secondary);
      color: var(--primary);
      font-family: "Fragment Mono", monospace;
      padding: 1rem;
      padding-top: calc(var(--toolbar-height) + 1rem);
      margin: 0;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: var(--theme-a) var(--secondary);
    }

    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    *::-webkit-scrollbar-track {
      background: var(--secondary);
    }

    *::-webkit-scrollbar-thumb {
      background: var(--theme-a);
      border-radius: 4px;
    }

    *::-webkit-scrollbar-thumb:hover {
      background: var(--theme-b);
    }

    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--toolbar-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      padding-right: 0.5rem;
      background-color: var(--secondary);
      border-bottom: 1px solid var(--theme-a);
      z-index: 1000;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    #toolbar-brand {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--primary);
      min-width: 20ch;
      flex-shrink: 0;
      text-decoration: none;
      outline: none;
    }

    .toolbar-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }

    .toolbar-nav a {
      color: var(--primary);
      text-decoration: none;
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--theme-a);
      border-radius: 4px;
      background: var(--theme-a);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .toolbar-nav a:hover {
      border-color: var(--primary);
      background: rgba(255, 149, 5, 0.15);
    }

    .toolbar-nav a.active {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--secondary);
    }

    .toolbar-settings {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      text-decoration: none;
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--theme-a);
      border-radius: 4px;
      background: var(--theme-a);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .toolbar-settings:hover {
      border-color: var(--primary);
      background: rgba(255, 149, 5, 0.15);
    }

    .toolbar-settings.active {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--secondary);
    }

    main {
      max-width: 64rem;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.5rem;
    }

    h1 {
      font-size: 1.2rem;
      margin: 0;
    }

    p {
      color: var(--theme-b);
      line-height: 1.6;
      font-size: 0.9rem;
      margin: 0;
    }

    .panel {
      border: 1px solid var(--theme-a);
      border-radius: 8px;
      padding: 1rem;
      background: rgba(53, 53, 49, 0.35);
      display: grid;
      gap: 0.85rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .tab-btn.active {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--secondary);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .panel-title {
      font-size: 0.88rem;
      color: var(--primary);
      letter-spacing: 0.02em;
      margin: 0;
    }

    select,
    button {
      font-family: inherit;
      font-size: 0.85rem;
      border-radius: 4px;
      border: 1px solid var(--theme-a);
      background: var(--theme-a);
      color: var(--primary);
      padding: 0.5rem 0.7rem;
    }

    select {
      min-width: 22rem;
      max-width: 100%;
    }

    button {
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    button:hover:not(:disabled) {
      border-color: var(--primary);
      background: rgba(255, 149, 5, 0.15);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .record-btn i,
    .icon-btn i {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1em;
      height: 1em;
      line-height: 1;
    }

    .record-btn {
      min-width: 2.25rem;
      width: 2.25rem;
      height: 2.25rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .record-btn.recording {
      background: var(--theme-c);
      border-color: var(--theme-c);
      color: var(--secondary);
      opacity: 0.65;
    }

    .status-text {
      font-size: 0.8rem;
      color: var(--theme-b);
    }

    .status-text.error {
      color: var(--theme-c);
    }

    .recorder-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.85rem;
      flex-wrap: wrap;
    }

    .icon-btn {
      width: 2.25rem;
      height: 2.25rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }

    .device-picker {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      margin-left: 0.15rem;
    }

    .device-picker i {
      color: var(--theme-b);
      font-size: 0.9rem;
      width: 0.9rem;
      text-align: center;
      flex: 0 0 auto;
    }

    .device-picker select {
      min-width: 19rem;
    }

    .preview-body {
      display: flex;
      align-items: stretch;
      gap: 0.55rem;
      margin-bottom: 0.7rem;
      min-height: 92px;
    }

    .meter-wrap {
      width: 16px;
      flex: 0 0 16px;
    }

    #meter-canvas {
      width: 16px;
      height: 92px;
      border: 1px solid var(--theme-a);
      border-radius: 3px;
      background: #121211;
      display: block;
    }

    .waveform-wrapper {
      padding: 0.7rem 0.2rem 0.1rem;
      margin-bottom: 1rem;
    }

    .waveform-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .waveform-title {
      font-size: 0.78rem;
      color: var(--theme-b);
      word-break: break-all;
    }

    .waveform-duration {
      font-size: 0.78rem;
      color: var(--theme-c);
      font-weight: 700;
    }

    #waveform {
      flex: 1 1 auto;
      min-height: 92px;
      height: 92px;
      margin: 0;
    }

    .playback-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .playback-btn {
      min-width: 4rem;
    }

    .splitr-compact button,
    #splitr-actions button,
    #splitr-organize button,
    #splitr-select-tools button {
      font-size: 0.74rem;
      padding: 0.34rem 0.48rem;
      line-height: 1.15;
    }

    .splitr-compact .playback-btn {
      min-width: 3.2rem;
      font-size: 0.76rem;
      padding: 0.36rem 0.52rem;
    }

    .empty-state {
      border: 1px dashed var(--theme-a);
      border-radius: 8px;
      padding: 1.5rem;
      text-align: center;
      color: var(--theme-b);
      font-size: 0.85rem;
      background: rgba(53, 53, 49, 0.2);
    }

    .splitr-preview {
      display: grid;
      gap: 0.75rem;
    }

    .splitr-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .splitr-actions,
    .splitr-organize {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      align-items: center;
    }

    .splitr-actions {
      margin-bottom: 1rem;
    }

    .splitr-select-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .splitr-threshold {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--theme-b);
      font-size: 0.75rem;
    }

    .splitr-threshold input {
      width: 4.2rem;
      font-family: inherit;
      font-size: 0.74rem;
      border-radius: 4px;
      border: 1px solid var(--theme-a);
      background: #121211;
      color: var(--primary);
      padding: 0.34rem 0.4rem;
      height: 2rem;
      box-sizing: border-box;
      min-width: auto;
    }

    .splitr-threshold select {
      width: 6.4rem;
      min-width: auto;
      font-family: inherit;
      font-size: 0.74rem;
      border-radius: 4px;
      border: 1px solid var(--theme-a);
      background: #121211;
      color: var(--primary);
      padding: 0.34rem 0.4rem;
      height: 2rem;
      box-sizing: border-box;
    }

    .splitr-subtitle {
      font-size: 0.72rem;
      color: var(--theme-b);
      letter-spacing: 0.02em;
      margin-top: 0.2rem;
      margin-bottom: 0.35rem;
    }

    .splitr-btn-active {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--secondary);
    }

    .splitr-actions-divider {
      width: 1px;
      height: 20px;
      border-left: 1px solid var(--theme-a);
      opacity: 0.6;
      margin: 0 4px;
    }

    .splitr-index {
      font-size: 0.78rem;
      color: var(--theme-b);
      min-width: 5.5rem;
      text-align: center;
    }

    #splitr-waveform {
      margin: 0.15rem 0 0.65rem;
    }

    .splitr-waveform-wrap {
      position: relative;
      margin: 0.15rem 0 0.65rem;
    }

    .splitr-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }

    .splitr-overlay-marker {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      margin-left: -1px;
      background: rgba(236, 78, 32, 0.92);
      box-shadow: 0 0 0 1px rgba(236, 78, 32, 0.25);
    }

    #status {
      /* margin-bottom: 1rem; */
      display: none;
    }
  </style>
</head>

<body>
  {% include '_loading_overlay.html' %}
  <header id="toolbar">
    <div class="toolbar-left">
      <a id="toolbar-brand" href="/">┌ dronmakr v{{ version }} ┐</a>
      <nav class="toolbar-nav">
        <a href="/auditionr"><i class="fa-solid fa-wave-square"></i> auditionr</a>
        <a href="/beatbuildr"><i class="fa-solid fa-drum"></i> beatbuildr</a>
        <a href="/collections"><i class="fa-solid fa-folder-open"></i> collections</a>
        <a href="/folysplitr" class="active"><i class="fa-solid fa-seedling"></i> folysplitr</a>
      </nav>
    </div>
    <a href="/settings" class="toolbar-settings" title="settings"><i class="fa-solid fa-gear"></i></a>
  </header>

  <main>
    <div class="tabs">
      <button id="tab-recorder" class="tab-btn active"><i class="fa-solid fa-microphone-lines"></i> recorder</button>
      <button id="tab-splitr" class="tab-btn"><i class="fa-solid fa-scissors"></i> splitr</button>
    </div>

    <section id="panel-recorder" class="panel tab-panel active">
      <div class="recorder-toolbar">
        <button id="play-btn" class="icon-btn" title="play"><i class="fa-solid fa-play"></i></button>
        <button id="record-btn" class="record-btn" title="record"><i class="fa-solid fa-circle"></i></button>
        <button id="stop-btn" class="icon-btn" title="stop"><i class="fa-solid fa-stop"></i></button>
        <div class="device-picker">
          <i class="fa-solid fa-microphone-lines" title="select input device"></i>
          <select id="device-select">
            <option value="">no input device selected</option>
          </select>
        </div>
      </div>
      <div id="status" class="status-text">Ready.</div>
      <div id="waveform-shell" class="waveform-wrapper">
        <div class="waveform-header">
          <span id="waveform-title" class="waveform-title">recording preview</span>
          <span id="waveform-duration" class="waveform-duration">--:--</span>
        </div>
        <div class="preview-body">
          <div id="waveform"></div>
          <div class="meter-wrap">
            <canvas id="meter-canvas" width="16" height="92"></canvas>
          </div>
        </div>
      </div>
    </section>

    <section id="panel-splitr" class="panel tab-panel">
      <div class="splitr-preview">
        <div class="splitr-nav">
          <button id="splitr-prev-btn"><i class="fa-solid fa-chevron-left"></i></button>
          <span id="splitr-index" class="splitr-index">0 / 0</span>
          <button id="splitr-next-btn"><i class="fa-solid fa-chevron-right"></i></button>
          <button id="splitr-empty-trash-btn"><i class="fa-solid fa-trash-can"></i> empty trash</button>
          <button id="splitr-unarchive-btn"><i class="fa-solid fa-box-open"></i> unarchive samples</button>
        </div>
        <div id="splitr-shell" class="waveform-wrapper" style="display: none;">
          <div class="waveform-header">
            <span id="splitr-title" class="waveform-title"></span>
            <span id="splitr-duration" class="waveform-duration">--:--</span>
          </div>
          <div class="splitr-waveform-wrap">
            <div id="splitr-waveform"></div>
            <div id="splitr-overlay" class="splitr-overlay"></div>
          </div>
          <div class="playback-controls splitr-compact">
            <button id="splitr-play-btn" class="playback-btn" title="play/pause"><i class="fa-solid fa-play"></i></button>
            <button id="splitr-trash-btn" class="playback-btn" title="move to trash"><i
                class="fa-solid fa-trash-can"></i></button>
            <button id="splitr-archive-btn" class="playback-btn" title="move to archive"><i
                class="fa-solid fa-box-archive"></i></button>
          </div>
          <div class="splitr-subtitle">split sample with markers</div>
          <div id="splitr-select-tools" class="splitr-select-tools"></div>
          <div class="splitr-subtitle">process audio</div>
          <div id="splitr-actions" class="splitr-actions"></div>
          <div class="splitr-subtitle">move sample into</div>
          <div id="splitr-organize" class="splitr-organize"></div>
        </div>
        <div id="splitr-empty" class="empty-state">No recordings available yet. Record a sample first.</div>
      </div>
    </section>
  </main>
  <script>
    var MAX_RECORDING_MS = 5 * 60 * 1000;
    var deviceSelect = document.getElementById("device-select");
    var recordBtn = document.getElementById("record-btn");
    var stopBtn = document.getElementById("stop-btn");
    var playBtn = document.getElementById("play-btn");
    var statusEl = document.getElementById("status");
    var meterCanvas = document.getElementById("meter-canvas");
    var meterCtx = meterCanvas.getContext("2d");
    var waveformShell = document.getElementById("waveform-shell");
    var waveformTitle = document.getElementById("waveform-title");
    var waveformDuration = document.getElementById("waveform-duration");
    var tabRecorderBtn = document.getElementById("tab-recorder");
    var tabSplitrBtn = document.getElementById("tab-splitr");
    var panelRecorder = document.getElementById("panel-recorder");
    var panelSplitr = document.getElementById("panel-splitr");
    var splitrPrevBtn = document.getElementById("splitr-prev-btn");
    var splitrNextBtn = document.getElementById("splitr-next-btn");
    var splitrEmptyTrashBtn = document.getElementById("splitr-empty-trash-btn");
    var splitrUnarchiveBtn = document.getElementById("splitr-unarchive-btn");
    var splitrPlayBtn = document.getElementById("splitr-play-btn");
    var splitrTrashBtn = document.getElementById("splitr-trash-btn");
    var splitrArchiveBtn = document.getElementById("splitr-archive-btn");
    var splitrIndexEl = document.getElementById("splitr-index");
    var splitrShell = document.getElementById("splitr-shell");
    var splitrEmpty = document.getElementById("splitr-empty");
    var splitrTitle = document.getElementById("splitr-title");
    var splitrDuration = document.getElementById("splitr-duration");
    var splitrActionsEl = document.getElementById("splitr-actions");
    var splitrOrganizeEl = document.getElementById("splitr-organize");
    var splitrSelectToolsEl = document.getElementById("splitr-select-tools");
    var splitrOverlayEl = document.getElementById("splitr-overlay");

    var monitorStream = null;
    var audioContext = null;
    var analyser = null;
    var meterData = null;
    var meterAnimId = null;

    var mediaRecorder = null;
    var recordingChunks = [];
    var recordingStartMs = 0;
    var recordingTimerId = null;
    var maxStopTimer = null;
    var liveWaveCanvas = null;
    var liveWaveCtx = null;
    var liveWaveAnimId = null;

    var waveSurfer = null;
    var lastRecordingUrl = null;
    var recordingsList = [];
    var splitrIndex = 0;
    var splitrWaveSurfer = null;
    var isPlaybackActive = false;
    var processingCatalog = { types: [], actions: [] };
    var splitCategories = [];
    var splitrSelectedSeconds = 0;
    var splitrActiveProcessingType = null;
    var splitrMarkers = [];
    var splitrDurationSeconds = 0;
    var splitrPlacementMode = false;
    var splitrAutoThreshold = 0.35;
    var splitrAutoMode = "transient";
    var splitrAutoMinGapMs = 60;
    var splitrAutoBeatDivision = 4;
    var splitrAutoTempoBpm = 120;
    var splitrMarkerHistory = [];

    function showTab(tabName) {
      var recorderActive = tabName === "recorder";
      tabRecorderBtn.classList.toggle("active", recorderActive);
      tabSplitrBtn.classList.toggle("active", !recorderActive);
      panelRecorder.classList.toggle("active", recorderActive);
      panelSplitr.classList.toggle("active", !recorderActive);
    }

    function setStatus(text, isError) {
      statusEl.innerText = text;
      statusEl.classList.toggle("error", !!isError);
    }

    function getActiveSplitrItem() {
      if (!recordingsList.length) return null;
      return recordingsList[splitrIndex] || null;
    }

    async function splitrDuplicate() {
      var item = getActiveSplitrItem();
      if (!item) return;
      var res = await fetch("/api/folysplitr/duplicate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path: item.path })
      });
      var payload = await res.json();
      if (!res.ok || !payload.ok) throw new Error(payload.error || "Duplicate failed");
      await refreshRecordingsList();
      var newPath = payload.file && payload.file.path;
      if (newPath) {
        splitrIndex = recordingsList.findIndex(function (r) { return r.path === newPath; });
        if (splitrIndex < 0) splitrIndex = 0;
      }
      renderSplitrCurrent();
    }

    async function splitrProcess(command, extraParams) {
      var item = getActiveSplitrItem();
      if (!item) return;
      var body = Object.assign({
        path: item.path,
        command: command
      }, extraParams || {});
      var res = await fetch("/api/folysplitr/process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      var payload = await res.json();
      if (!res.ok || !payload.ok) throw new Error(payload.error || "Process failed");
      await refreshRecordingsList();
      var current = payload.file && payload.file.path;
      if (current) {
        splitrIndex = recordingsList.findIndex(function (r) { return r.path === current; });
        if (splitrIndex < 0) splitrIndex = 0;
      }
      renderSplitrCurrent();
    }

    function splitRound(v) {
      return Math.max(0, Math.round(v * 1000) / 1000);
    }

    function defaultMarkersFromDuration(duration) {
      if (!duration || duration <= 0) return [];
      return [0, splitRound(duration)];
    }

    function sanitizeMarkers(markers, duration) {
      if (!duration || duration <= 0) return [];
      var out = [0, splitRound(duration)];
      (markers || []).forEach(function (m) {
        var t = splitRound(Math.max(0, Math.min(duration, Number(m) || 0)));
        if (t > 0 && t < duration) out.push(t);
      });
      out.sort(function (a, b) { return a - b; });
      var dedup = [];
      out.forEach(function (t) {
        if (!dedup.length || Math.abs(t - dedup[dedup.length - 1]) > 0.01) dedup.push(t);
      });
      return dedup;
    }

    function pushMarkerHistory() {
      splitrMarkerHistory.push((splitrMarkers || []).slice());
      if (splitrMarkerHistory.length > 100) splitrMarkerHistory.shift();
    }

    function renderSplitOverlay() {
      if (!splitrOverlayEl) return;
      splitrOverlayEl.innerHTML = "";
      if (!splitrDurationSeconds || splitrDurationSeconds <= 0) return;

      function addMarker(time) {
        if (time <= 0 || time >= splitrDurationSeconds) return;
        var el = document.createElement("div");
        el.className = "splitr-overlay-marker";
        el.style.left = ((time / splitrDurationSeconds) * 100).toFixed(4) + "%";
        splitrOverlayEl.appendChild(el);
      }

      sanitizeMarkers(splitrMarkers, splitrDurationSeconds).forEach(addMarker);
    }

    async function splitUsingMarkers() {
      var item = getActiveSplitrItem();
      if (!item) throw new Error("No active sample");
      var originalPath = item.path;
      var originalIdx = splitrIndex;
      var markers = sanitizeMarkers(splitrMarkers, splitrDurationSeconds);
      if (markers.length < 2) throw new Error("Add at least one marker");
      var res = await fetch("/api/folysplitr/split", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          path: item.path,
          markers: markers
        })
      });
      var payload = await res.json();
      if (!res.ok || !payload.ok) throw new Error(payload.error || "Split failed");

      var createdFiles = Array.isArray(payload.files) ? payload.files.slice() : [];
      var removeIdx = recordingsList.findIndex(function (r) { return r.path === (payload.originalPath || originalPath); });
      if (removeIdx < 0) removeIdx = originalIdx;
      if (removeIdx < 0) removeIdx = 0;
      if (removeIdx < recordingsList.length) recordingsList.splice(removeIdx, 1);
      if (createdFiles.length) {
        Array.prototype.splice.apply(recordingsList, [removeIdx, 0].concat(createdFiles));
      }
      splitrIndex = removeIdx;
      if (splitrIndex >= recordingsList.length) splitrIndex = Math.max(0, recordingsList.length - 1);
      renderSplitrCurrent();
    }

    function formatTime(seconds) {
      var s = Math.max(0, Math.floor(seconds));
      var mm = String(Math.floor(s / 60)).padStart(2, "0");
      var ss = String(s % 60).padStart(2, "0");
      return mm + ":" + ss;
    }

    function pickRecorderMimeType() {
      var types = [
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/ogg;codecs=opus",
        "audio/ogg",
        "audio/mp4"
      ];
      for (var i = 0; i < types.length; i++) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported(types[i])) return types[i];
      }
      return "";
    }

    function stopCurrentStream() {
      if (!monitorStream) return;
      monitorStream.getTracks().forEach(function (track) { track.stop(); });
      monitorStream = null;
    }

    function stopMeter() {
      if (meterAnimId != null) cancelAnimationFrame(meterAnimId);
      meterAnimId = null;
      analyser = null;
      meterData = null;
      if (audioContext) {
        try { audioContext.close(); } catch (e) { }
        audioContext = null;
      }
      drawMeter(0, true);
    }

    function drawMeter(level, idle) {
      var w = meterCanvas.width;
      var h = meterCanvas.height;
      meterCtx.fillStyle = "#121211";
      meterCtx.fillRect(0, 0, w, h);

      var segments = 20;
      var gap = 2;
      var segHeight = Math.floor((h - ((segments + 1) * gap)) / segments);
      var activeSegments = Math.round(level * segments);

      for (var i = 0; i < segments; i++) {
        var y = h - gap - ((i + 1) * segHeight) - (i * gap);
        var ratio = (i + 1) / segments;
        if (idle) {
          meterCtx.fillStyle = "#2b2b28";
        } else if (i < activeSegments) {
          meterCtx.fillStyle = ratio > 0.85 ? "#ec4e20" : (ratio > 0.55 ? "#ff9505" : "#016fb9");
        } else {
          meterCtx.fillStyle = "#2b2b28";
        }
        meterCtx.fillRect(2, y, w - 4, Math.max(2, segHeight));
      }
    }

    function meterLoop() {
      if (!analyser || !meterData) return;
      analyser.getFloatTimeDomainData(meterData);
      var sumSq = 0;
      for (var i = 0; i < meterData.length; i++) sumSq += meterData[i] * meterData[i];
      var rms = Math.sqrt(sumSq / meterData.length);
      var db = rms > 0 ? 20 * Math.log10(rms) : -Infinity;
      var normalized = Number.isFinite(db) ? Math.min(1, Math.max(0, (db + 60) / 60)) : 0;
      drawMeter(normalized, false);
      meterAnimId = requestAnimationFrame(meterLoop);
    }

    async function startMonitorForDevice(deviceId) {
      stopMeter();
      stopCurrentStream();
      var constraints = { audio: deviceId ? { deviceId: { exact: deviceId } } : true };
      monitorStream = await navigator.mediaDevices.getUserMedia(constraints);

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      var source = audioContext.createMediaStreamSource(monitorStream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 1024;
      analyser.smoothingTimeConstant = 0.85;
      meterData = new Float32Array(analyser.fftSize);
      source.connect(analyser);
      meterLoop();
    }

    async function refreshDevices() {
      var devices = await navigator.mediaDevices.enumerateDevices();
      var inputs = devices.filter(function (d) { return d.kind === "audioinput"; });
      deviceSelect.innerHTML = "";
      if (!inputs.length) {
        var optNone = document.createElement("option");
        optNone.value = "";
        optNone.textContent = "no input device selected";
        deviceSelect.appendChild(optNone);
        deviceSelect.disabled = true;
        return;
      }

      inputs.forEach(function (device, idx) {
        var option = document.createElement("option");
        option.value = device.deviceId;
        option.textContent = device.label || ("Input " + (idx + 1));
        deviceSelect.appendChild(option);
      });
      deviceSelect.disabled = false;
    }

    function updateTimerFromMs(ms) {
      var elapsed = Math.max(0, (ms || 0) / 1000);
      waveformDuration.innerText = formatTime(elapsed);
    }

    function resetTimer() {
      waveformDuration.innerText = "--:--";
    }

    function clearLiveWaveCanvas() {
      if (!liveWaveCtx || !liveWaveCanvas) return;
      liveWaveCtx.fillStyle = "#121211";
      liveWaveCtx.fillRect(0, 0, liveWaveCanvas.width, liveWaveCanvas.height);
    }

    function stopLiveWaveAnimation() {
      if (liveWaveAnimId != null) cancelAnimationFrame(liveWaveAnimId);
      liveWaveAnimId = null;
    }

    function ensureLiveWaveCanvas() {
      var container = document.getElementById("waveform");
      if (!container) return false;
      if (!liveWaveCanvas) {
        liveWaveCanvas = document.createElement("canvas");
        liveWaveCanvas.style.width = "100%";
        liveWaveCanvas.style.height = "92px";
        liveWaveCanvas.style.display = "block";
        container.innerHTML = "";
        container.appendChild(liveWaveCanvas);
      }
      var dpr = window.devicePixelRatio || 1;
      var cssWidth = Math.max(1, container.clientWidth || 640);
      var cssHeight = 92;
      liveWaveCanvas.width = Math.floor(cssWidth * dpr);
      liveWaveCanvas.height = Math.floor(cssHeight * dpr);
      liveWaveCtx = liveWaveCanvas.getContext("2d");
      clearLiveWaveCanvas();
      return true;
    }

    function startLiveWaveAnimation() {
      if (!analyser || !ensureLiveWaveCanvas()) return;
      stopLiveWaveAnimation();
      var dpr = window.devicePixelRatio || 1;
      var shiftPx = Math.max(1, Math.floor(2 * dpr));
      var bg = "#121211";

      function frame() {
        if (!liveWaveCtx || !liveWaveCanvas || !analyser) return;
        liveWaveCtx.drawImage(
          liveWaveCanvas,
          shiftPx,
          0,
          liveWaveCanvas.width - shiftPx,
          liveWaveCanvas.height,
          0,
          0,
          liveWaveCanvas.width - shiftPx,
          liveWaveCanvas.height
        );
        liveWaveCtx.fillStyle = bg;
        liveWaveCtx.fillRect(liveWaveCanvas.width - shiftPx, 0, shiftPx, liveWaveCanvas.height);

        analyser.getFloatTimeDomainData(meterData);
        var peak = 0;
        for (var i = 0; i < meterData.length; i++) {
          var abs = Math.abs(meterData[i]);
          if (abs > peak) peak = abs;
        }
        var clamped = Math.min(1, peak * 1.25);
        var half = liveWaveCanvas.height / 2;
        var amp = Math.max(1, clamped * (liveWaveCanvas.height * 0.44));
        var x = liveWaveCanvas.width - Math.floor(shiftPx / 2);

        liveWaveCtx.strokeStyle = clamped > 0.85 ? "#ec4e20" : (clamped > 0.5 ? "#ff9505" : "#016fb9");
        liveWaveCtx.lineWidth = Math.max(1, dpr);
        liveWaveCtx.beginPath();
        liveWaveCtx.moveTo(x, half - amp);
        liveWaveCtx.lineTo(x, half + amp);
        liveWaveCtx.stroke();

        liveWaveAnimId = requestAnimationFrame(frame);
      }
      liveWaveAnimId = requestAnimationFrame(frame);
    }

    async function startRecording() {
      if (!monitorStream) {
        setStatus("No input stream ready yet.", true);
        return;
      }
      if (!window.MediaRecorder) {
        setStatus("MediaRecorder is not supported in this browser.", true);
        return;
      }
      if (mediaRecorder && mediaRecorder.state === "recording") {
        return;
      }
      if (waveSurfer) {
        try { waveSurfer.destroy(); } catch (e) { }
        waveSurfer = null;
      }

      var mimeType = pickRecorderMimeType();
      try {
        mediaRecorder = mimeType
          ? new MediaRecorder(monitorStream, { mimeType: mimeType, audioBitsPerSecond: 320000 })
          : new MediaRecorder(monitorStream, { audioBitsPerSecond: 320000 });
      } catch (err) {
        setStatus("Unable to start recorder: " + err.message, true);
        return;
      }

      recordingChunks = [];
      mediaRecorder.ondataavailable = function (event) {
        if (event.data && event.data.size > 0) recordingChunks.push(event.data);
      };
      mediaRecorder.onerror = function (event) {
        setStatus("Recorder error: " + (event.error && event.error.message ? event.error.message : "unknown"), true);
      };
      mediaRecorder.onstop = function () {
        var finalMime = (mediaRecorder && mediaRecorder.mimeType) || mimeType || "audio/webm";
        var blob = new Blob(recordingChunks, { type: finalMime });
        onRecordedBlob(blob);
      };

      recordingStartMs = Date.now();
      if (recordingTimerId) clearInterval(recordingTimerId);
      recordingTimerId = setInterval(function () {
        var ms = Date.now() - recordingStartMs;
        updateTimerFromMs(ms);
        waveformDuration.innerText = formatTime(ms / 1000);
      }, 100);

      mediaRecorder.start(100);
      waveformTitle.innerText = "recording...";
      waveformDuration.innerText = "00:00";
      waveformShell.style.display = "block";
      startLiveWaveAnimation();
      updateTimerFromMs(0);
      maxStopTimer = setTimeout(function () {
        stopRecording();
      }, MAX_RECORDING_MS);
      setRecordingUi(true);
      setStatus("Recording...");
    }

    function stopRecording() {
      if (!mediaRecorder || mediaRecorder.state !== "recording") return;
      mediaRecorder.stop();
    }

    function stopPlayback() {
      if (!waveSurfer) return;
      try { waveSurfer.pause(); } catch (e) { }
      if (waveSurfer.getDuration && waveSurfer.getDuration() > 0) {
        try { waveSurfer.seekTo(0); } catch (e) { }
      }
      isPlaybackActive = false;
      playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
      recordBtn.disabled = false;
    }

    async function onRecordedBlob(blob) {
      clearTimeout(maxStopTimer);
      maxStopTimer = null;
      if (recordingTimerId) clearInterval(recordingTimerId);
      recordingTimerId = null;
      stopLiveWaveAnimation();
      setRecordingUi(false);
      resetTimer();
      var waveformContainer = document.getElementById("waveform");
      if (waveformContainer) waveformContainer.innerHTML = "";
      liveWaveCanvas = null;
      liveWaveCtx = null;

      if (!blob || !blob.size) {
        setStatus("No audio captured.", true);
        return;
      }

      var mimeType = blob.type || "audio/webm";
      var ext = mimeType.indexOf("ogg") !== -1 ? ".ogg" : (mimeType.indexOf("mp4") !== -1 ? ".m4a" : ".webm");
      var formData = new FormData();
      formData.append("file", blob, "folysplitr_take" + ext);

      setStatus("Saving recording...");
      try {
        var res = await fetch("/api/folysplitr/recordings", {
          method: "POST",
          body: formData
        });
        var payload = await res.json();
        if (!res.ok || !payload.ok) {
          throw new Error(payload.error || "Save failed");
        }
        lastRecordingUrl = payload.url;
        loadWaveform(payload.url, payload.filename);
        await refreshRecordingsList();
        splitrIndex = 0;
        renderSplitrCurrent();
        setStatus("Recording saved.");
      } catch (err) {
        setStatus("Failed to save recording: " + err.message, true);
      }
    }

    function loadWaveform(url, title) {
      stopLiveWaveAnimation();
      if (waveSurfer) {
        try { waveSurfer.destroy(); } catch (e) { }
        waveSurfer = null;
      }
      var waveformContainer = document.getElementById("waveform");
      if (waveformContainer) waveformContainer.innerHTML = "";
      waveformShell.style.display = "block";
      waveformTitle.innerText = title || url;
      waveformDuration.innerText = "--:--";
      playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';

      waveSurfer = WaveSurfer.create({
        container: "#waveform",
        waveColor: "#353531",
        progressColor: "#016fb9",
        cursorColor: "#ff9505",
        height: 92,
        backend: "MediaElement",
      });
      waveSurfer.load(url);

      waveSurfer.on("ready", function () {
        waveformDuration.innerText = formatTime(waveSurfer.getDuration());
      });
      waveSurfer.on("play", function () {
        isPlaybackActive = true;
        playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        recordBtn.disabled = true;
      });
      waveSurfer.on("pause", function () {
        if (!waveSurfer.isPlaying()) {
          isPlaybackActive = false;
          playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
          recordBtn.disabled = false;
        }
      });
      waveSurfer.on("finish", function () {
        isPlaybackActive = false;
        playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
        recordBtn.disabled = false;
      });
    }

    async function refreshRecordingsList() {
      var res = await fetch("/api/folysplitr/recordings");
      var payload = await res.json();
      if (!res.ok || !payload.ok || !payload.files) {
        throw new Error(payload.error || "Failed to load recordings");
      }
      recordingsList = payload.files;
      return recordingsList;
    }

    function renderSplitrCurrent() {
      var total = recordingsList.length;
      if (splitrIndex >= total) splitrIndex = Math.max(0, total - 1);
      splitrIndexEl.innerText = total ? ((splitrIndex + 1) + " / " + total) : "0 / 0";
      splitrPrevBtn.disabled = total <= 1;
      splitrNextBtn.disabled = total <= 1;
      splitrPlayBtn.disabled = total === 0;

      if (!total) {
        splitrShell.style.display = "none";
        splitrEmpty.style.display = "block";
        if (splitrWaveSurfer) {
          try { splitrWaveSurfer.destroy(); } catch (e) { }
          splitrWaveSurfer = null;
        }
        return;
      }

      var item = recordingsList[splitrIndex];
      splitrEmpty.style.display = "none";
      splitrShell.style.display = "block";
      splitrTitle.innerText = item.filename || item.url;
      splitrDuration.innerText = "--:--";
      splitrPlayBtn.innerHTML = '<i class="fa-solid fa-play"></i>';

      if (splitrWaveSurfer) {
        try { splitrWaveSurfer.destroy(); } catch (e) { }
        splitrWaveSurfer = null;
      }
      splitrWaveSurfer = WaveSurfer.create({
        container: "#splitr-waveform",
        waveColor: "#353531",
        progressColor: "#ec4e20",
        cursorColor: "#ff9505",
        height: 88,
        backend: "MediaElement"
      });
      splitrWaveSurfer.load(item.url);
      splitrWaveSurfer.on("ready", function () {
        splitrDuration.innerText = formatTime(splitrWaveSurfer.getDuration());
        splitrDurationSeconds = splitrWaveSurfer.getDuration() || 0;
        splitrMarkers = defaultMarkersFromDuration(splitrDurationSeconds);
        splitrMarkerHistory = [];
        renderSplitOverlay();
      });
      splitrWaveSurfer.on("seeking", function (currentTime) {
        splitrSelectedSeconds = currentTime || 0;
        if (splitrActiveProcessingType === "cut") renderSplitrActions();
        renderSplitOverlay();
      });
      splitrWaveSurfer.on("interaction", function (time) {
        splitrSelectedSeconds = Number(time) || splitrSelectedSeconds;
        if (splitrPlacementMode) {
          pushMarkerHistory();
          splitrMarkers.push(splitrSelectedSeconds);
          splitrMarkers = sanitizeMarkers(splitrMarkers, splitrDurationSeconds);
          renderSplitOverlay();
        }
      });
      splitrWaveSurfer.on("play", function () {
        splitrPlayBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
      });
      splitrWaveSurfer.on("pause", function () {
        if (!splitrWaveSurfer.isPlaying()) {
          splitrPlayBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
        }
      });
      splitrWaveSurfer.on("finish", function () {
        splitrPlayBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
      });
      renderSplitSelectionControls();
      renderSplitOverlay();
    }

    function goToSplitrDelta(delta) {
      if (!recordingsList.length) return;
      splitrIndex = (splitrIndex + delta + recordingsList.length) % recordingsList.length;
      renderSplitrCurrent();
    }

    async function loadLatestRecording() {
      try {
        await refreshRecordingsList();
        if (!recordingsList.length) return;
        var latest = recordingsList[0];
        lastRecordingUrl = latest.url;
        loadWaveform(latest.url, latest.filename);
        renderSplitrCurrent();
        setStatus("Recordings loaded.");
      } catch (e) {
        setStatus("Could not load previous recordings.", true);
      }
    }

    async function loadSplitrConfig() {
      try {
        var res = await fetch("/api/folysplitr/processing-actions");
        var payload = await res.json();
        if (!res.ok || !payload.ok) throw new Error(payload.error || "Failed to load actions");
        processingCatalog.types = payload.types || [];
        processingCatalog.actions = payload.actions || [];
        splitCategories = payload.splitCategories || [];
        renderSplitrActions();
        renderSplitrOrganizeButtons();
      } catch (e) {
        setStatus("Could not load split actions: " + e.message, true);
      }
    }

    recordBtn.addEventListener("click", function () {
      if (isPlaybackActive) return;
      if (mediaRecorder && mediaRecorder.state === "recording") {
        stopRecording();
      } else {
        startRecording();
      }
    });
    playBtn.addEventListener("click", function () {
      if (mediaRecorder && mediaRecorder.state === "recording") return;
      if (!waveSurfer) return;
      if (waveSurfer.isPlaying()) {
        waveSurfer.pause();
      } else {
        waveSurfer.play();
      }
    });
    stopBtn.addEventListener("click", function () {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        stopRecording();
      } else {
        stopPlayback();
      }
    });
    deviceSelect.addEventListener("change", async function () {
      try {
        await startMonitorForDevice(deviceSelect.value);
        setStatus("Input device switched.");
      } catch (err) {
        setStatus("Failed to switch input device: " + err.message, true);
      }
    });
    tabRecorderBtn.addEventListener("click", function () {
      showTab("recorder");
    });
    tabSplitrBtn.addEventListener("click", function () {
      showTab("splitr");
    });
    splitrPrevBtn.addEventListener("click", function () {
      goToSplitrDelta(-1);
    });
    splitrNextBtn.addEventListener("click", function () {
      goToSplitrDelta(1);
    });
    splitrEmptyTrashBtn.addEventListener("click", async function () {
      try {
        var res = await fetch("/api/folysplitr/trash/empty", { method: "POST" });
        var payload = await res.json();
        if (!res.ok || !payload.ok) throw new Error(payload.error || "Empty trash failed");
        setStatus("Trash emptied.");
      } catch (e) {
        setStatus(e.message || "Empty trash failed.", true);
      }
    });
    splitrUnarchiveBtn.addEventListener("click", async function () {
      try {
        var res = await fetch("/api/folysplitr/archive/unarchive", { method: "POST" });
        var payload = await res.json();
        if (!res.ok || !payload.ok) throw new Error(payload.error || "Unarchive failed");
        await refreshRecordingsList();
        if (splitrIndex >= recordingsList.length) splitrIndex = Math.max(0, recordingsList.length - 1);
        renderSplitrCurrent();
        setStatus("Archived samples restored to queue.");
      } catch (e) {
        setStatus(e.message || "Unarchive failed.", true);
      }
    });
    splitrPlayBtn.addEventListener("click", function () {
      if (!splitrWaveSurfer) return;
      if (splitrWaveSurfer.isPlaying()) {
        splitrWaveSurfer.pause();
      } else {
        splitrWaveSurfer.play();
      }
    });
    splitrTrashBtn.addEventListener("click", async function () {
      try {
        await splitrOrganize("trash");
        setStatus("Moved to trash.");
      } catch (e) {
        setStatus(e.message || "Move failed.", true);
      }
    });
    splitrArchiveBtn.addEventListener("click", async function () {
      try {
        await splitrOrganize("archive");
        setStatus("Moved to archive.");
      } catch (e) {
        setStatus(e.message || "Move failed.", true);
      }
    });

    async function boot() {
      playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
      stopBtn.innerHTML = '<i class="fa-solid fa-stop"></i>';
      drawMeter(0, true);
      try {
        await startMonitorForDevice("");
        await refreshDevices();
        if (deviceSelect.options.length > 0 && monitorStream) {
          var selectedTrack = monitorStream.getAudioTracks()[0];
          var selectedSetting = selectedTrack && selectedTrack.getSettings ? selectedTrack.getSettings().deviceId : "";
          if (selectedSetting) deviceSelect.value = selectedSetting;
        }
        setStatus("Microphone ready.");
      } catch (err) {
        setStatus("Microphone access denied or unavailable: " + err.message, true);
      }
      await loadSplitrConfig();
      await loadLatestRecording();
    }

    document.addEventListener("DOMContentLoaded", function () {
      boot();
      if (window.__pageReady) window.__pageReady();
    });

    window.addEventListener("beforeunload", function () {
      stopRecording();
      stopMeter();
      stopCurrentStream();
      stopLiveWaveAnimation();
      if (waveSurfer) {
        try { waveSurfer.destroy(); } catch (e) { }
      }
      if (splitrWaveSurfer) {
        try { splitrWaveSurfer.destroy(); } catch (e) { }
      }
    });
  </script>
</body>

</html>
