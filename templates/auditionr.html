<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>┌ dronmakr v{{ version }} ■ auditioner ┐</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.0/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wavesurfer.js/7.4.0/wavesurfer.min.js"></script>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏳</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous">
  <style>
    :root {
      --secondary: #000000;
      --primary: #ff9505;
      --theme-a: #353531;
      --theme-b: #016fb9;
      --theme-c: #ec4e20;
      --toolbar-height: 48px;
    }

    html {
      scrollbar-gutter: stable;
    }

    body {
      background-color: var(--secondary);
      color: var(--primary);
      font-family: "Fragment Mono", monospace;
      padding: 1rem;
      padding-top: calc(var(--toolbar-height) + 0.1rem);
      margin: 0;
      overflow: hidden;
      padding-right: 0px;
    }

    /* Themed scrollbar */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--theme-a) var(--secondary);
    }

    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    *::-webkit-scrollbar-track {
      background: var(--secondary);
    }

    *::-webkit-scrollbar-thumb {
      background: var(--theme-a);
      border-radius: 4px;
    }

    *::-webkit-scrollbar-thumb:hover {
      background: var(--theme-b);
    }

    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--toolbar-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      padding-right: 0.5rem;
      background-color: var(--secondary);
      border-bottom: 1px solid var(--theme-a);
      z-index: 1000;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    #toolbar-brand {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--primary);
      min-width: 20ch;
      flex-shrink: 0;
      text-decoration: none;
      outline: none;
    }

    .toolbar-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }

    .toolbar-nav a {
      color: var(--primary);
      text-decoration: none;
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--theme-a);
      border-radius: 4px;
      background: var(--theme-a);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .toolbar-nav a:hover {
      border-color: var(--primary);
      background: rgba(255, 149, 5, 0.15);
    }

    .toolbar-nav a.active {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--secondary);
    }

    .toolbar-settings {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      text-decoration: none;
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--theme-a);
      border-radius: 4px;
      background: var(--theme-a);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .toolbar-settings:hover {
      border-color: var(--primary);
      background: rgba(255, 149, 5, 0.15);
    }

    .toolbar-settings.active {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--secondary);
    }

    #toolbar-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toolbar-action-btn {
      display: inline-flex;
      align-items: flex-end;
      gap: 0.4rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.85rem;
      font-family: inherit;
      border-radius: 4px;
      border: 1px solid var(--theme-a);
      background: var(--theme-a);
      color: var(--primary);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .toolbar-action-btn:hover {
      background: var(--primary);
      color: var(--secondary);
      border-color: var(--primary);
    }

    .toolbar-action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .toolbar-action-btn i {
      font-size: 0.8rem;
    }

    .toolbar-status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--theme-b);
    }

    .toolbar-status-badge {
      display: inline-flex;
      align-items: flex-end;
      gap: 0.4rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.85rem;
      border-radius: 4px;
      background: rgba(1, 111, 185, 0.2);
      border: 1px solid var(--theme-b);
      box-sizing: border-box;
    }

    .toolbar-status-badge.saved {
      color: var(--theme-c);
      background: rgba(236, 78, 32, 0.2);
      border-color: var(--theme-c);
    }

    .toolbar-status-badge i,
    .toolbar-action-btn i {
      flex-shrink: 0;
    }

    .status-label,
    .btn-label {
      white-space: nowrap;
      display: none;
    }

    @media (min-width: 1200px) {

      .status-label,
      .btn-label {
        display: inline;
      }
    }

    .auditionr-layout {
      display: flex;
      width: 100%;
      max-width: 100%;
      gap: 0;
      height: calc(100vh - var(--toolbar-height) - 2rem);
    }

    .auditionr-main {
      flex: 1 1 auto;
      min-width: 0;
      height: 100%;
      overflow: hidden;
    }

    #waveforms {
      max-width: 100%;
      height: 100%;
      overflow-y: auto;
      padding-right: 0.5rem;
      box-sizing: border-box;
      position: relative;
    }

    .queue-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      pointer-events: none;
      color: var(--theme-b);
      opacity: 0.7;
      font-size: 0.9rem;
      text-align: center;
    }

    .queue-empty-icon {
      font-size: 1.6rem;
      color: var(--theme-a);
    }

    .auditionr-sidebar {
      width: 320px;
      flex-shrink: 0;
      border-left: 1px solid var(--theme-a);
      height: 100vh;
      background: #050505;
      display: flex;
      flex-direction: column;
      transition: width 0.2s ease, min-width 0.2s ease;
      overflow: hidden;
    }

    .auditionr-sidebar.collapsed {
      width: 0;
      min-width: 0;
      border-left-width: 0;
    }

    .auditionr-sidebar-content {
      min-width: 320px;
      overflow-y: auto;
    }

    .sidebar-toggle {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      width: 20px;
      height: 48px;
      padding: 0;
      border: none;
      border-radius: 0 4px 4px 0;
      background: var(--theme-a);
      color: var(--primary);
      cursor: pointer;
      font-size: 0.75rem;
      z-index: 2;
      transition: background 0.15s ease;
    }

    .sidebar-toggle:hover {
      background: var(--primary);
      color: var(--secondary);
    }

    .auditionr-sidebar-wrapper {
      position: relative;
      flex-shrink: 0;
      min-width: 20px;
      height: 100%;
    }

    .generatr-card {
      padding: 1rem;
    }

    .generatr-card h2 {
      font-size: 0.9rem;
      margin: 0 0 0.75rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary);
    }

    .generatr-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .generatr-form .form-row {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .generatr-form .form-row label {
      font-size: 0.75rem;
      color: var(--theme-b);
    }

    .generatr-form .form-row select {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.4rem 0.5rem;
      background: var(--theme-a);
      border: 1px solid var(--theme-a);
      border-radius: 4px;
      color: var(--primary);
      width: 100%;
      cursor: pointer;
    }

    .generatr-form .form-row select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-generate {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.45rem 0.85rem;
      background: var(--primary);
      color: var(--secondary);
      border: 1px solid var(--primary);
      border-radius: 4px;
      cursor: pointer;
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: opacity 0.15s ease;
    }

    .btn-generate:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn-generate:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .generatr-loading {
      font-size: 0.8rem;
      color: var(--theme-b);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .generatr-loading.hidden {
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 0.9rem;
      height: 0.9rem;
      border: 2px solid var(--theme-a);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .generatr-result {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--theme-a);
      padding-inline: 1.5rem;
    }

    .generatr-result.hidden {
      display: none;
    }

    .generatr-result h3 {
      font-size: 0.8rem;
      margin: 0 0 0.4rem 0;
      color: var(--theme-b);
    }

    .generatr-result ul {
      margin: 0;
      padding-left: 1.1rem;
      font-size: 0.75rem;
      color: var(--primary);
      line-height: 1.5;
      word-break: break-all;
    }

    .generatr-result .error {
      color: var(--theme-c);
      font-size: 0.8rem;
    }

    .generatr-result .generatr-error.hidden {
      display: none;
    }

    .hidden {
      display: none !important;
    }

    .button {
      cursor: pointer;
      border-bottom: 2px solid var(--theme-a);
      padding-inline: 5px;
      padding-block: 5px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .button:hover {
      opacity: 0.5;
    }

    .button.icon-btn {
      width: 36px;
      min-width: 36px;
      padding: 6px;
      text-align: center;
      border: none;
      border-bottom: 2px solid var(--theme-a);
    }

    .button.icon-btn:hover {
      border-bottom-color: var(--primary);
    }

    .fixed-button {
      width: 40px;
      text-align: center;
      font-weight: bold;
      border: none;
      border-bottom: 2px solid var(--primary);
      background-color: var(--primary);
      color: var(--secondary);
    }

    .processing-type-active {
      border: none;
      border-bottom: 2px solid var(--primary);
      background-color: var(--primary);
      color: #000;
    }

    .drumpattern-sample .waveform-actions .processing-type-active {
      background-color: var(--theme-b);
      border-bottom-color: var(--theme-b);
      color: #000;
    }

    .transition-sample .waveform-actions .button.processing-type-active {
      background-color: var(--theme-c);
      border-bottom-color: var(--theme-c);
      color: #000;
    }

    .waveform {
      margin-bottom: 1rem;
    }

    .waveform-wrapper {
      /* border: 2px solid var(--theme-a); */
      padding: 10px;
      margin-bottom: 1rem;
      /* border-radius: 10px; */
    }

    .waveform-title {
      font-size: 0.75rem;
      margin-bottom: 1rem;
    }

    .waveform-actions,
    .title-container {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .processing-actions-divider {
      width: 1px;
      height: 20px;
      border-left: 1px solid var(--theme-a);
      opacity: 0.6;
      align-self: center;
      margin: 0 4px;
    }

    .drumpattern-sample .waveform-actions .processing-actions-divider {
      border-left-color: var(--theme-b);
    }

    .transition-sample .waveform-actions .processing-actions-divider {
      border-left-color: var(--theme-c);
    }

    .waveform-duration {
      font-size: 0.75rem;
      color: var(--theme-c);
      font-weight: bold;
    }

    /* Drumpattern sample: blue theme */
    .drumpattern-sample .waveform-title {
      color: var(--theme-b);
    }

    .drumpattern-sample .waveform-actions .button {
      color: var(--theme-b);
    }

    .drumpattern-sample .waveform-actions .fixed-button {
      background-color: var(--theme-b);
      border-bottom-color: var(--theme-b);
      color: var(--secondary);
    }

    .drumpattern-sample .waveform-actions .button:hover {
      border-bottom-color: var(--theme-b);
    }

    /* Transition sample: orange theme */
    .transition-sample .waveform-title {
      color: var(--theme-c);
    }

    .transition-sample .waveform-actions .button {
      color: var(--theme-c);
    }

    .transition-sample .waveform-actions .fixed-button {
      background-color: var(--theme-c);
      border-bottom-color: var(--theme-c);
      color: var(--secondary);
    }

    .transition-sample .waveform-actions .button:hover {
      border-bottom-color: var(--theme-c);
    }

    .waveform-actions .button.processing-type-active {
      color: #000;
    }

    #logs {
      background-color: var(--theme-a);
    }

    .disabled {
      opacity: 0.25;
    }

    .center-offset {
      margin-top: 3px;
    }
  </style>
</head>

<body>
  {% include '_loading_overlay.html' %}
  <header id="toolbar">
    <div class="toolbar-left">
      <a href="/" id="toolbar-brand">┌ dronmakr v{{ version }} ┐</a>
      <nav class="toolbar-nav">
        <a href="/auditionr" class="active"><i class="fa-solid fa-wave-square"></i> auditionr</a>
        <a href="/beatbuildr"><i class="fa-solid fa-drum"></i> beatbuildr</a>
        <a href="/collections"><i class="fa-solid fa-folder-open"></i> collections</a>
      </nav>
    </div>
    <div id="toolbar-actions">
      <div class="toolbar-status">
        <span class="toolbar-status-badge" id="status-queue" title="Files in queue to review">
          <i class="fa-solid fa-inbox"></i>
          <span id="queue-num">0</span>
          <span class="status-label"> in queue</span>
        </span>
        <span class="toolbar-status-badge saved" id="status-saved" title="Saved files">
          <i class="fa-solid fa-heart"></i>
          <span id="saved-num">0</span>
          <span class="status-label"> saved</span>
        </span>
      </div>
      <button type="button" class="toolbar-action-btn" id="unarchive-samples-button" title="Unarchive Samples"
        onclick="unarchiveSamples()" aria-label="Unarchive Samples">
        <i class="fa-solid fa-box-open"></i>
        <span class="btn-label">Unarchive Samples </span>
        <span id="unarchive-count">(0)</span>
      </button>
      <button type="button" class="toolbar-action-btn" id="empty-trash-button" title="Empty Trash"
        onclick="emptyTrash()" aria-label="Empty Trash">
        <i class="fa-solid fa-trash-can"></i>
        <span class="btn-label">Empty Trash </span>
        <span id="trash-count">(0)</span>
      </button>
      <a href="/settings" class="toolbar-settings" title="settings"><i class="fa-solid fa-gear"></i></a>
    </div>
  </header>

  <div class="auditionr-layout">
    <div class="auditionr-main">
      <main id="waveforms">
        <div id="waveform-container"></div>
        <div id="queue-empty-placeholder" class="queue-empty hidden">
          <div class="queue-empty-icon"><i class="fa-solid fa-inbox"></i></div>
          <div>Queue is empty</div>
        </div>
      </main>
    </div>
    <div class="auditionr-sidebar-wrapper">
      <button type="button" class="sidebar-toggle" id="sidebar-toggle" title="Show generate sidebar"
        aria-label="Toggle generate sidebar">
        <i class="fa-solid fa-chevron-left" id="sidebar-toggle-icon"></i>
      </button>
      <aside class="auditionr-sidebar collapsed" id="auditionr-sidebar">
        <div class="auditionr-sidebar-content">
          <div class="generatr-card">
            <h2><i class="fa-solid fa-wand-magic-sparkles"></i> Generate Samples</h2>
            <form class="generatr-form" id="generatr-form">
              <div class="form-row">
                <label for="generatr-type">Type</label>
                <select id="generatr-type" name="type">
                  <option value="drone">drone</option>
                  <option value="bass">bass</option>
                  <option value="transition">transition</option>
                </select>
              </div>
              <div class="form-row form-row-subcommand hidden" id="generatr-subcommand-row">
                <label for="generatr-subcommand">Subcommand</label>
                <select id="generatr-subcommand" name="subcommand">
                  <option value="reese">reese</option>
                  <option value="donk">donk</option>
                </select>
              </div>
              <div class="form-row form-row-subcommand hidden" id="generatr-transition-subcommand-row">
                <label for="generatr-transition-subcommand">Subcommand</label>
                <select id="generatr-transition-subcommand" name="transition_subcommand">
                  <option value="sweep">sweep</option>
                  <option value="closh">closh</option>
                  <option value="kickboom">kickboom</option>
                  <option value="longcrash">longcrash</option>
                  <option value="riser">riser</option>
                  <option value="drop">drop</option>
                </select>
              </div>
              <button type="submit" class="btn-generate" id="generatr-btn">
                <i class="fa-solid fa-play"></i> Generate
              </button>
              <div class="generatr-loading hidden" id="generatr-loading">
                <span class="spinner"></span>
                <span>Generating…</span>
              </div>
            </form>
            <div class="generatr-result hidden" id="generatr-result">
              <h3>Generated files</h3>
              <ul id="generated-paths"></ul>
              <p class="error generatr-error hidden" id="generatr-error"></p>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>
  <script>
    var socket = io();
    var lastFolderCounts = { archive: 0, trash: 0, exports: 0, saved: 0 };
    var selectedWaveformTimestamps = {};
    var currentDisplayedFiles = [];
    var waveformInstances = {};
    var db = 2;
    var lastEdited = "";
    var sharedAudioContext = null;
    var currentDrumpatternStop = null;

    function getAudioContext() {
      if (!sharedAudioContext) sharedAudioContext = new (window.AudioContext || window.webkitAudioContext)();
      return sharedAudioContext;
    }
    function emptyTrash() {
      var button = document.getElementById("empty-trash-button");
      var originalHtml = button.innerHTML;
      button.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      button.disabled = true;
      button.title = "Emptying...";

      fetch("/emptytrash")
        .then(response => response.json())
        .then(data => {
          console.log("Response:", data);
          button.title = "Emptied.";
          setTimeout(function () {
            button.innerHTML = originalHtml;
            updateFolderCounts(lastFolderCounts);
            button.title = "Empty Trash";
            button.disabled = false;
          }, 800);
        })
        .catch(function (error) {
          console.error("Error:", error);
          button.innerHTML = originalHtml;
          button.title = "Empty Trash";
          button.disabled = false;
        });
    }

    function unarchiveSamples() {
      var button = document.getElementById("unarchive-samples-button");
      var originalHtml = button.innerHTML;
      button.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      button.disabled = true;
      button.title = "Moving files...";

      fetch("/unarchive")
        .then(response => response.json())
        .then(data => {
          console.log("Response:", data);
          button.title = "Files moved.";
          setTimeout(function () {
            button.innerHTML = originalHtml;
            updateFolderCounts(lastFolderCounts);
            button.title = "Unarchive Samples";
            button.disabled = false;
          }, 800);
        })
        .catch(function (error) {
          console.error("Error:", error);
          button.innerHTML = originalHtml;
          button.title = "Unarchive Samples";
          button.disabled = false;
        });
    }

    function skipSample(path) {
      fetch("/skip", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      }).then(response => response.json())
        .then(data => console.log(data))
        .catch(error => console.error("Error:", error));
    }

    function deleteSample(path) {
      fetch("/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      }).then(response => response.json())
        .then(data => console.log(data))
        .catch(error => console.error("Error:", error));
    }

    function duplicateSample(path) {
      fetch("/duplicate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      }).then(response => response.json())
        .then(data => console.log(data))
        .catch(error => console.error("Error:", error));
    }

    function formatTimestamp(seconds) {
      const roundedSeconds = Math.round(seconds); // Round to the nearest second
      const hours = Math.floor(roundedSeconds / 3600);
      const minutes = Math.floor((roundedSeconds % 3600) / 60);
      const remainingSeconds = roundedSeconds % 60;
      return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
    }

    function revealSample(path) {
      fetch("/reveal", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      }).then(response => response.json())
        .then(data => { if (data.error) alert(data.error); });
    }

    function saveSample(path) {
      fetch("/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      }).then(response => response.json())
        .then(data => console.log(data))
        .catch(error => console.error("Error:", error));
    }

    function processSample(params) {
      fetch("/process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(params)
      }).then(response => response.json())
        .then(data => console.log(data))
        .catch(error => console.error("Error:", error));
    }

    function fetchUndoStatus(path) {
      return fetch("/undo-status", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path: path })
      })
        .then(response => response.json())
        .then(data => !!data.can_undo)
        .catch(() => false);
    }

    socket.on("exports", function (data) {
      if (data.files) {
        applyExportsUpdate(data.files, data.updated_path || null, data.undo_available || null);
      }
    });

    socket.on("folder_counts", function (data) {
      updateFolderCounts(data);
    });

    var processingCatalog = { types: [], actions: [] };
    socket.on("configs", function (data) {
      if (!data || !data.processingActions) return;
      var payload = data.processingActions;
      processingCatalog = {
        types: Array.isArray(payload.types) ? payload.types : [],
        actions: Array.isArray(payload.actions) ? payload.actions : []
      };
    });

    function updateFolderCounts(counts) {
      if (!counts) return;
      lastFolderCounts = counts;
      var queueNumEl = document.getElementById("queue-num");
      var savedNumEl = document.getElementById("saved-num");
      var unarchiveCountEl = document.getElementById("unarchive-count");
      var trashCountEl = document.getElementById("trash-count");
      if (queueNumEl) queueNumEl.textContent = counts.exports || 0;
      if (savedNumEl) savedNumEl.textContent = counts.saved || 0;
      if (unarchiveCountEl) unarchiveCountEl.textContent = "(" + (counts.archive || 0) + ")";
      if (trashCountEl) trashCountEl.textContent = "(" + (counts.trash || 0) + ")";
    }

    function getCurrentFiles() {
      return currentDisplayedFiles.slice();
    }

    function removeWaveform(file) {
      var inst = waveformInstances[file];
      if (!inst) return;
      if (inst.stopPlayback) inst.stopPlayback();
      if (inst.wavesurfer) {
        try { inst.wavesurfer.destroy(); } catch (e) { }
      }
      if (inst.wrapper && inst.wrapper.parentNode) {
        inst.wrapper.parentNode.removeChild(inst.wrapper);
      }
      delete waveformInstances[file];
      delete selectedWaveformTimestamps[file];
    }

    function refreshWaveform(file) {
      var inst = waveformInstances[file];
      if (!inst || !inst.wavesurfer) return;
      var filePath = "/exports/" + file.split("/").pop();
      inst.durationEl.textContent = "loading...";
      inst.wavesurfer.load(filePath);
    }

    function setUndoButtonState(file, canUndo) {
      var inst = waveformInstances[file];
      if (!inst || !inst.undoButton) return;
      inst.undoButton.classList.toggle("disabled", !canUndo);
    }

    function applyExportsUpdate(newFiles, updatedPath, undoAvailability) {
      if (currentDrumpatternStop) {
        currentDrumpatternStop();
        currentDrumpatternStop = null;
      }
      var removed = currentDisplayedFiles.filter(function (f) { return newFiles.indexOf(f) === -1; });
      removed.forEach(removeWaveform);

      currentDisplayedFiles = newFiles;
      var container = document.getElementById("waveform-container");
      var emptyPlaceholder = document.getElementById("queue-empty-placeholder");

      newFiles.forEach(function (file) {
        if (!selectedWaveformTimestamps.hasOwnProperty(file)) selectedWaveformTimestamps[file] = 0;
      });

      var orderedWrappers = [];
      var pendingReady = 0;
      newFiles.forEach(function (file) {
        var inst = waveformInstances[file];
        if (inst && inst.wrapper) {
          orderedWrappers.push(inst.wrapper);
        } else {
          pendingReady++;
        }
      });
      function onWaveformReady() {
        pendingReady--;
        if (pendingReady === 0 && window.__pageReady) window.__pageReady();
      }
      newFiles.forEach(function (file) {
        var inst = waveformInstances[file];
        if (inst && inst.wrapper) {
          /* already pushed */
          if (undoAvailability && Object.prototype.hasOwnProperty.call(undoAvailability, file)) {
            setUndoButtonState(file, !!undoAvailability[file]);
          }
        } else {
          var created = createSingleWaveform(file, onWaveformReady);
          if (created) {
            waveformInstances[file] = created;
            orderedWrappers.push(created.wrapper);
            if (undoAvailability && Object.prototype.hasOwnProperty.call(undoAvailability, file)) {
              setUndoButtonState(file, !!undoAvailability[file]);
            }
          } else {
            onWaveformReady();
          }
        }
      });

      container.innerHTML = "";
      orderedWrappers.forEach(function (w) { container.appendChild(w); });

      if (emptyPlaceholder) {
        if (!newFiles.length) {
          emptyPlaceholder.classList.remove("hidden");
        } else {
          emptyPlaceholder.classList.add("hidden");
        }
      }

      if (pendingReady === 0 && window.__pageReady) window.__pageReady();
      if (updatedPath && newFiles.indexOf(updatedPath) !== -1) {
        refreshWaveform(updatedPath);
      }
    }

    function createSingleWaveform(file, onReady) {
      var filePath = "/exports/" + file.split("/").pop();
      var displayName = filePath.replace("/exports/", "").replace(".wav", "");
      var isDrumpattern = displayName.startsWith("drumpattern___");
      var isTransition = displayName.startsWith("transition");

      var wrapper = document.createElement("div");
      wrapper.className = "waveform-wrapper";
      if (isDrumpattern) wrapper.classList.add("drumpattern-sample");
      if (isTransition) wrapper.classList.add("transition-sample");

      var titleContainer = document.createElement("div");
      titleContainer.classList.add("title-container");

      var title = document.createElement("div");
      title.innerText = displayName;
      title.classList.add("waveform-title");
      titleContainer.appendChild(title);

      var duration = document.createElement("div");
      duration.innerText = "loading...";
      duration.classList.add("waveform-duration");
      titleContainer.appendChild(duration);

      wrapper.appendChild(titleContainer);

      var waveformDiv = document.createElement("div");
      var waveformIdSafe = "waveform-" + file.replace(/[^a-zA-Z0-9_-]/g, "-");
      waveformDiv.id = waveformIdSafe;
      waveformDiv.classList.add("waveform")
      wrapper.appendChild(waveformDiv);

      var actions = document.createElement("div");
      actions.classList.add("waveform-actions")

      var playButton = document.createElement("div");
      playButton.innerHTML = "<i class=\"fa-solid fa-play center-offset\"></i>";
      playButton.classList.add("button", "fixed-button");
      playButton.title = "Play";
      if (isDrumpattern) playButton.classList.add("disabled");
      actions.appendChild(playButton);

      var skipButton = document.createElement("div");
      skipButton.innerHTML = "<i class=\"fa-solid fa-box-archive\"></i>";
      skipButton.classList.add("button", "icon-btn");
      skipButton.title = "Archive";
      skipButton.addEventListener("click", () => skipSample(filePath));
      actions.appendChild(skipButton);

      var saveButton = document.createElement("div");
      saveButton.innerHTML = "<i class=\"fa-solid fa-floppy-disk\"></i>";
      saveButton.classList.add("button", "icon-btn");
      saveButton.title = "Save";
      saveButton.addEventListener("click", () => saveSample(filePath));
      actions.appendChild(saveButton);

      var revealButton = document.createElement("div");
      revealButton.innerHTML = "<i class=\"fa-solid fa-folder-open\"></i>";
      revealButton.classList.add("button", "icon-btn");
      revealButton.title = "Reveal in folder";
      revealButton.addEventListener("click", () => revealSample(filePath));
      actions.appendChild(revealButton);

      var undoButton = document.createElement("div");
      undoButton.innerHTML = "<i class=\"fa-solid fa-rotate-left\"></i>";
      undoButton.classList.add("button", "icon-btn");
      undoButton.title = "Undo Last Edit";
      undoButton.classList.add("disabled");
      undoButton.addEventListener("click", () => {
        if (undoButton.classList.contains("disabled")) return;
        processSample({
          path: filePath,
          command: "undo_last_edit",
          files: getCurrentFiles()
        });
      });
      actions.appendChild(undoButton);

      var reverseButton = document.createElement("div");
      reverseButton.innerHTML = "<i class=\"fa-solid fa-arrows-left-right\"></i>";
      reverseButton.classList.add("button", "icon-btn");
      reverseButton.title = "Reverse";
      reverseButton.addEventListener("click", () => processSample({
        path: filePath,
        command: "reverse_sample",
        files: getCurrentFiles()
      }));
      actions.appendChild(reverseButton);

      var deleteButton = document.createElement("div");
      var duplicateButton = document.createElement("div");
      duplicateButton.innerHTML = "<i class=\"fa-solid fa-copy\"></i>";
      duplicateButton.classList.add("button", "icon-btn");
      duplicateButton.title = "Duplicate";
      duplicateButton.addEventListener("click", () => duplicateSample(filePath));
      actions.appendChild(duplicateButton);

      deleteButton.innerHTML = "<i class=\"fa-solid fa-trash-can\"></i>";
      deleteButton.classList.add("button", "icon-btn");
      deleteButton.title = "Delete";
      deleteButton.addEventListener("click", () => deleteSample(filePath));
      actions.appendChild(deleteButton);

      var trimStartButton = null;
      var trimEndButton = null;
      var activeProcessingType = null;
      var processingActionButtons = [];
      var processingActionsDivider = document.createElement("div");
      processingActionsDivider.classList.add("processing-actions-divider", "hidden");
      var processingTypeButtons = {};
      var processingTypes = [{ key: "cut", label: "Cut" }]
        .concat((processingCatalog.types || []).map(function (type) {
          return { key: type.key, label: type.label };
        }));

      function clearProcessingActions() {
        processingActionButtons.forEach(function (btn) { actions.removeChild(btn); });
        processingActionButtons = [];
        trimStartButton = null;
        trimEndButton = null;
      }

      function addProcessingAction(label, command, extraParams) {
        var btn = document.createElement("div");
        btn.innerText = label;
        btn.classList.add("button");
        btn.addEventListener("click", () => processSample(Object.assign({
          path: filePath,
          command: command,
          files: getCurrentFiles()
        }, extraParams || {})));
        actions.appendChild(btn);
        processingActionButtons.push(btn);
        return btn;
      }

      function renderProcessingActions(processingType) {
        clearProcessingActions();
        processingActionsDivider.classList.toggle("hidden", !processingType);
        if (!processingType) return;

        if (processingType === "cut") {
          trimStartButton = addProcessingAction(
            `Start At ${formatTimestamp(selectedWaveformTimestamps[file])}`,
            "trim_sample_start",
            { seconds: selectedWaveformTimestamps[file] }
          );
          trimEndButton = addProcessingAction(
            `End At ${formatTimestamp(selectedWaveformTimestamps[file])}`,
            "trim_sample_end",
            { seconds: selectedWaveformTimestamps[file] }
          );
          return;
        }
        (processingCatalog.actions || [])
          .filter(function (action) { return action.type === processingType; })
          .forEach(function (action) {
            addProcessingAction(action.label, action.command, action.params || {});
          });
      }

      processingTypes.forEach(function (type) {
        var processingTypeButton = document.createElement("div");
        processingTypeButton.innerText = type.label;
        processingTypeButton.classList.add("button");
        processingTypeButton.addEventListener("click", function () {
          if (activeProcessingType === type.key) {
            activeProcessingType = null;
            processingTypeButton.classList.remove("processing-type-active");
            renderProcessingActions(null);
            return;
          }

          activeProcessingType = type.key;
          Object.keys(processingTypeButtons).forEach(function (k) {
            processingTypeButtons[k].classList.toggle("processing-type-active", k === type.key);
          });
          renderProcessingActions(type.key);
        });
        processingTypeButtons[type.key] = processingTypeButton;
        actions.appendChild(processingTypeButton);
      });
      actions.appendChild(processingActionsDivider);

      wrapper.appendChild(actions);

      fetchUndoStatus(filePath).then(function (canUndo) {
        undoButton.classList.toggle("disabled", !canUndo);
      });

      var container = document.getElementById("waveform-container");
      container.appendChild(wrapper);
      var wavesurfer = WaveSurfer.create({
        container: "#" + waveformIdSafe,
        waveColor: "#353531",
        progressColor: isDrumpattern ? "#016fb9" : (isTransition ? "#ec4e20" : "#ff9505"),
        backend: "MediaElement",
        height: 80
      });

      wavesurfer.load(filePath);

      wavesurfer.on("seeking", function (currentTime) {
        selectedWaveformTimestamps[file] = currentTime;
        if (trimStartButton) trimStartButton.innerText = `Start At ${formatTimestamp(selectedWaveformTimestamps[file])}`;
        if (trimEndButton) trimEndButton.innerText = `End At ${formatTimestamp(selectedWaveformTimestamps[file])}`;
      });

      var drumpatternBuffer = null;
      var drumpatternPlaying = false;
      var drumpatternSourceNode = null;
      var drumpatternStartTime = 0;
      var drumpatternRafId = null;

      wavesurfer.on("ready", function () {
        duration.innerText = `${formatTimestamp(wavesurfer.getDuration())}`;
        if (isDrumpattern) {
          fetch(filePath)
            .then(function (r) { return r.arrayBuffer(); })
            .then(function (ab) {
              return getAudioContext().decodeAudioData(ab);
            })
            .then(function (buffer) {
              drumpatternBuffer = buffer;
              playButton.classList.remove("disabled");
            })
            .catch(function (e) {
              console.error("Drumpattern decode failed", e);
              playButton.classList.remove("disabled");
            });
        }
        if (typeof onReady === "function") onReady();
      });

      function updatePlayButton(isPlaying) {
        if (isPlaying) {
          playButton.innerHTML = "<i class=\"fa-solid fa-pause center-offset\"></i>";
          playButton.title = "Pause";
        } else {
          playButton.innerHTML = "<i class=\"fa-solid fa-play center-offset\"></i>";
          playButton.title = "Play";
        }
      }

      function stopPlayback() {
        if (isDrumpattern) {
          try { if (drumpatternSourceNode) drumpatternSourceNode.stop(); } catch (err) { }
          drumpatternSourceNode = null;
          drumpatternPlaying = false;
          if (drumpatternRafId != null) cancelAnimationFrame(drumpatternRafId);
          drumpatternRafId = null;
          if (currentDrumpatternStop === stopPlayback) currentDrumpatternStop = null;
          wavesurfer.seekTo(0);
          updatePlayButton(false);
          return;
        }
        var mediaEl = wavesurfer.getMediaElement && wavesurfer.getMediaElement();
        if (mediaEl) mediaEl.loop = false;
        try { wavesurfer.pause(); } catch (e) { }
        if (wavesurfer.getDuration() > 0) wavesurfer.seekTo(0);
        updatePlayButton(false);
      }

      function updateDrumpatternPlayhead() {
        if (!drumpatternPlaying || !drumpatternBuffer) return;
        var ctx = getAudioContext();
        var d = drumpatternBuffer.duration;
        var elapsed = ctx.currentTime - drumpatternStartTime;
        var t = d > 0 ? (elapsed % d) / d : 0;
        wavesurfer.seekTo(Math.min(1, Math.max(0, t)));
        drumpatternRafId = requestAnimationFrame(updateDrumpatternPlayhead);
      }

      wavesurfer.on("play", function () {
        updatePlayButton(true);
      });

      wavesurfer.on("pause", function () {
        if (!isDrumpattern && !wavesurfer.isPlaying()) updatePlayButton(false);
      });

      playButton.addEventListener("click", function () {
        if (isDrumpattern) {
          if (playButton.classList.contains("disabled") || !drumpatternBuffer) return;
          if (drumpatternPlaying) {
            stopPlayback();
            return;
          }
          if (currentDrumpatternStop && currentDrumpatternStop !== stopPlayback) currentDrumpatternStop();
          var ctx = getAudioContext();
          if (ctx.state === "suspended") ctx.resume();
          var src = ctx.createBufferSource();
          src.buffer = drumpatternBuffer;
          src.loop = true;
          src.connect(ctx.destination);
          src.start(0);
          drumpatternSourceNode = src;
          drumpatternStartTime = ctx.currentTime;
          drumpatternPlaying = true;
          currentDrumpatternStop = stopPlayback;
          updatePlayButton(true);
          drumpatternRafId = requestAnimationFrame(updateDrumpatternPlayhead);
          return;
        }

        if (wavesurfer.isPlaying()) {
          stopPlayback();
        } else {
          var mediaEl = wavesurfer.getMediaElement && wavesurfer.getMediaElement();
          if (mediaEl) mediaEl.loop = true;
          wavesurfer.play();
        }
      });

      return {
        wrapper: wrapper,
        wavesurfer: wavesurfer,
        durationEl: duration,
        stopPlayback: stopPlayback,
        undoButton: undoButton
      };
    }

    (function () {
      var typeSelect = document.getElementById("generatr-type");
      var subcommandRow = document.getElementById("generatr-subcommand-row");
      var transitionSubcommandRow = document.getElementById("generatr-transition-subcommand-row");
      var form = document.getElementById("generatr-form");
      var btnGenerate = document.getElementById("generatr-btn");
      var loadingEl = document.getElementById("generatr-loading");
      var resultEl = document.getElementById("generatr-result");
      var pathsList = document.getElementById("generated-paths");
      var errorEl = document.getElementById("generatr-error");
      var sidebar = document.getElementById("auditionr-sidebar");
      var sidebarToggle = document.getElementById("sidebar-toggle");
      var sidebarToggleIcon = document.getElementById("sidebar-toggle-icon");

      function updateGeneratrSubcommandVisibility() {
        var type = typeSelect.value;
        subcommandRow.classList.toggle("hidden", type !== "bass");
        transitionSubcommandRow.classList.toggle("hidden", type !== "transition");
      }
      typeSelect.addEventListener("change", updateGeneratrSubcommandVisibility);
      updateGeneratrSubcommandVisibility();

      if (sidebarToggle && sidebar) {
        // Ensure initial icon/title match initial collapsed state
        (function syncSidebarToggleState() {
          var collapsed = sidebar.classList.contains("collapsed");
          sidebarToggleIcon.className = collapsed ? "fa-solid fa-chevron-left" : "fa-solid fa-chevron-right";
          sidebarToggle.title = collapsed ? "Show generate sidebar" : "Hide generate sidebar";
        })();

        sidebarToggle.addEventListener("click", function () {
          sidebar.classList.toggle("collapsed");
          var collapsed = sidebar.classList.contains("collapsed");
          sidebarToggleIcon.className = collapsed ? "fa-solid fa-chevron-left" : "fa-solid fa-chevron-right";
          sidebarToggle.title = collapsed ? "Show generate sidebar" : "Hide generate sidebar";
        });
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var type = typeSelect.value;
        var subcommand = "";
        if (type === "bass") subcommand = document.getElementById("generatr-subcommand").value;
        else if (type === "transition") subcommand = document.getElementById("generatr-transition-subcommand").value;

        btnGenerate.disabled = true;
        loadingEl.classList.remove("hidden");
        resultEl.classList.add("hidden");
        pathsList.innerHTML = "";
        errorEl.classList.add("hidden");
        errorEl.textContent = "";

        fetch("/api/generatr/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: type, subcommand: subcommand || undefined })
        })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            resultEl.classList.remove("hidden");
            if (data.error) {
              errorEl.textContent = data.error;
              errorEl.classList.remove("hidden");
            } else {
              if (data.paths && data.paths.length) {
                data.paths.forEach(function (path) {
                  var li = document.createElement("li");
                  li.textContent = path;
                  pathsList.appendChild(li);
                });
              } else {
                pathsList.appendChild(document.createTextNode("(no files returned)"));
              }
              socket.emit("requestExports");
            }
          })
          .catch(function (err) {
            resultEl.classList.remove("hidden");
            errorEl.textContent = err.message || "Request failed";
            errorEl.classList.remove("hidden");
          })
          .finally(function () {
            btnGenerate.disabled = false;
            loadingEl.classList.add("hidden");
          });
      });
    })();
  </script>
</body>

</html>
