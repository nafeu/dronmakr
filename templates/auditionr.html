<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ pagename }} | dronmakr v{{ version }}</title>
  <script src="/static/vendor/socket.io.min.js"></script>
  <script src="/static/vendor/wavesurfer.min.js"></script>
  {% include '_app_favicons.html' %}
  <link rel="stylesheet" href="/static/vendor/fonts/fragment-mono.css">
  <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css">
  <style>
    {% include '_app_css_root.html' %}

    body {
      height: 100%;
      box-sizing: border-box;
      overflow: hidden;
      padding-top: calc(var(--toolbar-height) + 0.1rem);
      padding-right: 0;
      display: flex;
      flex-direction: column;
    }

    /* Themed scrollbar */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--theme-a) var(--secondary);
    }

    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    *::-webkit-scrollbar-track {
      background: var(--secondary);
    }

    *::-webkit-scrollbar-thumb {
      background: var(--theme-a);
      border-radius: 4px;
    }

    *::-webkit-scrollbar-thumb:hover {
      background: var(--theme-b);
    }

    /* Floating chip (bottom-left): mirror #app-version-chip */
    #auditionr-actions-chip.auditionr-floating-chip {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 1100;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.35rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--theme-a);
      background: rgba(0, 0, 0, 0.82);
      color: var(--primary);
      font-size: 0.72rem;
      backdrop-filter: blur(3px);
      box-sizing: border-box;
      max-width: calc(100vw - 24px);
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .auditionr-chip-sep {
      width: 1px;
      align-self: stretch;
      min-height: 1rem;
      background: var(--theme-a);
      opacity: 0.85;
      flex-shrink: 0;
    }

    .auditionr-chip-seg {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      white-space: nowrap;
    }

    .auditionr-chip-seg i {
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .auditionr-chip-stat {
      opacity: 0.95;
      user-select: none;
    }

    .auditionr-chip-btn {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.15s ease;
    }

    .auditionr-chip-btn:hover:not(:disabled) {
      opacity: 1;
    }

    .auditionr-chip-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .auditionr-layout {
      display: flex;
      width: 100%;
      max-width: 100%;
      gap: 0;
      flex: 1 1 auto;
      min-height: 0;
    }

    .auditionr-main {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #waveforms {
      max-width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding-right: 0.5rem;
      padding-bottom: 4rem;
      box-sizing: border-box;
      position: relative;
    }

    .queue-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      pointer-events: none;
      color: var(--theme-b);
      opacity: 0.7;
      font-size: 0.9rem;
      text-align: center;
    }

    .queue-empty-icon {
      font-size: 1.6rem;
      color: var(--theme-a);
    }

    .auditionr-sidebar {
      width: 600px;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      transition: width 0.2s ease, min-width 0.2s ease;
      overflow: hidden;
    }

    .auditionr-sidebar.collapsed {
      width: 0;
      min-width: 0;
      border-left-width: 0;
      overflow: hidden;
    }

    .auditionr-sidebar-content {
      min-width: 500px;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .sidebar-toggle {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      width: 20px;
      height: 48px;
      padding: 0;
      border: none;
      border-radius: 0 4px 4px 0;
      background: var(--theme-a);
      color: var(--primary);
      cursor: pointer;
      font-size: 0.75rem;
      z-index: 2;
      transition: background 0.15s ease;
    }

    .sidebar-toggle:hover {
      background: var(--primary);
      color: var(--secondary);
    }

    .auditionr-sidebar-wrapper {
      position: relative;
      flex-shrink: 0;
      min-width: 20px;
      height: 100%;
      min-height: 0;
      align-self: stretch;
      display: flex;
      flex-direction: column;
    }

    .generatr-card {
      padding: 1rem;
      padding-left: 2rem;
      overflow-y: scroll;
      max-height: 85vh;
    }

    .generatr-card h2 {
      font-size: 0.9rem;
      margin: 0 0 0.75rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary);
    }

    .edit-samples-card {
      border: none;
      box-shadow: none;
      background: transparent;
      padding-left: 2rem;
      padding-right: 1rem;
      min-height: 85vh;
    }

    .generatr-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.65rem 0.85rem;
      align-items: start;
    }

    .generatr-form .form-row {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.3rem;
      min-width: 0;
    }

    /* Type, subcommands as single selects, checkbox blocks, post-processing */
    .generatr-form .form-row-full {
      grid-column: 1 / -1;
    }

    .generatr-form > .btn-generate {
      grid-column: 1 / -1;
    }

    .generatr-form .form-row > label:first-of-type {
      font-size: 0.72rem;
      color: var(--theme-a);
      text-align: left;
      align-self: flex-start;
      min-width: 0;
      line-height: 1.2;
      margin: 0;
    }

    .generatr-form .form-row select,
    .generatr-form .form-row input[type="text"],
    .generatr-form .form-row input[type="number"] {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.4rem 0.5rem;
      background: var(--theme-a);
      border: 1px solid var(--theme-a);
      border-radius: 4px;
      color: var(--primary);
      width: 100%;
      box-sizing: border-box;
      min-width: 0;
      cursor: pointer;
    }

    .generatr-form .form-row select:focus,
    .generatr-form .form-row input[type="text"]:focus,
    .generatr-form .form-row input[type="number"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    .generatr-form .form-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      flex: 0 0 auto;
      accent-color: var(--primary);
    }

    .generatr-form .form-row.form-row-post-processing {
      align-items: stretch;
    }

    .generatr-post-processing-root {
      width: 100%;
      min-width: 0;
    }

    .generatr-pp-columns {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 0.65rem;
      align-items: stretch;
      min-height: 180px;
      max-height: 280px;
    }

    .generatr-pp-library,
    .generatr-pp-queue-panel {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      padding: 8px;
      background: rgba(0, 0, 0, 0.15);
    }

    .generatr-pp-library {
      max-height: 200px;
    }

    .generatr-pp-filter {
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.35rem 0.45rem;
      border-radius: 4px;
      border: 1px solid var(--theme-a);
      background: var(--theme-a);
      color: var(--primary);
      width: 100%;
      box-sizing: border-box;
    }

    .generatr-pp-shortcut-buttons {
      flex: 1 1 auto;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
    }

    .generatr-pp-shortcut-btn {
      font-family: inherit;
      font-size: 0.72rem;
      text-align: left;
      padding: 0.35rem 0.45rem;
      border-radius: 4px;
      border: 1px solid var(--theme-a);
      background: transparent;
      color: var(--theme-a);
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: baseline;
      justify-content: flex-start;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .generatr-pp-shortcut-type {
      color: var(--primary);
      flex-shrink: 0;
      font-weight: 600;
    }

    .generatr-pp-shortcut-name {
      color: var(--theme-a);
      min-width: 0;
    }

    .generatr-pp-shortcut-btn:hover {
      border-color: var(--primary);
    }

    .generatr-pp-shortcut-btn:hover .generatr-pp-shortcut-name {
      color: var(--primary);
    }

    .generatr-pp-queue-label {
      font-size: 0.72rem;
      color: var(--theme-a);
    }

    .generatr-pp-queue-hint {
      opacity: 0.75;
      font-weight: normal;
    }

    .generatr-pp-queue {
      flex: 1 1 auto;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
    }

    .generatr-pp-queue-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--primary);
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
      cursor: grab;
    }

    .generatr-pp-queue-item:active {
      cursor: grabbing;
    }

    .generatr-pp-drag-handle {
      flex: 0 0 auto;
      opacity: 0.45;
      cursor: grab;
      user-select: none;
      font-size: 0.9rem;
    }

    .generatr-pp-queue-item-label {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .generatr-pp-queue-remove {
      flex: 0 0 auto;
      border: none;
      background: transparent;
      color: var(--theme-a);
      cursor: pointer;
      padding: 0 4px;
      font-size: 1rem;
      line-height: 1;
    }

    .generatr-pp-queue-remove:hover {
      color: var(--primary);
    }

    @media (max-width: 520px) {
      .generatr-pp-columns {
        grid-template-columns: 1fr;
        max-height: none;
      }
    }

    .generatr-checkbox-group,
    #generatr-beat-variants-list {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.85rem;
    }

    .generatr-checkbox-group label,
    #generatr-beat-variants-list label {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: var(--primary);
      margin: 0;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-generate {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.45rem 0.85rem;
      background: var(--primary);
      color: var(--secondary);
      border: 1px solid var(--primary);
      border-radius: 4px;
      cursor: pointer;
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: opacity 0.15s ease;
    }

    .btn-generate:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn-generate:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .generatr-result {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--theme-a);
      padding-inline: 1.5rem;
    }

    .generatr-result.hidden {
      display: none;
    }

    .generatr-result .error {
      color: var(--theme-c);
      font-size: 0.8rem;
    }

    .generatr-result .generatr-error.hidden {
      display: none;
    }

    .hidden {
      display: none !important;
    }

    .auditionr-sidebar-tabs {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }

    .sidebar-tab-row {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--theme-a);
      flex-shrink: 0;
    }

    .sidebar-tab-btn {
      flex: 1;
      padding: 0.55rem 0.5rem;
      font-size: 0.78rem;
      border: none;
      background: none;
      color: var(--theme-a);
      cursor: pointer;
      font-family: inherit;
    }

    .sidebar-tab-btn.sidebar-tab-active {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
    }

    .sidebar-tab-panel {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .sidebar-tab-panel.hidden {
      display: none !important;
    }

    #sidebar-panel-generate {
      position: relative;
    }

    .generatr-busy-overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1.5rem;
      background: color-mix(in srgb, var(--secondary) 93%, transparent);
      color: var(--primary);
      text-align: center;
      pointer-events: auto;
    }

    .generatr-busy-overlay.hidden {
      display: none !important;
    }

    .generatr-busy-icon {
      font-size: 2.85rem;
      line-height: 1;
      color: var(--primary);
    }

    .generatr-busy-text {
      font-size: 1.65rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .edit-action-nav {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 0.75rem;
      padding-right: 2px;
      flex-wrap: wrap;
    }

    .edit-action-nav-btn {
      text-align: left;
      font-family: inherit;
      font-size: 0.78rem;
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: transparent;
      color: var(--theme-a);
      cursor: pointer;
    }

    .edit-action-nav-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .edit-action-nav-btn.edit-action-nav-active {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(255, 149, 5, 0.08);
    }

    .edit-action-detail .edit-sample-section {
      display: none;
    }

    .edit-action-detail .edit-sample-section.edit-sample-section-visible {
      display: block;
    }

    .edit-sample-section {
      border: none;
      border-radius: 0;
      padding: 0;
      margin: 0;
    }

    .edit-sample-section h3 {
      font-size: 0.82rem;
      margin: 0 0 0.45rem 0;
      color: var(--primary);
    }

    .edit-effect-viz-wrap {
      margin: 0 0 0.55rem 0;
      padding: 0;
      border: none;
      border-radius: 0;
      background: color-mix(in srgb, var(--secondary) 92%, transparent);
      overflow: hidden;
      box-sizing: border-box;
    }

    canvas.edit-effect-viz {
      display: block;
      width: 100%;
      min-height: 172px;
      height: auto;
      vertical-align: top;
      pointer-events: none;
      cursor: default;
    }

    .edit-presets-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin: 0;
    }

    .edit-presets-divider {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      margin: 0.65rem 0 0.5rem 0;
      padding: 0;
      height: 0;
    }

    .edit-apply-row {
      width: 100%;
      margin-top: 0.65rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem;
    }

    .edit-apply-row .btn-edit-apply {
      width: 30%;
      flex: 0 0 auto;
      margin-top: 0;
    }

    .edit-shortcut-name-input {
      flex: 1 1 140px;
      min-width: 0;
      font-family: inherit;
      font-size: 0.78rem;
      padding: 0.35rem 0.45rem;
      border-radius: 4px;
      border: 1px solid var(--theme-a);
      background: var(--theme-a);
      color: var(--primary);
      box-sizing: border-box;
    }

    .btn-edit-shortcut-save,
    .btn-edit-shortcuts-mode {
      flex: 0 0 auto;
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      border: 1px solid var(--theme-a);
      background: transparent;
      color: var(--theme-a);
      cursor: pointer;
    }

    .btn-edit-shortcut-save:hover,
    .btn-edit-shortcuts-mode:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-edit-shortcuts-mode.active {
      border-color: var(--primary);
      color: var(--primary);
    }

    .edit-preset-wrap {
      display: inline-flex;
      align-items: stretch;
      gap: 0;
    }

    .edit-preset-wrap .edit-preset-btn {
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }

    .edit-preset-delete {
      font-family: inherit;
      font-size: 0.65rem;
      padding: 0.25rem 0.35rem;
      border-radius: 0 4px 4px 0;
      border: 1px solid var(--theme-a);
      border-left: none;
      background: transparent;
      color: var(--theme-a);
      cursor: pointer;
      line-height: 1;
    }

    .edit-preset-delete:hover {
      color: #f66;
      border-color: #f66;
    }

    .edit-preset-delete.hidden {
      display: none;
    }

    .edit-preset-wrap .edit-preset-btn.solo-radius {
      border-radius: 4px;
    }

    .edit-preset-btn {
      font-size: 0.65rem;
      padding: 0.25rem 0.45rem;
      border-radius: 4px;
      border: 1px solid var(--theme-a);
      background: transparent;
      color: var(--theme-a);
      cursor: pointer;
      font-family: inherit;
    }

    .edit-preset-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .edit-controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.5rem 0.85rem;
      align-items: start;
      margin: 0;
    }

    .edit-control-row {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.2rem;
      font-size: 0.72rem;
      color: var(--theme-a);
      min-width: 0;
    }

    /* Edit sidebar sliders (beatbuildr-style track + thumb; native track hidden) */
    .edit-control-row-slider {
      gap: 0.35rem;
    }

    .edit-slider-label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
      width: 100%;
      min-width: 0;
    }

    .edit-slider-param-label {
      font-size: 0.72rem;
      color: var(--theme-a);
      line-height: 1.2;
      text-align: left;
      flex: 1 1 auto;
      min-width: 0;
    }

    .edit-slider-value-display {
      font-size: 0.78rem;
      color: var(--primary);
      font-weight: 600;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .auditionr-sidebar-slider-wrap {
      position: relative;
      width: 100%;
      height: 1.65rem;
      display: flex;
      align-items: center;
      box-sizing: border-box;
    }

    .auditionr-sidebar-slider-fake-track {
      position: absolute;
      left: 0;
      right: 0;
      top: 52%;
      transform: translateY(-50%);
      height: 3px;
      background: var(--theme-a);
      pointer-events: none;
      z-index: 1;
      border-radius: 2px;
    }

    .auditionr-sidebar-slider-wrap input[type="range"] {
      position: relative;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      z-index: 2;
    }

    /* Thin invisible native track so the thumb centers on the same line as the fake track */
    .auditionr-sidebar-slider-wrap input[type="range"]::-webkit-slider-runnable-track {
      background: transparent;
      border: none;
      height: 3px;
    }

    .auditionr-sidebar-slider-wrap input[type="range"]::-webkit-slider-track {
      background: transparent;
      border: none;
      height: 3px;
    }

    .auditionr-sidebar-slider-wrap input[type="range"]::-moz-range-track {
      background: transparent;
      border: none;
      height: 3px;
    }

    .auditionr-sidebar-slider-wrap input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: var(--primary);
      border: 2px solid var(--secondary);
      border-radius: 50%;
      cursor: pointer;
      margin-top: -7px;
    }

    .auditionr-sidebar-slider-wrap input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: var(--primary);
      border: 2px solid var(--secondary);
      border-radius: 50%;
      cursor: pointer;
      box-sizing: border-box;
    }

    .auditionr-sidebar-slider-wrap input[type="range"]:focus {
      outline: none;
    }

    .edit-control-row select {
      font-family: inherit;
      font-size: 0.78rem;
      padding: 0.35rem;
      background: var(--theme-a);
      border: 1px solid var(--theme-a);

  <div class="auditionr-layout page-layout">
    <div class="auditionr-main">

        <div id="waveform-container"></div>
        <div id="queue-empty-placeholder" class="queue-empty hidden">

        </div>

    </div>
    <div class="auditionr-sidebar-wrapper">

      <aside class="auditionr-sidebar collapsed" id="auditionr-sidebar">

          <div class="auditionr-sidebar-tabs">
            <div class="sidebar-tab-row">
              <button type="button" class="sidebar-tab-btn sidebar-tab-active" id="sidebar-tab-btn-generate" data-sidebar-tab="generate"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate Samples</button>

                </select>
              </div>
              <div class="form-row form-row-full form-row-subcommand hidden" id="generatr-transition-subcommand-row">
                <label for="generatr-transition-subcommand">Subcommand</label>
                <select id="generatr-transition-subcommand" name="transition_subcommand">
                  <option value="sweep">sweep</option>
                  <option value="closh">closh</option>
                  <option value="kickboom">kickboom</option>
                  <option value="longcrash">longcrash</option>
                  <option value="riser">riser</option>

              </div>
              <div class="form-row hidden" id="generatr-drone-name-row">

              </div>
              <div class="form-row hidden" id="generatr-drone-notes-row">

              </div>
              <div class="form-row hidden" id="generatr-drone-chart-name-row">

                <input type="text" id="generatr-drone-chart-name" placeholder="filter by chart name substring">
              </div>
              <div class="form-row hidden" id="generatr-drone-chart-type-row">
                <label for="generatr-drone-chart-type">Chart type</label>
                <select id="generatr-drone-chart-type" name="drone_chart_type">

                </select>
              </div>
              <div class="form-row hidden" id="generatr-drone-tags-row">

                <input type="text" id="generatr-drone-tags" placeholder="comma-separated">
              </div>
              <div class="form-row hidden" id="generatr-drone-roots-row">

                <input type="text" id="generatr-drone-roots" placeholder="comma-separated">
              </div>
              <div class="form-row hidden" id="generatr-drone-pattern-row">
                <label for="generatr-drone-pattern">MIDI pattern</label>
                <select id="generatr-drone-pattern"></select>
              </div>
              <div class="form-row hidden" id="generatr-drone-instrument-row">
                <label for="generatr-drone-instrument">Instrument</label>

              <div class="form-row hidden" id="generatr-drone-iterations-row">

              <div class="form-row form-row-full hidden" id="generatr-drone-split-row">

                  <label><input type="checkbox" id="generatr-drone-split"> Split processing milestones</label>
                </div>
              </div>
              <div class="form-row hidden" id="generatr-beat-tempo-row">

                <input type="number" id="generatr-beat-tempo" min="1" placeholder="pattern tempo">
              </div>
              <div class="form-row hidden" id="generatr-beat-loops-row">
                <label for="generatr-beat-loops">Loops</label>
                <input type="number" id="generatr-beat-loops" min="1" value="2">
              </div>
              <div class="form-row hidden" id="generatr-beat-pattern-row">
                <label for="generatr-beat-pattern">Pattern</label>
                <input type="text" id="generatr-beat-pattern" placeholder="use random pattern">
              </div>
              <div class="form-row hidden" id="generatr-beat-kit-row">
                <label for="generatr-beat-kit">Kit</label>
                <input type="text" id="generatr-beat-kit" placeholder="use random kit">
              </div>
              <div class="form-row hidden" id="generatr-beat-randomization-config-row">
                <label for="generatr-beat-randomization-config">Sample Library</label>
                <select id="generatr-beat-randomization-config"></select>
              </div>
              <div class="form-row hidden" id="generatr-beat-swing-row">
                <label for="generatr-beat-swing">Swing</label>
                <input type="number" id="generatr-beat-swing" min="0" max="1" step="0.01" value="0">
              </div>
              <div class="form-row hidden" id="generatr-beat-iterations-row">
                <label for="generatr-beat-iterations">Iterations</label>
                <input type="number" id="generatr-beat-iterations" min="1" value="1">
              </div>
              <div class="form-row form-row-full hidden" id="generatr-beat-variants-row">
                <label>Render Variants</label>
                <div id="generatr-beat-variants-list">
                  <label><input type="checkbox" value="1/2">1/2 Tempo</label>
                  <label><input type="checkbox" value="1/4">1/4 Tempo</label>
                  <label><input type="checkbox" value="3/4">3/4 Tempo</label>
                </div>
              </div>
              <div class="form-row form-row-full form-row-post-processing hidden" id="generatr-beat-post-processing-row">
                <label for="generatr-pp-filter">Post Processing</label>
                <div id="generatr-beat-post-processing-root" class="generatr-post-processing-root">
                  <div class="generatr-pp-columns">
                    <div class="generatr-pp-library">

                      <div id="generatr-pp-shortcut-buttons" class="generatr-pp-shortcut-buttons" aria-label="Shortcut library"></div>
                    </div>
                    <div class="generatr-pp-queue-panel">
                      <div class="generatr-pp-queue-label">Processing Chain</div>
                      <div id="generatr-pp-queue" class="generatr-pp-queue" aria-label="Processing queue"></div>

              <button type="submit" class="btn-generate" id="generatr-btn">

            </form>
            <div class="generatr-result hidden" id="generatr-result">
              <p class="error generatr-error hidden" id="generatr-error"></p>
            </div>
          </div>
            </div>
            <div id="sidebar-panel-edit" class="sidebar-tab-panel hidden">
              <div class="generatr-card edit-samples-card">
                <div id="edit-action-nav" class="edit-action-nav" aria-label="Processing actions"></div>
                <div id="edit-action-detail" class="edit-action-detail"></div>
              </div>
            </div>
          </div>
        </div>
      </aside>
    </div>
