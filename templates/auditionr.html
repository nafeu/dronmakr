  <script>
    var socket = io();
    var lastFolderCounts = { archive: 0, trash: 0, exports: 0, saved: 0 };
    var selectedWaveformTimestamps = {};
    var processingCatalog = { types: [], actions: [], paramSchemas: {}, presets: [] };
    var AUDITIONR_WAVEFORM_VISIBLE = 4;
    var currentDisplayedFiles = [];
    var waveformInstances = {};
    var processingGuardMs = 120000;
    var db = 2;
    var lastEdited = "";
    var sharedAudioContext = null;
    var currentDrumpatternStop = null;
    var waveformDurations = {};
    var selectedEditAbsPath = null;
    var selectedEditApiPath = null;
    var AUDITIONR_SIDEBAR_TAB_KEY = "auditionr_sidebar_tab";
    var auditionrSidebarActiveTab = "generate";
    var editPanelSelectedActionType = "fade";

    var GENERATR_PP_QUEUE_KEY = "auditionr_post_process_queue";
    var generatrPostProcessQueue = [];
    var editShortcutsDeleteMode = false;
    var generatrPpDragSourceIndex = null;

    function loadGeneratrPostProcessQueueFromStorage() {
      try {
        var raw = sessionStorage.getItem(GENERATR_PP_QUEUE_KEY);
        if (!raw) return;
        var parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return;
        generatrPostProcessQueue = parsed
          .filter(function (x) {
            return x && typeof x.command === "string" && String(x.command).trim();
          })
          .map(function (x) {
            return {
              displayName: String(x.displayName || "").trim() || "Step",
              command: String(x.command).trim(),
            };
          });
      } catch (e) { /* ignore */ }
    }

    function saveGeneratrPostProcessQueueToStorage() {
      try {
        sessionStorage.setItem(GENERATR_PP_QUEUE_KEY, JSON.stringify(generatrPostProcessQueue));
      } catch (e) { /* ignore */ }
    }

    loadGeneratrPostProcessQueueFromStorage();

    var EDIT_SECTION_ORDER = ["fade", "eq", "gain", "filter", "noisegate", "timestretch", "paulstretch", "pitch", "reverb", "compress", "overdrive", "distort", "chorus", "flanger", "phaser"];
    /** Sections that render the passive parameter canvas above controls (values come from sliders only). */
    var EDIT_EFFECT_VIZ_TYPES = {
      eq: 1,
      filter: 1,
      noisegate: 1,
      compress: 1,
    };

    function mergeProcessingCatalog(payload) {
      if (!payload || typeof payload !== "object") return;
      processingCatalog.types = Array.isArray(payload.types) ? payload.types : [];
      processingCatalog.actions = Array.isArray(payload.actions) ? payload.actions : [];
      processingCatalog.paramSchemas = payload.paramSchemas || {};
      processingCatalog.presets = Array.isArray(payload.presets) ? payload.presets : [];
      renderEditSamplesPanel();
      renderGeneratrPostProcessingLibraryFromCatalog();
      renderGeneratrPostProcessingQueue();
    }

    function renderGeneratrPostProcessingLibraryFromCatalog() {
      var box = document.getElementById("generatr-pp-shortcut-buttons");
      var filterEl = document.getElementById("generatr-pp-filter");
      if (!box) return;
      var typesByKey = {};
      (processingCatalog.types || []).forEach(function (t) {
        typesByKey[String(t.key || "").trim().toLowerCase()] = String(t.label || t.key || "").trim();
      });
      var actions = (processingCatalog.actions || []).slice();
      var q = filterEl && filterEl.value ? String(filterEl.value).trim().toLowerCase() : "";
      box.innerHTML = "";
      actions.forEach(function (action) {
        var shortcutLabel = String(action.label || action.token || "").trim();
        var typeKey = String(action.type || "").trim().toLowerCase();
        var typeLabel = typesByKey[typeKey] || typeKey;
        var cmd = String(action.spec || action.token || "").trim();
        if (!cmd) return;
        var filterHaystack = (typeLabel + " " + shortcutLabel).toLowerCase();
        if (q && filterHaystack.indexOf(q) === -1) return;
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "generatr-pp-shortcut-btn";
        var typeSpan = document.createElement("span");
        typeSpan.className = "generatr-pp-shortcut-type";
        typeSpan.textContent = typeLabel;
        var nameSpan = document.createElement("span");
        nameSpan.className = "generatr-pp-shortcut-name";
        nameSpan.textContent = shortcutLabel;
        btn.appendChild(typeSpan);
        btn.appendChild(nameSpan);
        var displayName = (typeLabel + " " + shortcutLabel).trim();
        btn.title = cmd;
        btn.addEventListener("click", function () {
          generatrPostProcessQueue.push({ displayName: displayName, command: cmd });
          saveGeneratrPostProcessQueueToStorage();
          renderGeneratrPostProcessingQueue();
        });
        box.appendChild(btn);
      });
    }

    function renderGeneratrPostProcessingQueue() {
      var queueEl = document.getElementById("generatr-pp-queue");
      if (!queueEl) return;
      queueEl.innerHTML = "";
      generatrPostProcessQueue.forEach(function (item, idx) {
        var row = document.createElement("div");
        row.className = "generatr-pp-queue-item";
        row.draggable = true;

        var handle = document.createElement("span");
        handle.className = "generatr-pp-drag-handle";
        handle.textContent = "\u2630";
        handle.title = "Drag to reorder";

        var lab = document.createElement("span");
        lab.className = "generatr-pp-queue-item-label";
        lab.textContent = item.displayName || "Step";
        lab.title = item.command;

        var rm = document.createElement("button");
        rm.type = "button";
        rm.className = "generatr-pp-queue-remove";
        rm.innerHTML = "&times;";
        rm.setAttribute("aria-label", "Remove");
        rm.addEventListener("click", function () {
          generatrPostProcessQueue.splice(idx, 1);
          saveGeneratrPostProcessQueueToStorage();
          renderGeneratrPostProcessingQueue();
        });

        row.addEventListener("dragstart", function (e) {
          generatrPpDragSourceIndex = idx;
          e.dataTransfer.effectAllowed = "move";
          try {
            e.dataTransfer.setData("text/plain", String(idx));
          } catch (err) { /* ignore */ }
        });
        row.addEventListener("dragover", function (e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
        });
        row.addEventListener("drop", function (e) {
          e.preventDefault();
          var from = generatrPpDragSourceIndex;
          var to = idx;
          if (from === null || from === undefined || from === to) return;
          var copy = generatrPostProcessQueue.slice();
          var moved = copy.splice(from, 1)[0];
          copy.splice(to, 0, moved);
          generatrPostProcessQueue = copy;
          generatrPpDragSourceIndex = null;
          saveGeneratrPostProcessQueueToStorage();
          renderGeneratrPostProcessingQueue();
        });
        row.addEventListener("dragend", function () {
          generatrPpDragSourceIndex = null;
        });

        row.appendChild(handle);
        row.appendChild(lab);
        row.appendChild(rm);
        queueEl.appendChild(row);
      });
    }

    function fmtSpecNum(x) {
      if (typeof x !== "number" || isNaN(x)) return "0";
      var ax = Math.abs(x);
      var r = ax >= 100 ? 2 : (ax >= 10 ? 3 : 5);
      var s = Number(x.toFixed(r)).toString();
      return s;
    }

    function editSliderPhysical(schema, uRaw) {
      var u = Math.max(0, Math.min(1, parseFloat(uRaw)));
      if (schema.range_db) return schema.range_db[0] + (schema.range_db[1] - schema.range_db[0]) * u;
      if (schema.range_hz) return schema.range_hz[0] + (schema.range_hz[1] - schema.range_hz[0]) * u;
      if (schema.range_ms) return schema.range_ms[0] + (schema.range_ms[1] - schema.range_ms[0]) * u;
      if (schema.range_linear) return schema.range_linear[0] + (schema.range_linear[1] - schema.range_linear[0]) * u;
      return u;
    }

    function formatEditSliderDisplay(schema, uRaw) {
      var phys = editSliderPhysical(schema, uRaw);
      if (schema.range_db) return fmtSpecNum(phys) + " dB";
      if (schema.range_hz) return fmtSpecNum(phys) + " Hz";
      if (schema.range_ms) return fmtSpecNum(phys) + " ms";
      if (schema.range_linear) return fmtSpecNum(phys);
      return fmtSpecNum(phys);
    }

    function clamp01(u) {
      var x = parseFloat(u);
      if (!isFinite(x)) return 0.5;
      return Math.max(0, Math.min(1, x));
    }

    function editPhysicalToNormalized(schema, phys) {
      if (!schema) return 0.5;
      var p = parseFloat(phys);
      if (!isFinite(p)) return 0.5;
      function invRange(a0, a1) {
        var denom = a1 - a0;
        if (!isFinite(denom) || denom === 0) return 0.5;
        return (p - a0) / denom;
      }
      if (schema.range_db) return clamp01(invRange(schema.range_db[0], schema.range_db[1]));
      if (schema.range_hz) return clamp01(invRange(schema.range_hz[0], schema.range_hz[1]));
      if (schema.range_ms) return clamp01(invRange(schema.range_ms[0], schema.range_ms[1]));
      if (schema.range_linear)
        return clamp01(invRange(schema.range_linear[0], schema.range_linear[1]));
      return clamp01(p);
    }

    function editSchemaLookup(typeKey, key) {
      var schemas = (processingCatalog.paramSchemas && processingCatalog.paramSchemas[typeKey]) || [];
      for (var i = 0; i < schemas.length; i++) {
        if (schemas[i].key === key) return schemas[i];
      }
      return null;
    }

    /** Lightweight filter magnitude sketches for log-frequency preview. */
    function editVizButterMagLP(fc, hz, poles) {
      var n = Math.max(2, Math.min(Number(poles) || 4, 48));
      var r = hz / Math.max(fc, 1e-9);
      return Math.min(1, 1 / Math.sqrt(1 + Math.pow(r, 2 * n)));
    }

    function editVizButterMagHP(fc, hz, poles) {
      var n = Math.max(2, Math.min(Number(poles) || 4, 48));
      var r = hz / Math.max(fc, 1e-9);
      var rp = Math.pow(Math.max(r, 1e-9), n);
      return Math.min(1, rp / Math.sqrt(1 + Math.pow(r, 2 * n)));
    }

    function editVizMagResBell(fcCentre, hz, res) {
      var rsn = clamp01(res);
      if (rsn < 0.04) return 1;
      var oct = Math.log(hz / Math.max(fcCentre, 1e-9)) / Math.LN2;
      var sigma = 0.2 + (1 - rsn) * 0.38;
      return 1 + rsn * 1.08 * Math.exp(-(oct * oct) / (2 * sigma * sigma));
    }

    /** Magnitude sketches vs steepness/resonance (visual guide; audio uses Chebyshev II + peaking). */
    function editVizMagLP(fc, hz, poles, resonance) {
      var p = poles != null ? poles : 4;
      var m = editVizButterMagLP(fc, hz, p);
      return clamp01(m * editVizMagResBell(fc, hz, resonance != null ? resonance : 0));
    }

    function editVizMagHP(fc, hz, poles, resonance) {
      var p = poles != null ? poles : 4;
      var m = editVizButterMagHP(fc, hz, p);
      return clamp01(m * editVizMagResBell(fc, hz, resonance != null ? resonance : 0));
    }

    function editVizMagBPF(flow, fhigh, hz, poles, resonance) {
      var p = poles != null ? poles : 4;
      var mag = editVizButterMagHP(flow, hz, p) * editVizButterMagLP(fhigh, hz, p);
      var cen = Math.sqrt(Math.max(flow * fhigh, 1));
      return clamp01(mag * editVizMagResBell(cen, hz, resonance != null ? resonance : 0));
    }

    function getEditControlNormalized(sectionEl, schemaKey, fallbackU) {
      var el = sectionEl.querySelector('[data-schema-key="' + schemaKey + '"]');
      if (!el) return fallbackU != null ? clamp01(fallbackU) : 0.5;
      return clamp01(el.value);
    }

    /** Read theme colors for canvases (auditionrReadCssVar hoisted to same script scope). */
    function editEffectVizCssColors() {
      return {
        primary: auditionrReadCssVar("--primary", "#ff9505"),
        secondary: auditionrReadCssVar("--secondary", "#000000"),
        themeA: auditionrReadCssVar("--theme-a", "#353531"),
        themeB: auditionrReadCssVar("--theme-b", "#016fb9"),
        themeC: auditionrReadCssVar("--theme-c", "#ec4e20"),
        themeD: auditionrReadCssVar("--theme-d", "#FFFFFF"),
        themeE: auditionrReadCssVar("--theme-e", "#2e8b57"),
      };
    }

    /** lnRatio from freq in Hz; f clamped inside [fMin,fMax]; axis is logarithmic between fMin and fMax */
    function editVizHzToLogRatio(freq, fMin, fMax) {
      var hz = parseFloat(freq);
      if (!isFinite(hz) || hz <= 0) hz = fMin;
      hz = Math.max(fMin, Math.min(fMax, hz));
      return (Math.log(hz / fMin)) / Math.log(fMax / fMin);
    }

    /** inverse of editVizHzToLogRatio */
    function editVizLogRatioToHz(lnRatio, fMin, fMax) {
      var r = clamp01(lnRatio);
      var hz = Math.exp(r * Math.log(fMax / fMin)) * fMin;
      return Math.max(fMin, Math.min(fMax, hz));
    }

    var _editVizPaintScheduled = false;
    function queueEditVisibleEffectVizRepaint() {
      if (_editVizPaintScheduled) return;
      _editVizPaintScheduled = true;
      var rqf = typeof window.requestAnimationFrame === "function" ? window.requestAnimationFrame.bind(window) : function (fn) { setTimeout(fn, 18); };
      rqf(function () {
        _editVizPaintScheduled = false;
        var visible = document.querySelector(".edit-sample-section.edit-sample-section-visible");
        if (visible && typeof visible.__repaintEditEffectViz === "function") visible.__repaintEditEffectViz();
      });
    }

    function drawEditVizGrid(ctx, gx0, gy0, gx1, gy1, css) {
      ctx.strokeStyle = css.themeA;
      ctx.globalAlpha = 0.2;
      ctx.lineWidth = 1;
      for (var i = 1; i < 12; i++) {
        var x = gx0 + (gx1 - gx0) * (i / 12);
        ctx.beginPath(); ctx.moveTo(x, gy0); ctx.lineTo(x, gy1); ctx.stroke();
      }
      for (var j = 1; j < 9; j++) {
        var y = gy0 + (gy1 - gy0) * (j / 9);
        ctx.beginPath(); ctx.moveTo(gx0, y); ctx.lineTo(gx1, y); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    /** Map symmetric peaking EQ dB (+/- range) onto vertical span (top brighter = +12 dB). */
    function editVizDbToVerticalY(dbBell, yTopBright, yBotQuiet) {
      var maxDb = 12;
      var t = clamp01((dbBell + maxDb) / (2 * maxDb));
      return yTopBright + (1 - t) * (yBotQuiet - yTopBright);
    }

    function editVizWaveshaperDrive(t01, steep) {
      steep = Math.max(steep, 0.02);
      var x = (clamp01(t01) * 2 - 1) * 1.42;
      var denom = Math.tanh(1.42 * steep);
      if (!isFinite(denom) || Math.abs(denom) < 1e-12) return clamp01(t01) * 2 - 1;
      return Math.tanh(x * steep) / denom;
    }

    function installEditEffectViz(sec, typeKey) {
      var vizWrap = sec.querySelector(".edit-effect-viz-wrap");
      var canvas = sec.querySelector("canvas.edit-effect-viz");
      if (!vizWrap || !canvas) return;

      var cssHCanvas = 172;

      function dprComputed() {
        return typeof window.devicePixelRatio === "number" && window.devicePixelRatio > 0 ? window.devicePixelRatio : 1;
      }

      function resizeBacking() {
        var dpr = dprComputed();
        var w = vizWrap.clientWidth || 260;
        if (w <= 1) return false;
        canvas.style.height = cssHCanvas + "px";
        canvas.width = Math.max(220, Math.floor(w * dpr));
        canvas.height = Math.floor(cssHCanvas * dpr);
        return true;
      }

      function schema(key) {
        return editSchemaLookup(typeKey, key);
      }

      function phys(key) {
        var s = schema(key);
        var u = getEditControlNormalized(sec, key, s && s.default != null ? s.default : 0.5);
        return s ? editSliderPhysical(s, u) : 0;
      }

      function uNorm(key, fb) {
        return getEditControlNormalized(sec, key, fb);
      }

      function paintPassiveFrame() {
        if (!resizeBacking()) return;
        var colors = editEffectVizCssColors();
        var ctx = canvas.getContext("2d");
        if (!ctx || canvas.width <= 8) return;
        ctx.setTransform(dprComputed(), 0, 0, dprComputed(), 0, 0);

        var cssW = vizWrap.clientWidth || canvas.offsetWidth || 260;
        var cssHcss = cssHCanvas;
        ctx.clearRect(0, 0, cssW, cssHcss);

        ctx.globalAlpha = 0.94;
        ctx.fillStyle = colors.secondary;
        ctx.fillRect(0, 0, cssW, cssHcss);
        ctx.globalAlpha = 1;

        var pad = Math.max(22, cssW * 0.06);
        var gx0 = pad;
        var gy0 = pad;
        var gx1 = cssW - pad;
        var gy1 = cssHcss - pad * 0.55;

        drawEditVizGrid(ctx, gx0, gy0, gx1, gy1, colors);

        switch (typeKey) {
          case "eq":
            paintEq(ctx, gx0, gy0, gx1, gy1, colors);
            break;
          case "filter":
            paintFilter(ctx, gx0, gy0, gx1, gy1, colors);
            break;
          case "noisegate":
            paintNoisegate(ctx, gx0, gy0, gx1, gy1, colors);
            break;
          case "reverb":
            paintReverb(ctx, gx0, gy0, gx1, gy1, colors);
            break;
          case "compress":
            paintCompress(ctx, gx0, gy0, gx1, gy1, colors);
            break;
          case "overdrive":
            paintOverdrive(ctx, gx0, gy0, gx1, gy1, colors);
            break;
          case "distort":
            paintDistort(ctx, gx0, gy0, gx1, gy1, colors);
            break;
          case "chorus":
            paintModDelay(ctx, gx0, gy0, gx1, gy1, colors, "chorus");
            break;
          case "flanger":
            paintModDelay(ctx, gx0, gy0, gx1, gy1, colors, "flanger");
            break;
          case "phaser":
            paintModDelay(ctx, gx0, gy0, gx1, gy1, colors, "phaser");
            break;
          default:
            ctx.font = "12px Fragment Mono, monospace";
            ctx.fillStyle = colors.themeA;
            ctx.textAlign = "center";
            ctx.fillText("No preview for this effect.", cssW / 2, cssHcss / 2);
        }
      }

      function caption(ctx2, css3, x, y, text) {
        ctx2.font = "10px Fragment Mono, monospace";
        ctx2.fillStyle = css3.themeA;
        ctx2.textAlign = "left";
        ctx2.textBaseline = "alphabetic";
        ctx2.fillText(text, x, y);
      }

      function paintEq(ctx2, xmin, ymin, xmax, ymax, css2) {
        var band = readEditControl(sec, "band") || "lows";
        var fc = band === "highs" ? 5200 : band === "mids" ? 1400 : 220;
        var bwOct = band === "highs" ? 0.78 : band === "mids" ? 1.02 : 0.92;
        var db = phys("db_ui");
        var fLo = 40;
        var fHi = 18000;
        var yNom = ymin + (ymax - ymin) * 0.5;
        var yTopBell = ymin + (ymax - ymin) * 0.16;
        var yBotBell = ymin + (ymax - ymin) * 0.88;

        ctx2.strokeStyle = css2.themeA;
        ctx2.globalAlpha = 0.45;
        ctx2.lineWidth = 1;
        [140, 1000, 8000].forEach(function (fx) {
          if (fx < fLo || fx > fHi) return;
          var lx = xmin + editVizHzToLogRatio(fx, fLo, fHi) * (xmax - xmin);
          ctx2.beginPath(); ctx2.moveTo(lx, ymin); ctx2.lineTo(lx, ymax); ctx2.stroke();
        });
        ctx2.globalAlpha = 1;

        ctx2.strokeStyle = css2.themeD;
        ctx2.globalAlpha = 0.42;
        ctx2.setLineDash([5, 4]);
        ctx2.beginPath();
        ctx2.moveTo(xmin, yNom); ctx2.lineTo(xmax, yNom); ctx2.stroke();
        ctx2.setLineDash([]); ctx2.globalAlpha = 1;

        ctx2.strokeStyle = css2.primary;
        ctx2.lineWidth = 2;
        ctx2.beginPath();
        for (var k = 0; k <= 160; k++) {
          var u = k / 160;
          var fhz = fLo * Math.pow(fHi / fLo, u);
          var x = xmin + u * (xmax - xmin);
          var oct = Math.log(Math.max(fhz, 1e-9) / Math.max(fc, 1e-9)) / Math.LN2;
          var bell = Math.exp(-((oct / bwOct) * (oct / bwOct)));
          var y = editVizDbToVerticalY(bell * db, yTopBell, yBotBell);
          if (!k) ctx2.moveTo(x, y); else ctx2.lineTo(x, y);
        }
        ctx2.stroke();

        ctx2.font = "9px Fragment Mono, monospace";
        ctx2.fillStyle = css2.themeA;
        ctx2.textAlign = "center";
        ctx2.textBaseline = "top";
        [100, 400, 1600, 6400].forEach(function (fz) {
          if (fz < fLo || fz > fHi) return;
          var tx = xmin + editVizHzToLogRatio(fz, fLo, fHi) * (xmax - xmin);
          ctx2.fillText(fz >= 1000 ? (fz / 1000) + "k" : String(fz), tx, ymin - 2);
        });

        caption(ctx2, css2, xmin + 4, ymin + 14, "EQ · " + band + " bell ~" + fmtSpecNum(fc) + " Hz · " + fmtSpecNum(db) + " dB");
      }

      function paintFilter(ctx2, xmin, ymin, xmax, ymax, css2) {
        var kind = readEditControl(sec, "kind") || "lpf";
        var cutoff = editSliderPhysical(schema("cutoff_hz_ui"), uNorm("cutoff_hz_ui", 0.55));
        var low = Math.min(phys("low_hz_ui"), phys("high_hz_ui"));
        var hi = Math.max(phys("low_hz_ui"), phys("high_hz_ui"));
        var steepNorm = uNorm("steepness_ui", 0.72);
        var resNorm = uNorm("resonance_ui", 0.06);
        var poleLpHp = Math.max(6, Math.min(40, Math.round(10 + steepNorm * 26)));
        var poleBpf = steepNorm <= 0.02 ? 4 : Math.max(6, Math.min(38, Math.round(8 + steepNorm * 28)));
        var fLo = 40;
        var fHi = 18000;
        var cw = xmax - xmin;
        var midY = ymin + (ymax - ymin) * 0.54;
        var yPeak = ymin + (ymax - ymin) * 0.2;

        function magAt(fhz) {
          if (kind === "bpf") return editVizMagBPF(low, hi, fhz, poleBpf, resNorm);
          return kind === "lpf"
            ? editVizMagLP(cutoff, fhz, poleLpHp, resNorm)
            : editVizMagHP(cutoff, fhz, poleLpHp, resNorm);
        }

        freqStrip(ctx2, xmin, xmax, ymax, css2, fLo, fHi);

        ctx2.globalAlpha = 0.42;
        ctx2.fillStyle = css2.themeB;
        ctx2.beginPath();
        for (var p = 0; p <= 140; p++) {
          var t = p / 140;
          var fhz = fLo * Math.pow(fHi / fLo, t);
          var x = xmin + t * cw;
          var m = clamp01(magAt(fhz));
          var yy = midY + (1 - m) * Math.max(midY - yPeak, 4);
          if (!p) ctx2.moveTo(x, yy); else ctx2.lineTo(x, yy);
        }
        ctx2.lineTo(xmax, ymax + 14); ctx2.lineTo(xmin, ymax + 14); ctx2.closePath(); ctx2.fill(); ctx2.globalAlpha = 1;

        ctx2.strokeStyle = css2.themeE;
        ctx2.lineWidth = 2;
        ctx2.beginPath();
        for (var q = 0; q <= 140; q++) {
          var tt = q / 140;
          var fhz2 = fLo * Math.pow(fHi / fLo, tt);
          var xx = xmin + tt * cw;
          var m2 = clamp01(magAt(fhz2));
          var yl = midY + (1 - m2) * Math.max(midY - yPeak, 4);
          if (!q) ctx2.moveTo(xx, yl); else ctx2.lineTo(xx, yl);
        }
        ctx2.stroke();

        var head = kind === "bpf"
          ? "BPF · " + fmtSpecNum(low) + " · " + fmtSpecNum(hi) + " Hz"
          : (kind.toUpperCase() + " · " + fmtSpecNum(cutoff) + " Hz");
        caption(
          ctx2,
          css2,
          xmin + 4,
          ymin + 12,
          head + " · res " + fmtSpecNum(resNorm) + " · steep " + fmtSpecNum(steepNorm)
        );
      }

      function freqStrip(ctx2, fx0, fx1, ymaxStrip, css3, hzMin, hzMax) {
        ctx2.font = "9px Fragment Mono, monospace";
        ctx2.fillStyle = css3.themeA;
        ctx2.textAlign = "center";
        ctx2.textBaseline = "top";
        [100, 400, 1000, 4000].forEach(function (fz) {
          if (fz < hzMin || fz > hzMax) return;
          var tx = fx0 + editVizHzToLogRatio(fz, hzMin, hzMax) * (fx1 - fx0);
          ctx2.fillText(fz >= 1000 ? fz / 1000 + "k" : String(fz), tx, ymaxStrip + 8);
        });
      }

      function paintNoisegate(ctx2, xmin, ymin, xmax, ymax, css2) {
        var atkMs = Math.max(phys("attack_ms_ui"), 0.001);
        var relMs = Math.max(phys("release_ms_ui"), 0.001);
        var thDb = phys("threshold_db_ui");
        var ratio = phys("ratio_ui");
        var atkSch = schema("attack_ms_ui");
        var relSch = schema("release_ms_ui");
        var thSch = schema("threshold_db_ui");
        var atkN = atkSch ? clamp01(editPhysicalToNormalized(atkSch, atkMs)) : 0;
        var relN = relSch ? clamp01(editPhysicalToNormalized(relSch, relMs)) : 0;
        var cw = xmax - xmin;
        var ch = ymax - ymin;
        var uTh = thSch ? clamp01(editPhysicalToNormalized(thSch, thDb)) : 0.5;

        var yOpen = ymin + ch * 0.28;
        var yShut = ymin + ch * (0.66 + clamp01((ratio - 2) / 18) * 0.1);
        var yThMark = ymin + ch * (0.12 + uTh * 0.5);

        var x0 = xmin + cw * 0.06;
        var xHit = xmin + cw * (0.2 + atkN * 0.06);
        var xAtkDone = Math.min(xHit + cw * (0.06 + atkN * 0.42), xmin + cw * 0.55);
        var xHold = xmin + cw * (0.66 - relN * 0.04);
        var xRelEnd = Math.min(xHold + cw * (0.04 + relN * 0.34), xmax - cw * 0.04);

        ctx2.strokeStyle = css2.themeA;
        ctx2.globalAlpha = 0.55;
        ctx2.setLineDash([4, 4]);
        ctx2.beginPath();
        ctx2.moveTo(xmin, yThMark); ctx2.lineTo(xmax, yThMark); ctx2.stroke(); ctx2.setLineDash([]);
        ctx2.globalAlpha = 1;

        ctx2.strokeStyle = css2.themeE;
        ctx2.lineWidth = 2;
        ctx2.beginPath();
        ctx2.moveTo(x0, yShut);
        ctx2.lineTo(xHit, yShut);
        ctx2.lineTo(xAtkDone, yOpen);
        ctx2.lineTo(xHold, yOpen);
        ctx2.lineTo(xRelEnd, yShut);
        ctx2.lineTo(xmax - cw * 0.02, yShut);
        ctx2.stroke();

        caption(ctx2, css2, xmin + 4, ymin + 12,
          "noise gate · threshold " + fmtSpecNum(thDb) + " dB · atk " + fmtSpecNum(atkMs) + " ms · rel " + fmtSpecNum(relMs) + " ms · ratio ×" + fmtSpecNum(ratio));
      }

      function paintReverb(ctx2, xmin, ymin, xmax, ymax, css2) {
        var wetSch = schema("wet_level_ui");
        var decaySch = schema("decay_sec_ui");
        var lenSch = schema("length_sec_ui");
        var wetPhy = phys("wet_level_ui");
        var wetU = wetSch ? clamp01(editPhysicalToNormalized(wetSch, wetPhy)) : 0.35;
        var decayPhy = Math.max(phys("decay_sec_ui"), 0.05);
        var lenPhy = Math.max(phys("length_sec_ui"), 0.05);
        var hp = phys("highpass_hz_ui");
        var er = Math.max(3, Math.min(22, Math.round(phys("early_reflections_ui"))));
        var tailD = clamp01(editPhysicalToNormalized(schema("tail_diffusion_ui"), phys("tail_diffusion_ui")));
        var earlySpread = readEditControl(sec, "early_diffuse") !== "false";
        var cw = xmax - xmin;
        var ch = ymax - ymin;
        var split = ymin + ch * (0.22 + (1 - wetU) * 0.62);

        ctx2.strokeStyle = css2.themeD;
        ctx2.globalAlpha = 0.55;
        ctx2.setLineDash([5, 4]);
        ctx2.beginPath();
        ctx2.moveTo(xmin, split); ctx2.lineTo(xmax, split); ctx2.stroke(); ctx2.setLineDash([]);
        ctx2.globalAlpha = 1;

        var hpSch = schema("highpass_hz_ui");
        var hpU = hpSch ? clamp01(editPhysicalToNormalized(hpSch, hp)) : 0.2;
        ctx2.strokeStyle = css2.themeC;
        ctx2.globalAlpha = 0.92;
        ctx2.beginPath();
        ctx2.moveTo(xmin + cw * 0.06, ymin + ch * 0.16);
        ctx2.lineTo(xmin + cw * 0.1, ymin + ch * (0.2 + hpU * 0.1));
        ctx2.lineTo(xmin + cw * 0.12, ymin + ch * (0.16 + hpU * 0.06));
        ctx2.stroke(); ctx2.globalAlpha = 1;

        var decayTau = decaySch ? clamp01(editPhysicalToNormalized(decaySch, decayPhy)) : 0.5;
        var decayK = Math.max(6, decayTau * 38 + (1 - tailD) * 10);
        var tailLenFrac = lenSch ? clamp01(editPhysicalToNormalized(lenSch, lenPhy)) : 0.4;

        ctx2.strokeStyle = css2.themeB;
        ctx2.globalAlpha = 0.92;
        ctx2.lineWidth = 2;
        ctx2.beginPath();
        for (var i = 0; i <= 120; i++) {
          var t = i / 120;
          var env = tailD * 0.18 * Math.sin(t * Math.PI * decayK * 0.05) + Math.exp(-t * decayK * (0.78 + decayTau));
          var xx = xmin + cw * (0.1 + t * tailLenFrac * 0.86);
          var yy = split + (ymax - split) * 0.94 * (1 - env * 0.96);
          if (!i) ctx2.moveTo(xx, yy); else ctx2.lineTo(xx, yy);
        }
        ctx2.stroke(); ctx2.globalAlpha = 1;

        if (earlySpread) {
          ctx2.strokeStyle = css2.primary;
          ctx2.globalAlpha = 0.7;
          for (var kk = 0; kk < er; kk++) {
            var spikeX = xmin + cw * (0.12 + kk * Math.min(cw * 0.036, cw / Math.max(er, 3)));
            ctx2.beginPath(); ctx2.moveTo(spikeX, split); ctx2.lineTo(spikeX, split - (10 + (kk % 4) * 3)); ctx2.stroke();
          }
          ctx2.globalAlpha = 1;
        }

        caption(ctx2, css2, xmin + 4, ymin + 10,
          "reverb · wet " + fmtSpecNum(wetPhy) + " · length " + fmtSpecNum(lenPhy) + " s · decay " + fmtSpecNum(decayPhy) + " s · tail diffusion " + fmtSpecNum(tailD));
      }

      function paintCompress(ctx2, xmin, ymin, xmax, ymax, css2) {
        var thDb = phys("threshold_db_ui");
        var ratioNum = Math.max(phys("ratio_ui"), 1);

        function outDb(inpDb) {
          if (inpDb <= thDb) return inpDb;
          return thDb + (inpDb - thDb) / ratioNum;
        }

        var dMin = -46;
        var dMax = -3;
        var plotW = xmax - xmin;
        var plotH = ymax - ymin;

        ctx2.strokeStyle = css2.themeA;
        ctx2.globalAlpha = 0.45;
        ctx2.setLineDash([4, 4]);
        ctx2.beginPath();
        for (var b = -40; b <= -8; b += 8) {
          var lx = xmin + plotW * clamp01((b - dMin) / (dMax - dMin));
          ctx2.moveTo(lx, ymin); ctx2.lineTo(lx, ymax);
        }
        ctx2.stroke();
        ctx2.setLineDash([]); ctx2.globalAlpha = 1;

        function xOf(inp) {
          return xmin + plotW * clamp01((inp - dMin) / (dMax - dMin));
        }
        function yOf(outDbVal) {
          return ymax - plotH * clamp01((outDbVal - dMin) / (dMax - dMin));
        }

        ctx2.strokeStyle = css2.themeD;
        ctx2.globalAlpha = 0.52;
        ctx2.lineWidth = 1.25;
        ctx2.beginPath();
        ctx2.moveTo(xOf(dMin), yOf(dMin));
        ctx2.lineTo(xOf(dMax), yOf(dMax));
        ctx2.stroke(); ctx2.globalAlpha = 1;

        ctx2.strokeStyle = css2.themeE;
        ctx2.lineWidth = 3;
        ctx2.beginPath();
        for (var uu = 0; uu <= 90; uu++) {
          var inp = dMin + (dMax - dMin) * (uu / 90);
          var outv = outDb(inp);
          if (!uu) ctx2.moveTo(xOf(inp), yOf(outv)); else ctx2.lineTo(xOf(inp), yOf(outv));
        }
        ctx2.stroke(); ctx2.lineWidth = 1;

        ctx2.strokeStyle = css2.primary;
        ctx2.globalAlpha = 0.8;
        ctx2.setLineDash([3, 3]);
        ctx2.beginPath();
        ctx2.moveTo(xOf(thDb), ymin);
        ctx2.lineTo(xOf(thDb), ymax);
        ctx2.stroke();
        ctx2.setLineDash([]); ctx2.globalAlpha = 1;

        var atkPhy = fmtSpecNum(phys("attack_ms_ui"));
        var relPhy = fmtSpecNum(phys("release_ms_ui"));
        caption(ctx2, css2, xmin + 4, ymin + 12,
          "compressor · input (x) vs output (y) · thr " + fmtSpecNum(thDb) + " dB · ratio ×" + fmtSpecNum(ratioNum) + " · atk " + atkPhy + " ms · rel " + relPhy + " ms");
      }

      function paintOverdrive(ctx2, xmin, ymin, xmax, ymax, css2) {
        var drv = phys("drive_db_ui");
        var drvSch = schema("drive_db_ui");
        var drvU = drvSch ? clamp01(editPhysicalToNormalized(drvSch, drv)) : 0.45;
        var steep = 0.62 + drvU * 22;
        var hp = phys("highpass_hz_ui");
        var lp = phys("lowpass_hz_ui");
        var cw = xmax - xmin;
        var cx = xmin + cw * 0.34;
        var cy = ymin + (ymax - ymin) * 0.46;
        var span = Math.min(cw - 72, ymax - ymin - 56) / 2.35;

        ctx2.strokeStyle = css2.themeA;
        ctx2.lineWidth = 1;
        ctx2.globalAlpha = 0.72;
        ctx2.beginPath();
        ctx2.moveTo(cx - span, cy + span); ctx2.lineTo(cx + span, cy - span);
        ctx2.stroke(); ctx2.globalAlpha = 1;

        ctx2.strokeStyle = css2.primary;
        ctx2.lineWidth = 2;
        ctx2.beginPath();
        for (var ip = 0; ip <= 100; ip++) {
          var t = ip / 100;
          var outv = editVizWaveshaperDrive(t, steep);
          var px = cx - span + t * span * 2;
          var py = cy + span - outv * span * 2;
          if (!ip) ctx2.moveTo(px, py); else ctx2.lineTo(px, py);
        }
        ctx2.stroke();

        var stripTop = ymin + (ymax - ymin) * 0.72;
        var stripBot = ymin + (ymax - ymin) * 0.86;

        ctx2.strokeStyle = css2.themeE;
        ctx2.lineWidth = 2;
        var xHp = xmin + cw * (0.1 + clamp01(editPhysicalToNormalized(schema("highpass_hz_ui"), hp)) * 0.8);
        ctx2.beginPath(); ctx2.moveTo(xHp, stripTop); ctx2.lineTo(xHp, stripBot); ctx2.stroke();
        ctx2.strokeStyle = css2.themeC;
        var xLp = xmin + cw * (0.08 + clamp01(editPhysicalToNormalized(schema("lowpass_hz_ui"), lp)) * 0.82);
        ctx2.beginPath(); ctx2.moveTo(xLp, stripTop); ctx2.lineTo(xLp, stripBot); ctx2.stroke();

        caption(ctx2, css2, xmin + 4, ymin + 12, "overdrive waveshaping · drive " + fmtSpecNum(drv) + " dB · tone HP " + fmtSpecNum(hp) + " Hz · LP " + fmtSpecNum(lp) + " Hz");
      }

      function paintDistort(ctx2, xmin, ymin, xmax, ymax, css2) {
        var drv = phys("drive_db_ui");
        var drvSch = schema("drive_db_ui");
        var drvU = drvSch ? clamp01(editPhysicalToNormalized(drvSch, drv)) : 0.45;
        var steep = 0.92 + drvU * 38;
        var cx = xmin + (xmax - xmin) / 2;
        var cy = ymin + (ymax - ymin) * 0.46;
        var span = Math.min(xmax - xmin - 72, ymax - ymin - 56) / 2.25;

        ctx2.strokeStyle = css2.themeA;
        ctx2.lineWidth = 1;
        ctx2.globalAlpha = 0.74;
        ctx2.beginPath();
        ctx2.moveTo(cx - span, cy + span); ctx2.lineTo(cx + span, cy - span);
        ctx2.stroke(); ctx2.globalAlpha = 1;

        ctx2.strokeStyle = css2.themeC;
        ctx2.lineWidth = 2.5;
        ctx2.beginPath();
        for (var ip = 0; ip <= 100; ip++) {
          var t = ip / 100;
          var outv = editVizWaveshaperDrive(t, steep);
          var px = cx - span + t * span * 2;
          var py = cy + span - outv * span * 2;
          if (!ip) ctx2.moveTo(px, py); else ctx2.lineTo(px, py);
        }
        ctx2.stroke();

        caption(ctx2, css2, xmin + 4, ymin + 12, "distort · drive " + fmtSpecNum(drv) + " dB (saturation sketch)");
      }

      function paintModDelay(ctx2, xmin, ymin, xmax, ymax, css2, kind) {
        var rate = Math.max(phys("rate_hz_ui"), 1e-4);
        var depthPhys = phys("depth_ui");
        var depthSch = schema("depth_ui");
        var depthNorm = depthSch ? clamp01(editPhysicalToNormalized(depthSch, depthPhys)) : 0;
        var mixSch = schema("mix_ui");
        var mixPhy = phys("mix_ui");
        var mixNorm = mixSch ? clamp01(editPhysicalToNormalized(mixSch, mixPhy)) : 0;
        var cd = phys("centre_delay_ms_ui");
        var cdSch = schema("centre_delay_ms_ui");
        var cdMax = cdSch && cdSch.range_linear ? cdSch.range_linear[1] : 14;
        var delayNorm = clamp01(cd / Math.max(cdMax, 1e-4));
        var fb = phys("feedback_ui");

        var cw = xmax - xmin;
        var ch = ymax - ymin;
        var mid = ymin + ch * 0.5;

        var cyclesAcross = rate * (
          kind === "flanger" ? 32 :
          kind === "phaser" ? 22 : 20
        );
        var ampBoost = kind === "flanger" ? 1.08 : kind === "phaser" ? 0.72 : 0.95;
        ctx2.strokeStyle = css2.themeE;
        ctx2.globalAlpha = 0.55;
        ctx2.beginPath();
        ctx2.moveTo(xmin, mid); ctx2.lineTo(xmax, mid); ctx2.stroke(); ctx2.globalAlpha = 1;

        var amp = Math.max(4, depthNorm * 0.5 * ampBoost) * Math.min(ch, 118);
        ctx2.strokeStyle = css2.primary;
        ctx2.lineWidth = 2;
        ctx2.beginPath();
        for (var iq = 0; iq <= 220; iq++) {
          var t = iq / 220;
          var px = xmin + cw * (0.04 + t * 0.92);
          var ph = cyclesAcross * Math.PI * 2 * t;
          var wobble = depthNorm + 0.12;
          var py = mid + Math.sin(ph * (1 + wobble * (kind === "flanger" ? 0.32 : kind === "phaser" ? 0.52 : 0.18))) * amp * delayNorm;
          if (!iq) ctx2.moveTo(px, py); else ctx2.lineTo(px, py);
        }
        ctx2.stroke();

        ctx2.strokeStyle = css2.themeD;
        ctx2.globalAlpha = 0.65;
        var split = ymin + mixNorm * ch * (kind === "phaser" ? 0.32 : 0.36) + 18;
        ctx2.beginPath();
        ctx2.moveTo(xmin, split); ctx2.lineTo(xmax, split); ctx2.stroke(); ctx2.globalAlpha = 1;

        ctx2.strokeStyle = css2.themeB;
        ctx2.globalAlpha = 0.88;
        var fbSchInner = schema("feedback_ui");
        var fbFrac = fbSchInner ? clamp01(editPhysicalToNormalized(fbSchInner, fb)) : 0;
        ctx2.beginPath(); ctx2.moveTo(xmax - cw * (0.3 + fbFrac * 0.45), ymin + ch * 0.32); ctx2.lineTo(xmax - 16, ymin + ch * (0.55 - fbFrac * 0.06)); ctx2.stroke(); ctx2.globalAlpha = 1;

        var labelWord = kind === "flanger" ? "flanger" : kind === "phaser" ? "phaser" : "chorus";

        var captionY = ymin + (kind === "phaser" ? 24 : 10);
        var line1 =
          labelWord + " modulation · rate " + fmtSpecNum(rate) + " Hz · depth " + fmtSpecNum(depthPhys) + " · delay " + fmtSpecNum(cd) + " ms · feedback " + fmtSpecNum(fb) + " · mix " + fmtSpecNum(mixPhy);

        if (kind === "phaser") {
          var cfSch = schema("centre_frequency_hz_ui");
          var cf = Math.max(phys("centre_frequency_hz_ui"), 1);
          var cfNorm = cfSch ? clamp01(editPhysicalToNormalized(cfSch, cf)) : 0;
          var fMinAxis = cfSch && cfSch.range_linear ? cfSch.range_linear[0] : 400;
          var fMaxAxis = cfSch && cfSch.range_linear ? cfSch.range_linear[1] : 2800;
          var cxNotch = xmin + cw * (0.06 + cfNorm * 0.82);
          var dip = ymin + split + (ymax - split) * 0.72;
          ctx2.strokeStyle = css2.themeC;
          ctx2.lineWidth = 2;
          ctx2.beginPath(); ctx2.moveTo(cxNotch - 38, ymin + ch * 0.74); ctx2.lineTo(cxNotch - 22, ymin + split + depthNorm * 22); ctx2.lineTo(cxNotch, ymin + dip - depthNorm * 26); ctx2.lineTo(cxNotch + 22, ymin + split + depthNorm * 22); ctx2.lineTo(cxNotch + 38, ymin + ch * 0.74); ctx2.stroke();
          line1 +=
            " · sweep ~ " + fmtSpecNum(cf) + " Hz · UI axis " + fmtSpecNum(fMinAxis) + "–" + fmtSpecNum(fMaxAxis) + " Hz";
        }

        caption(ctx2, css2, xmin + 4, captionY, line1);
      }

      sec.__repaintEditEffectViz = paintPassiveFrame;

      var ro = typeof ResizeObserver === "undefined" ? null : new ResizeObserver(function () {
        paintPassiveFrame();
      });
      if (ro) ro.observe(vizWrap);

      function onCtl() {
        queueEditVisibleEffectVizRepaint();
      }

      sec.querySelectorAll('[data-schema-key]').forEach(function (el) {
        el.addEventListener("input", onCtl);
        el.addEventListener("change", onCtl);
      });

      paintPassiveFrame();
    }


    function readEditControl(sectionEl, schemaKey) {
      var el = sectionEl.querySelector('[data-schema-key="' + schemaKey + '"]');
      return el ? String(el.value) : "";
    }

    function selectSampleForEdit(file, apiPath, opts) {
      opts = opts || {};
      selectedEditAbsPath = file;
      selectedEditApiPath = apiPath;
      syncWaveformTitleSelection();
      if (opts.openEditTab) {
        ensureSidebarOpenForEdit();
        openAuditionrSidebarTab("edit");
      }
    }

    function syncWaveformTitleSelection() {
      Object.keys(waveformInstances).forEach(function (absPath) {
        var inst = waveformInstances[absPath];
        if (!inst || !inst.titleRowEl) return;
        inst.titleRowEl.classList.toggle("waveform-sample-selected", selectedEditAbsPath === absPath);
      });
    }

    function applyEditProcessingSpec(spec) {
      if (!selectedEditApiPath) {
        window.alert("Select a sample first (click its name or use the waveform).");
        return;
      }
      processSample({
        path: selectedEditApiPath,
        processing_spec: spec,
        files: getCurrentFiles()
      });
    }

    function updateEditActionVisibility() {
      var nav = document.getElementById("edit-action-nav");
      var detail = document.getElementById("edit-action-detail");
      if (!nav || !detail) return;
      nav.querySelectorAll(".edit-action-nav-btn").forEach(function (btn) {
        btn.classList.toggle("edit-action-nav-active", btn.dataset.editType === editPanelSelectedActionType);
      });
      detail.querySelectorAll(".edit-sample-section").forEach(function (sec) {
        sec.classList.toggle("edit-sample-section-visible", sec.dataset.editType === editPanelSelectedActionType);
      });
      queueEditVisibleEffectVizRepaint();
    }

    function openAuditionrSidebarTab(tab) {
      var genBtn = document.getElementById("sidebar-tab-btn-generate");
      var editBtn = document.getElementById("sidebar-tab-btn-edit");
      var genPanel = document.getElementById("sidebar-panel-generate");
      var editPanel = document.getElementById("sidebar-panel-edit");
      if (!genBtn || !editBtn || !genPanel || !editPanel) return;
      var isGen = tab === "generate";
      auditionrSidebarActiveTab = isGen ? "generate" : "edit";
      genBtn.classList.toggle("sidebar-tab-active", isGen);
      editBtn.classList.toggle("sidebar-tab-active", !isGen);
      genPanel.classList.toggle("hidden", !isGen);
      editPanel.classList.toggle("hidden", isGen);
      try { sessionStorage.setItem(AUDITIONR_SIDEBAR_TAB_KEY, tab); } catch (e) {}
      if (!isGen) queueEditVisibleEffectVizRepaint();
    }

    function ensureSidebarOpenForEdit() {
      var sidebar = document.getElementById("auditionr-sidebar");
      var sidebarToggle = document.getElementById("sidebar-toggle");
      var sidebarToggleIcon = document.getElementById("sidebar-toggle-icon");
      if (!sidebar || !sidebarToggle || !sidebarToggleIcon) return;
      if (sidebar.classList.contains("collapsed")) {
        sidebar.classList.remove("collapsed");
        sidebarToggleIcon.className = "fa-solid fa-chevron-right";
        sidebarToggle.title = "Hide sidebar";
      }
    }

    function syncEditFilterControlRows(sec) {
      if (!sec || sec.dataset.editType !== "filter") return;
      function vis(key, show) {
        var el = sec.querySelector('[data-schema-key="' + key + '"]');
        if (!el) return;
        var row = el.closest(".edit-control-row");
        if (row) row.style.display = show ? "" : "none";
      }
      var kind = readEditControl(sec, "kind") || "lpf";
      var isBpf = kind === "bpf";
      vis("cutoff_hz_ui", !isBpf);
      vis("low_hz_ui", isBpf);
      vis("high_hz_ui", isBpf);
    }

    function buildSpecFromSection(sectionEl, typeKey) {
      var schemas = (processingCatalog.paramSchemas && processingCatalog.paramSchemas[typeKey]) || [];
      function phys(sk) {
        var sch = schemas.filter(function (s) { return s.key === sk; })[0];
        if (!sch) return 0;
        return editSliderPhysical(sch, readEditControl(sectionEl, sk));
      }

      switch (typeKey) {
        case "fade": {
          var style = readEditControl(sectionEl, "style") || "in";
          var ms = phys("duration_ms_ui");
          return "fade:[style=" + style + "][duration_ms=" + fmtSpecNum(ms) + "]";
        }
        case "eq": {
          var band = readEditControl(sectionEl, "band") || "lows";
          var db = phys("db_ui");
          return "eq:[band=" + band + "][db=" + fmtSpecNum(db) + "]";
        }
        case "gain": {
          var db = phys("db_ui");
          return "gain:[db=" + fmtSpecNum(db) + "]";
        }
        case "filter": {
          var fk = readEditControl(sectionEl, "kind") || "lpf";
          var resonance = phys("resonance_ui");
          var steepness = phys("steepness_ui");
          if (fk === "bpf") {
            var lo = phys("low_hz_ui");
            var hi = phys("high_hz_ui");
            return "filter:[kind=bpf][low_hz=" + fmtSpecNum(lo) + "][high_hz=" + fmtSpecNum(hi) + "][resonance=" + fmtSpecNum(resonance) + "][steepness=" + fmtSpecNum(steepness) + "]";
          }
          var cf = phys("cutoff_hz_ui");
          return "filter:[kind=" + fk + "][cutoff_hz=" + fmtSpecNum(cf) + "][resonance=" + fmtSpecNum(resonance) + "][steepness=" + fmtSpecNum(steepness) + "]";
        }
        case "noisegate": {
          var th = phys("threshold_db_ui");
          var atk = phys("attack_ms_ui");
          var rel = phys("release_ms_ui");
          var rat = phys("ratio_ui");
          return "noisegate:[threshold_db=" + fmtSpecNum(th) + "][attack_ms=" + fmtSpecNum(atk) + "][release_ms=" + fmtSpecNum(rel) + "][ratio=" + fmtSpecNum(rat) + "]";
        }
        case "timestretch": {
          var sf = phys("stretch_factor_ui");
          return "timestretch:[stretch_factor=" + fmtSpecNum(sf) + "]";
        }
        case "paulstretch": {
          var st = phys("paul_stretch_ui");
          var ws = phys("paul_window_ui");
          return "paulstretch:[stretch_amount=" + fmtSpecNum(st) + "][window_size=" + fmtSpecNum(ws) + "]";
        }
        case "pitch": {
          var pm = readEditControl(sectionEl, "mode") || "preserve";
          var sem = phys("semitones_ui");
          return "pitch:[mode=" + pm + "][semitones=" + fmtSpecNum(sem) + "]";
        }
        case "reverb": {
          var wet = phys("wet_level_ui");
          var ls = phys("length_sec_ui");
          var ds = phys("decay_sec_ui");
          var hp = phys("highpass_hz_ui");
          var er = Math.round(phys("early_reflections_ui"));
          var td = phys("tail_diffusion_ui");
          var ed = readEditControl(sectionEl, "early_diffuse") || "true";
          return "reverb:[wet_level=" + fmtSpecNum(wet) + "][length_sec=" + fmtSpecNum(ls) + "][decay_sec=" + fmtSpecNum(ds) + "][highpass_hz=" + fmtSpecNum(hp) + "][early_reflections=" + er + "][tail_diffusion=" + fmtSpecNum(td) + "][early_diffuse=" + ed + "]";
        }
        case "compress": {
          return "compress:[threshold_db=" + fmtSpecNum(phys("threshold_db_ui")) + "][ratio=" + fmtSpecNum(phys("ratio_ui")) + "][attack_ms=" + fmtSpecNum(phys("attack_ms_ui")) + "][release_ms=" + fmtSpecNum(phys("release_ms_ui")) + "]";
        }
        case "overdrive": {
          return "overdrive:[drive_db=" + fmtSpecNum(phys("drive_db_ui")) + "][highpass_hz=" + fmtSpecNum(phys("highpass_hz_ui")) + "][lowpass_hz=" + fmtSpecNum(phys("lowpass_hz_ui")) + "]";
        }
        case "distort":
          return "distort:[drive_db=" + fmtSpecNum(phys("drive_db_ui")) + "]";
        case "chorus":
          return "chorus:[rate_hz=" + fmtSpecNum(phys("rate_hz_ui")) + "][depth=" + fmtSpecNum(phys("depth_ui")) + "][centre_delay_ms=" + fmtSpecNum(phys("centre_delay_ms_ui")) + "][feedback=" + fmtSpecNum(phys("feedback_ui")) + "][mix=" + fmtSpecNum(phys("mix_ui")) + "]";
        case "flanger":
          return "flanger:[rate_hz=" + fmtSpecNum(phys("rate_hz_ui")) + "][depth=" + fmtSpecNum(phys("depth_ui")) + "][centre_delay_ms=" + fmtSpecNum(phys("centre_delay_ms_ui")) + "][feedback=" + fmtSpecNum(phys("feedback_ui")) + "][mix=" + fmtSpecNum(phys("mix_ui")) + "]";
        case "phaser":
          return "phaser:[rate_hz=" + fmtSpecNum(phys("rate_hz_ui")) + "][depth=" + fmtSpecNum(phys("depth_ui")) + "][centre_frequency_hz=" + fmtSpecNum(phys("centre_frequency_hz_ui")) + "][feedback=" + fmtSpecNum(phys("feedback_ui")) + "][mix=" + fmtSpecNum(phys("mix_ui")) + "]";
        default:
          return null;
      }
    }

    function renderEditSamplesPanel() {
      var navEl = document.getElementById("edit-action-nav");
      var detailEl = document.getElementById("edit-action-detail");
      if (!navEl || !detailEl) return;

      if (EDIT_SECTION_ORDER.indexOf(editPanelSelectedActionType) === -1) {
        editPanelSelectedActionType = EDIT_SECTION_ORDER[0] || "fade";
      }

      navEl.innerHTML = "";
      detailEl.innerHTML = "";
      var typesByKey = {};
      (processingCatalog.types || []).forEach(function (t) { typesByKey[t.key] = t.label; });

      EDIT_SECTION_ORDER.forEach(function (typeKey) {
        var navBtn = document.createElement("button");
        navBtn.type = "button";
        navBtn.className = "edit-action-nav-btn";
        navBtn.dataset.editType = typeKey;
        navBtn.textContent = typesByKey[typeKey] || typeKey;
        navBtn.addEventListener("click", function () {
          editPanelSelectedActionType = typeKey;
          updateEditActionVisibility();
        });
        navEl.appendChild(navBtn);

        var schemas = (processingCatalog.paramSchemas && processingCatalog.paramSchemas[typeKey]) || [];
        var sec = document.createElement("section");
        sec.className = "edit-sample-section";
        sec.dataset.editType = typeKey;

        var presetsWrap = document.createElement("div");
        presetsWrap.className = "edit-presets-row";
        (processingCatalog.presets || []).filter(function (p) { return p.type === typeKey; }).forEach(function (preset) {
          var wrap = document.createElement("span");
          wrap.className = "edit-preset-wrap";
          var b = document.createElement("button");
          b.type = "button";
          b.className = "edit-preset-btn";
          if (!editShortcutsDeleteMode) {
            b.classList.add("solo-radius");
          }
          b.textContent = preset.label;
          b.title = preset.spec || preset.token || "";
          b.addEventListener("click", function () {
            if (editShortcutsDeleteMode) return;
            applyEditProcessingSpec(preset.spec || preset.token);
          });
          wrap.appendChild(b);
          if (editShortcutsDeleteMode) {
            var del = document.createElement("button");
            del.type = "button";
            del.className = "edit-preset-delete";
            del.innerHTML = "&times;";
            del.title = "Remove shortcut";
            del.addEventListener("click", function (ev) {
              ev.preventDefault();
              ev.stopPropagation();
              var nm = String(preset.label || "").trim();
              if (!nm) return;
              fetch("/api/post-processing-shortcuts?name=" + encodeURIComponent(nm), { method: "DELETE" })
                .then(function (res) {
                  return res.json().then(function (data) {
                    return { ok: res.ok, data: data };
                  });
                })
                .then(function (pack) {
                  if (!pack.ok || (pack.data && pack.data.error)) {
                    alert((pack.data && pack.data.error) || "Delete failed");
                  }
                })
                .catch(function () {
                  alert("Delete failed");
                });
            });
            wrap.appendChild(del);
          }
          presetsWrap.appendChild(wrap);
        });
        var vizWrap = null;
        var vizSr = null;
        if (EDIT_EFFECT_VIZ_TYPES[typeKey]) {
          vizWrap = document.createElement("div");
          vizWrap.className = "edit-effect-viz-wrap";
          vizSr = document.createElement("span");
          vizSr.className = "sr-only";
          vizSr.textContent = "Passive preview of current " + typeKey + " parameters (matches sliders below).";
          var vizCanvas = document.createElement("canvas");
          vizCanvas.className = "edit-effect-viz";
          vizCanvas.setAttribute("role", "img");
          vizCanvas.setAttribute("aria-label", typeKey + " parameter preview");
          vizWrap.appendChild(vizSr);
          vizWrap.appendChild(vizCanvas);
        }

        var controlsWrap = document.createElement("div");
        controlsWrap.className = "edit-controls";
        schemas.forEach(function (schema) {
          if (schema.widget === "slider") {
            var row = document.createElement("div");
            row.className = "edit-control-row edit-control-row-slider";

            var labelRow = document.createElement("div");
            labelRow.className = "edit-slider-label-row";

            var paramLabel = document.createElement("span");
            paramLabel.className = "edit-slider-param-label";
            paramLabel.textContent = schema.label;

            var valueDisplay = document.createElement("span");
            valueDisplay.className = "edit-slider-value-display";
            valueDisplay.setAttribute("aria-live", "polite");

            labelRow.appendChild(paramLabel);

    function formatTimestamp(seconds) {
      const roundedSeconds = Math.round(seconds); // Round to the nearest second
      const hours = Math.floor(roundedSeconds / 3600);
      const minutes = Math.floor((roundedSeconds % 3600) / 60);
      const remainingSeconds = roundedSeconds % 60;
      return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
    }

    function auditionrBasename(absPath) {
      return absPath.split("/").pop();
    }

    /** GET /exports/... — encode #, ?, etc. so the path is not truncated as a URL fragment. */
    function auditionrExportsMediaUrl(absPath, cacheBust) {
      var u = "/exports/" + encodeURIComponent(auditionrBasename(absPath));
      return cacheBust ? u + "?v=" + Date.now() : u;
    }

    /** POST body path token; keeps literal characters (e.g. #) for server basename resolution. */
    function auditionrExportsApiPath(absPath) {
      return "/exports/" + auditionrBasename(absPath);
    }

    function revealSample(path) {

    function resolveDisplayedFileFromProcessPath(pathToken) {
      if (!pathToken || typeof pathToken !== "string") return null;
      pathToken = pathToken.trim();
      if (!pathToken) return null;
      if (waveformInstances[pathToken]) return pathToken;
      var slug = pathToken.indexOf("/exports/") === 0
        ? pathToken.slice("/exports/".length)
        : auditionrBasename(pathToken);
      try {
        slug = decodeURIComponent(slug);
      } catch (e) {}
      var i;
      for (i = 0; i < currentDisplayedFiles.length; i++) {
        var abs = currentDisplayedFiles[i];
        if (auditionrBasename(abs) === slug || auditionrExportsApiPath(abs) === pathToken) return abs;
      }
      return null;
    }

    function endWaveformProcessing(absPath, opts) {
      opts = opts || {};
      var inst = waveformInstances[absPath];
      if (!inst) return;
      inst.pendingProcessingReveal = false;
      if (inst.processingSafetyTimer) {
        clearTimeout(inst.processingSafetyTimer);
        inst.processingSafetyTimer = null;
      }
      if (inst.wrapper) inst.wrapper.classList.remove("waveform-processing");
      if (!opts.skipDurationRepair && inst.wavesurfer && inst.durationEl) {
        var d = inst.wavesurfer.getDuration();
        if (typeof d === "number" && !isNaN(d) && d > 0) {
          inst.durationEl.textContent = formatTimestamp(d);
        }
      }
    }

    function beginWaveformProcessing(absPath) {
      var inst = waveformInstances[absPath];
      if (!inst || !inst.wrapper || !inst.durationEl) return;
      if (typeof inst.stopPlayback === "function") {
        try { inst.stopPlayback(); } catch (err) {}
      }
      inst.pendingProcessingReveal = true;
      inst.wrapper.classList.add("waveform-processing");
      inst.durationEl.textContent = "processing...";
      if (inst.processingSafetyTimer) clearTimeout(inst.processingSafetyTimer);
      inst.processingSafetyTimer = setTimeout(function () {
        if (!waveformInstances[absPath] || !waveformInstances[absPath].pendingProcessingReveal) return;
        endWaveformProcessing(absPath);
      }, processingGuardMs);
    }

    function processSample(params) {
      if (!params.command && !params.processing_spec) {
        console.warn("processSample: command or processing_spec is required");
        return;
      }
      var fileAbs = resolveDisplayedFileFromProcessPath(params.path);
      if (fileAbs) beginWaveformProcessing(fileAbs);
      fetch("/process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(params)
      })
        .then(function (response) {
          return response.json().then(function (data) {
            return { ok: response.ok, data: data };
          });
        })
        .then(function (pack) {
          if (!pack.ok || (pack.data && pack.data.error)) {
            if (fileAbs) endWaveformProcessing(fileAbs);
          }
          console.log(pack.data);
        })
        .catch(function (error) {
          if (fileAbs) endWaveformProcessing(fileAbs);
          console.error("Error:", error);
        });
    }

    function auditionrRefreshQueueFloatingChip() {
      var queueNumEl = document.getElementById("queue-num");
      if (!queueNumEl) return;
      var folderTotal = lastFolderCounts.exports || 0;
      var listLen = currentDisplayedFiles.length;
      var total = Math.max(folderTotal, listLen);
      if (total > AUDITIONR_WAVEFORM_VISIBLE) {
        queueNumEl.textContent = AUDITIONR_WAVEFORM_VISIBLE + " of " + total;
      } else {
        queueNumEl.textContent = String(total);

    function refreshAuditionrWaveformViewport(updatedPath, undoAvailability) {
      var container = document.getElementById("waveform-container");
      if (!container) return;

      var newFiles = currentDisplayedFiles;

      function applyUndoRows() {
        if (!undoAvailability) return;
        newFiles.forEach(function (file) {
          if (Object.prototype.hasOwnProperty.call(undoAvailability, file)) {
            setUndoButtonState(file, !!undoAvailability[file]);
          }
        });
      }

      if (!newFiles.length) {
        container.innerHTML = "";
        applyUndoRows();
        auditionrRefreshQueueFloatingChip();
        if (window.__pageReady) window.__pageReady();
        return;
      }

      var slice = newFiles.slice(0, AUDITIONR_WAVEFORM_VISIBLE);

      newFiles.forEach(function (file) {
        var inst = waveformInstances[file];
        if (!inst || !inst.wrapper) return;
        if (slice.indexOf(file) === -1 && inst.wrapper.parentNode === container) {
          container.removeChild(inst.wrapper);
        }
      });

      var pendingReady = 0;

      slice.forEach(function (file) {
        var inst = waveformInstances[file];
        if (!inst || !inst.wrapper) {
          pendingReady++;
          var created = createSingleWaveform(file, function () {
            pendingReady--;
            if (pendingReady === 0 && window.__pageReady) window.__pageReady();
          });
          if (created) {
            waveformInstances[file] = created;
          } else {
            pendingReady--;
          }
        }
      });

      slice.forEach(function (file) {
        var inst = waveformInstances[file];
        if (inst && inst.wrapper) {
          container.appendChild(inst.wrapper);
        }
      });

      applyUndoRows();

      auditionrRefreshQueueFloatingChip();

      if (pendingReady === 0 && window.__pageReady) window.__pageReady();

      if (updatedPath && newFiles.indexOf(updatedPath) !== -1 && slice.indexOf(updatedPath) !== -1) {
        refreshWaveform(updatedPath);
      }
    }

        inst.processingSafetyTimer = null;
      }
      if (inst.stopPlayback) inst.stopPlayback();
      if (inst.wavesurfer) {
        try { inst.wavesurfer.destroy(); } catch (e) { }
      }
      if (inst.wrapper && inst.wrapper.parentNode) {
        inst.wrapper.parentNode.removeChild(inst.wrapper);
      }
      delete waveformInstances[file];
      delete selectedWaveformTimestamps[file];
      delete waveformDurations[file];
      if (selectedEditAbsPath === file) {

        selectedEditApiPath = null;

          command: "trim_sample_start",
          seconds: selectedWaveformTimestamps[file],
          files: getCurrentFiles()
        });
      });
      trimEndButton.addEventListener("click", function () {
        selectSampleForEdit(file, apiPath, {});
        processSample({
          path: apiPath,
          command: "trim_sample_end",
          seconds: selectedWaveformTimestamps[file],
          files: getCurrentFiles()
        });
      });
      actions.appendChild(trimStartButton);
      actions.appendChild(trimEndButton);

      wrapper.appendChild(actions);

      fetchUndoStatus(apiPath).then(function (canUndo) {
        undoButton.classList.toggle("disabled", !canUndo);
      });

      var container = document.getElementById("waveform-container");
      container.appendChild(wrapper);
      var themeEProgress = auditionrReadCssVar("--theme-e", "#2e8b57");
      var wsOpts = {
        container: "#" + waveformIdSafe,
        waveColor: "#353531",
        progressColor: isDrumpattern ? "#016fb9" : (isTransition ? "#ec4e20" : (isFolysplitr ? themeEProgress : "#ff9505")),
        backend: "MediaElement",
        height: 80
      };
      if (isFolysplitr) wsOpts.cursorColor = themeEProgress;
      var wavesurfer = WaveSurfer.create(wsOpts);

      wavesurfer.load(mediaUrl);

      wavesurfer.on("error", function () {
        var pinnedErr = waveformInstances[file];
        if (pinnedErr && pinnedErr.pendingProcessingReveal) {
          endWaveformProcessing(file);
        }
      });

      wavesurfer.on("seeking", function (currentTime) {
        selectedWaveformTimestamps[file] = currentTime;
        updateTrimButtonLabels();
      });

      wavesurfer.on("interaction", function () {
        selectSampleForEdit(file, apiPath, {});
      });

      var drumpatternBuffer = null;
      var drumpatternPlaying = false;
      var drumpatternSourceNode = null;
      var drumpatternStartTime = 0;
      var drumpatternRafId = null;

      wavesurfer.on("ready", function () {
        var dur = wavesurfer.getDuration();
        waveformDurations[file] = dur;
        duration.innerText = `${formatTimestamp(dur)}`;
        var pinnedReady = waveformInstances[file];
        if (pinnedReady && pinnedReady.pendingProcessingReveal) {
          endWaveformProcessing(file, { skipDurationRepair: true });
        }
        if (isDrumpattern) {
          fetch(mediaUrl)
            .then(function (r) { return r.arrayBuffer(); })
            .then(function (ab) {
              return getAudioContext().decodeAudioData(ab);
            })
            .then(function (buffer) {
              drumpatternBuffer = buffer;
              playButton.classList.remove("disabled");
            })
            .catch(function (e) {
              console.error("Drumpattern decode failed", e);
              playButton.classList.remove("disabled");
            });
        }
        if (typeof onReady === "function") onReady();
      });

      function updatePlayButton(isPlaying) {
        if (isPlaying) {
          playButton.innerHTML = "<i class=\"fa-solid fa-pause center-offset\"></i>";
          playButton.title = "Pause";
        } else {
          playButton.innerHTML = "<i class=\"fa-solid fa-play center-offset\"></i>";
          playButton.title = "Play";
        }
      }

      function stopPlayback() {
        if (isDrumpattern) {
          try { if (drumpatternSourceNode) drumpatternSourceNode.stop(); } catch (err) { }
          drumpatternSourceNode = null;
          drumpatternPlaying = false;
          if (drumpatternRafId != null) cancelAnimationFrame(drumpatternRafId);
          drumpatternRafId = null;
          if (currentDrumpatternStop === stopPlayback) currentDrumpatternStop = null;
          wavesurfer.seekTo(0);
          updatePlayButton(false);
          return;
        }
        var mediaEl = wavesurfer.getMediaElement && wavesurfer.getMediaElement();
        if (mediaEl) mediaEl.loop = false;
        try { wavesurfer.pause(); } catch (e) { }
        updatePlayButton(false);
      }

      function updateDrumpatternPlayhead() {
        if (!drumpatternPlaying || !drumpatternBuffer) return;
        var ctx = getAudioContext();
        var d = drumpatternBuffer.duration;
        var elapsed = ctx.currentTime - drumpatternStartTime;
        var t = d > 0 ? (elapsed % d) / d : 0;
        wavesurfer.seekTo(Math.min(1, Math.max(0, t)));
        drumpatternRafId = requestAnimationFrame(updateDrumpatternPlayhead);
      }

      wavesurfer.on("play", function () {
        selectSampleForEdit(file, apiPath, {});
        updatePlayButton(true);
      });

      wavesurfer.on("pause", function () {
        selectSampleForEdit(file, apiPath, {});
        if (!isDrumpattern && !wavesurfer.isPlaying()) updatePlayButton(false);
      });

      playButton.addEventListener("click", function () {
        selectSampleForEdit(file, apiPath, {});
        if (isDrumpattern) {
          if (playButton.classList.contains("disabled") || !drumpatternBuffer) return;
          if (drumpatternPlaying) {
            stopPlayback();
            return;
          }
          if (currentDrumpatternStop && currentDrumpatternStop !== stopPlayback) currentDrumpatternStop();
          var ctx = getAudioContext();
          if (ctx.state === "suspended") ctx.resume();
          var src = ctx.createBufferSource();
          src.buffer = drumpatternBuffer;
          src.loop = true;
          src.connect(ctx.destination);
          src.start(0);
          drumpatternSourceNode = src;
          drumpatternStartTime = ctx.currentTime;
          drumpatternPlaying = true;
          currentDrumpatternStop = stopPlayback;
          updatePlayButton(true);
          drumpatternRafId = requestAnimationFrame(updateDrumpatternPlayhead);
          return;
        }

        if (wavesurfer.isPlaying()) {
          stopPlayback();
        } else {
          var mediaEl = wavesurfer.getMediaElement && wavesurfer.getMediaElement();
          if (mediaEl) mediaEl.loop = true;
          wavesurfer.play();
        }
      });

      return {
        wrapper: wrapper,
        wavesurfer: wavesurfer,
        durationEl: duration,
        stopPlayback: stopPlayback,
        undoButton: undoButton,
        titleRowEl: titleRowEl,
        pendingProcessingReveal: false,
        processingSafetyTimer: null
      };
    }

    (function () {
      /**
       * Feature flags (auditionr only): ?flags=FLAG_A,FLAG_B
       * Flags are trimmed, lowercased, and stored in a Set for quick lookup.
       * Example: ?flags=all_cli_options — also shows bass and transition in Generate Samples.
       */
      function parseAuditionrFeatureFlags() {
        try {
          var params = new URLSearchParams(window.location.search);
          var raw = params.get("flags") || "";
          return new Set(
            raw.split(",")
              .map(function (s) { return String(s).trim().toLowerCase(); })
              .filter(function (s) { return s.length > 0; })
          );
        } catch (e) {
          return new Set();
        }
      }

      var auditionrFeatureFlags = parseAuditionrFeatureFlags();
      var FLAG_ALL_CLI_OPTIONS = "all_cli_options";

      var typeSelect = document.getElementById("generatr-type");
      if (typeSelect && !auditionrFeatureFlags.has(FLAG_ALL_CLI_OPTIONS)) {
        var gatedTypeValues = { bass: true, transition: true };
        var toRemove = [];
        Array.from(typeSelect.options).forEach(function (opt) {
          if (gatedTypeValues[opt.value]) toRemove.push(opt);
        });
        toRemove.forEach(function (opt) { opt.remove(); });
        var stillValid = Array.from(typeSelect.options).some(function (o) { return o.value === typeSelect.value; });
        if (!stillValid) typeSelect.value = "beat";
      }

      var subcommandRow = document.getElementById("generatr-subcommand-row");
      var transitionSubcommandRow = document.getElementById("generatr-transition-subcommand-row");
      var droneRows = [
        document.getElementById("generatr-drone-name-row"),
        document.getElementById("generatr-drone-notes-row"),
        document.getElementById("generatr-drone-chart-name-row"),
        document.getElementById("generatr-drone-chart-type-row"),
        document.getElementById("generatr-drone-tags-row"),
        document.getElementById("generatr-drone-roots-row"),
        document.getElementById("generatr-drone-pattern-row"),
        document.getElementById("generatr-drone-instrument-row"),
        document.getElementById("generatr-drone-effect-row"),
        document.getElementById("generatr-drone-iterations-row"),
        document.getElementById("generatr-drone-split-row")
      ];
      var beatRows = [
        document.getElementById("generatr-beat-tempo-row"),
        document.getElementById("generatr-beat-loops-row"),
        document.getElementById("generatr-beat-pattern-row"),
        document.getElementById("generatr-beat-kit-row"),
        document.getElementById("generatr-beat-randomization-config-row"),
        document.getElementById("generatr-beat-swing-row"),
        document.getElementById("generatr-beat-iterations-row"),
        document.getElementById("generatr-beat-variants-row")
      ];
      var generatrPostProcessingRow = document.getElementById("generatr-beat-post-processing-row");
      var beatTempoInput = document.getElementById("generatr-beat-tempo");
      var beatLoopsInput = document.getElementById("generatr-beat-loops");
      var beatPatternInput = document.getElementById("generatr-beat-pattern");
      var beatKitInput = document.getElementById("generatr-beat-kit");
      var beatRandomizationConfigSelect = document.getElementById("generatr-beat-randomization-config");
      var beatSwingInput = document.getElementById("generatr-beat-swing");
      var beatIterationsInput = document.getElementById("generatr-beat-iterations");
      var beatVariantsList = document.getElementById("generatr-beat-variants-list");
      var droneNameInput = document.getElementById("generatr-drone-name");
      var droneNotesInput = document.getElementById("generatr-drone-notes");
      var droneChartNameInput = document.getElementById("generatr-drone-chart-name");
      var droneChartTypeSelect = document.getElementById("generatr-drone-chart-type");
      var droneTagsInput = document.getElementById("generatr-drone-tags");
      var droneRootsInput = document.getElementById("generatr-drone-roots");
      var dronePatternSelect = document.getElementById("generatr-drone-pattern");
      var droneInstrumentSelect = document.getElementById("generatr-drone-instrument");
      var droneEffectSelect = document.getElementById("generatr-drone-effect");
      var droneIterationsInput = document.getElementById("generatr-drone-iterations");
      var droneSplitCheckbox = document.getElementById("generatr-drone-split");
      var form = document.getElementById("generatr-form");
      var btnGenerate = document.getElementById("generatr-btn");
      var busyOverlay = document.getElementById("generatr-busy-overlay");
      var generateTabPanel = document.getElementById("sidebar-panel-generate");
      var resultEl = document.getElementById("generatr-result");
      var errorEl = document.getElementById("generatr-error");
      var sidebar = document.getElementById("auditionr-sidebar");
      var sidebarToggle = document.getElementById("sidebar-toggle");
      var sidebarToggleIcon = document.getElementById("sidebar-toggle-icon");
      var generatrSidebarOptionsLoaded = false;

      function setSelectOptions(selectEl, values, includeRandom) {
        var current = selectEl.value;
        selectEl.innerHTML = "";
        if (includeRandom) {
          var randomOpt = document.createElement("option");
          randomOpt.value = "";
          randomOpt.textContent = "(random)";
          selectEl.appendChild(randomOpt);
        }
        (values || []).forEach(function (val) {
          var opt = document.createElement("option");
          opt.value = val;
          opt.textContent = val;
          selectEl.appendChild(opt);
        });
        if (current && Array.from(selectEl.options).some(function (opt) { return opt.value === current; })) {
          selectEl.value = current;
        }
      }

      function loadGeneratrSidebarOptions() {
        if (generatrSidebarOptionsLoaded) return Promise.resolve();
        return Promise.all([
          fetch("/api/generatr/options").then(function (res) { return res.json(); }),
          fetch("/api/drum-path-presets").then(function (res) { return res.json(); })
        ])
          .then(function (parts) {
            var data = parts[0] || {};
            var presetData = parts[1] || {};
            var presetNames = Object.keys((presetData && presetData.presets) || {});
            setSelectOptions(beatRandomizationConfigSelect, presetNames, false);
            var activeOpt = document.createElement("option");
            activeOpt.value = "";
            activeOpt.textContent = "(active preset)";
            beatRandomizationConfigSelect.insertBefore(activeOpt, beatRandomizationConfigSelect.firstChild);
            if (presetData.activePreset) {
              beatRandomizationConfigSelect.value = presetData.activePreset;
            }
            setSelectOptions(dronePatternSelect, data.droneMidiPatterns || [], true);
            setSelectOptions(droneInstrumentSelect, data.droneInstruments || [], true);
            setSelectOptions(droneEffectSelect, data.droneEffects || [], true);
            mergeProcessingCatalog(data.processingActions || {});
            generatrSidebarOptionsLoaded = true;
          })
          .catch(function (err) {
            console.error("Failed to load generate options:", err);
          });
      }

      function updateGeneratrSubcommandVisibility() {
        var type = typeSelect.value;
        subcommandRow.classList.toggle("hidden", type !== "bass");
        transitionSubcommandRow.classList.toggle("hidden", type !== "transition");
        beatRows.forEach(function (row) {
          row.classList.toggle("hidden", type !== "beat");
        });
        droneRows.forEach(function (row) {
          row.classList.toggle("hidden", type !== "drone");
        });
        if (generatrPostProcessingRow) {
          generatrPostProcessingRow.classList.toggle(
            "hidden",
            type !== "beat" && type !== "drone"
          );
        }
        if (type === "beat" || type === "drone") {
          loadGeneratrSidebarOptions();
        }
      }
      typeSelect.addEventListener("change", updateGeneratrSubcommandVisibility);
      updateGeneratrSubcommandVisibility();

      var generatrPpFilter = document.getElementById("generatr-pp-filter");
      if (generatrPpFilter) {
        generatrPpFilter.addEventListener("input", function () {
          renderGeneratrPostProcessingLibraryFromCatalog();
        });
      }

      if (sidebarToggle && sidebar) {
        // Ensure initial icon/title match initial collapsed state
        (function syncSidebarToggleState() {
          var collapsed = sidebar.classList.contains("collapsed");
          sidebarToggleIcon.className = collapsed ? "fa-solid fa-chevron-left" : "fa-solid fa-chevron-right";
          sidebarToggle.title = collapsed ? "Show sidebar" : "Hide sidebar";
        })();

        sidebarToggle.addEventListener("click", function () {
          sidebar.classList.toggle("collapsed");
          var collapsed = sidebar.classList.contains("collapsed");
          sidebarToggleIcon.className = collapsed ? "fa-solid fa-chevron-left" : "fa-solid fa-chevron-right";
          sidebarToggle.title = collapsed ? "Show sidebar" : "Hide sidebar";
        });
      }

      var tabGen = document.getElementById("sidebar-tab-btn-generate");
      var tabEdit = document.getElementById("sidebar-tab-btn-edit");
      if (tabGen) {
        tabGen.addEventListener("click", function () { openAuditionrSidebarTab("generate"); });
      }
      if (tabEdit) {
        tabEdit.addEventListener("click", function () { openAuditionrSidebarTab("edit"); });
      }

      try {
        if (sessionStorage.getItem(AUDITIONR_SIDEBAR_TAB_KEY) === "edit") {
          openAuditionrSidebarTab("edit");
        }
      } catch (errTab) { /* ignore */ }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var type = typeSelect.value;
        var subcommand = "";
        var body = { type: type };
        if (type === "bass") subcommand = document.getElementById("generatr-subcommand").value;
        else if (type === "transition") subcommand = document.getElementById("generatr-transition-subcommand").value;
        if (subcommand) body.subcommand = subcommand;
        if (type === "beat") {
          var postCmds = generatrPostProcessQueue.map(function (x) { return x.command; });
          var tempoRaw = (beatTempoInput.value || "").trim();
          body.tempo = tempoRaw ? parseInt(tempoRaw, 10) : null;
          body.loops = parseInt(beatLoopsInput.value || "2", 10);
          body.pattern = (beatPatternInput.value || "").trim();
          body.kit = (beatKitInput.value || "").trim();
          body.sampleLibrary = beatRandomizationConfigSelect.value || "";
          body.swing = parseFloat(beatSwingInput.value || "0");
          body.iterations = parseInt(beatIterationsInput.value || "1", 10);
          body.variants = Array.from(
            beatVariantsList.querySelectorAll("input[type='checkbox']:checked")
          ).map(function (el) { return el.value; });
          body.postProcessing = postCmds;
        } else if (type === "drone") {
          var dronePostCmds = generatrPostProcessQueue.map(function (x) { return x.command; });
          body.name = (droneNameInput.value || "").trim();
          body.notes = (droneNotesInput.value || "").trim();
          body.chartName = (droneChartNameInput.value || "").trim();
          body.chartType = (droneChartTypeSelect.value || "").trim();
          body.tags = (droneTagsInput.value || "").trim();
          body.roots = (droneRootsInput.value || "").trim();
          body.pattern = (dronePatternSelect.value || "").trim();
          body.instrument = (droneInstrumentSelect.value || "").trim();
          body.effect = (droneEffectSelect.value || "").trim();
          body.iterations = Math.max(1, parseInt(droneIterationsInput.value || "1", 10) || 1);
          body.splitProcessing = !!droneSplitCheckbox.checked;
          body.postProcessing = dronePostCmds;
        }

        btnGenerate.disabled = true;
        if (busyOverlay) {
          busyOverlay.classList.remove("hidden");
          busyOverlay.setAttribute("aria-hidden", "false");
          busyOverlay.setAttribute("aria-busy", "true");
        }
        if (generateTabPanel) generateTabPanel.setAttribute("aria-busy", "true");
        resultEl.classList.add("hidden");
        errorEl.classList.add("hidden");
        errorEl.textContent = "";

        fetch("/api/generatr/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.error) {
              resultEl.classList.remove("hidden");
              errorEl.textContent = data.error;
              errorEl.classList.remove("hidden");
            } else {
              errorEl.classList.add("hidden");
              errorEl.textContent = "";
              socket.emit("requestExports");
            }
          })
          .catch(function (err) {
            resultEl.classList.remove("hidden");
            errorEl.textContent = err.message || "Request failed";
            errorEl.classList.remove("hidden");
          })
          .finally(function () {
            btnGenerate.disabled = false;
            if (busyOverlay) {
              busyOverlay.classList.add("hidden");
              busyOverlay.setAttribute("aria-hidden", "true");
              busyOverlay.setAttribute("aria-busy", "false");
            }
            if (generateTabPanel) generateTabPanel.setAttribute("aria-busy", "false");
          });
      });
    })();
  </script>
</body>

</html>
