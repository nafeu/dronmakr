<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ pagename }} | dronmakr v{{ version }}</title>
  <script src="/static/vendor/socket.io.min.js"></script>
  <script src="/static/vendor/wavesurfer.min.js"></script>
  {% include '_app_favicons.html' %}
  <link rel="stylesheet" href="/static/vendor/fonts/fragment-mono.css">
  <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css">
  <style>
    {% include '_app_css_root.html' %}

    body {
      height: 100%;
      box-sizing: border-box;
      overflow: hidden;
      padding-top: calc(var(--toolbar-height) + 0.1rem);
      padding-right: 0;
      display: flex;
      flex-direction: column;
    }

    /* Themed scrollbar */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--theme-a) var(--secondary);
    }

    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    *::-webkit-scrollbar-track {
      background: var(--secondary);
    }

    *::-webkit-scrollbar-thumb {
      background: var(--theme-a);
      border-radius: 4px;
    }

    *::-webkit-scrollbar-thumb:hover {
      background: var(--theme-b);
    }

    /* Floating chip (bottom-left): mirror #app-version-chip */
    #auditionr-actions-chip.auditionr-floating-chip {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 1100;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.35rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--theme-a);
      background: rgba(0, 0, 0, 0.82);
      color: var(--primary);
      font-size: 0.72rem;
      backdrop-filter: blur(3px);
      box-sizing: border-box;
      max-width: calc(100vw - 24px);
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .auditionr-chip-sep {
      width: 1px;
      align-self: stretch;
      min-height: 1rem;
      background: var(--theme-a);
      opacity: 0.85;
      flex-shrink: 0;
    }

    .auditionr-chip-seg {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      white-space: nowrap;
    }

    .auditionr-chip-seg i {
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .auditionr-chip-stat {
      opacity: 0.95;
      user-select: none;
    }

    .auditionr-chip-btn {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.15s ease;
    }

    .auditionr-chip-btn:hover:not(:disabled) {
      opacity: 1;
    }

    .auditionr-chip-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .auditionr-layout {
      display: flex;
      width: 100%;
      max-width: 100%;
      gap: 0;
      flex: 1 1 auto;
      min-height: 0;
    }

    .auditionr-main {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #waveforms {
      max-width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding-right: 0.5rem;
      box-sizing: border-box;
      position: relative;
    }

    .queue-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      pointer-events: none;
      color: var(--theme-b);
      opacity: 0.7;
      font-size: 0.9rem;
      text-align: center;
    }

    .queue-empty-icon {
      font-size: 1.6rem;
      color: var(--theme-a);
    }

    .auditionr-sidebar {
      width: 600px;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      transition: width 0.2s ease, min-width 0.2s ease;
      overflow: hidden;
    }

    .auditionr-sidebar.collapsed {
      width: 0;
      min-width: 0;
      border-left-width: 0;
      overflow: hidden;
    }

    .auditionr-sidebar-content {
      min-width: 500px;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .sidebar-toggle {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      width: 20px;
      height: 48px;
      padding: 0;
      border: none;
      border-radius: 0 4px 4px 0;
      background: var(--theme-a);
      color: var(--primary);
      cursor: pointer;
      font-size: 0.75rem;
      z-index: 2;
      transition: background 0.15s ease;
    }

    .sidebar-toggle:hover {
      background: var(--primary);
      color: var(--secondary);
    }

    .auditionr-sidebar-wrapper {
      position: relative;
      flex-shrink: 0;
      min-width: 20px;
      height: 100%;
      min-height: 0;
      align-self: stretch;
      display: flex;
      flex-direction: column;
    }

    .generatr-card {
      padding: 1rem;
      padding-left: 2rem;
      overflow-y: scroll;
      max-height: 85vh;
    }

    .generatr-card h2 {
      font-size: 0.9rem;
      margin: 0 0 0.75rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary);
    }

    .generatr-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .generatr-form .form-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0.6rem;
    }

    .generatr-form .form-row label {
      font-size: 0.75rem;
      color: var(--theme-b);
      min-width: 120px;
      flex: 0 0 120px;
      text-align: right;
    }

    .generatr-form .form-row select,
    .generatr-form .form-row input[type="text"],
    .generatr-form .form-row input[type="number"] {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.4rem 0.5rem;
      background: var(--theme-a);
      border: 1px solid var(--theme-a);
      border-radius: 4px;
      color: var(--primary);
      width: auto;
      flex: 1 1 auto;
      cursor: pointer;
      box-sizing: border-box;
    }

    .generatr-form .form-row select:focus,
    .generatr-form .form-row input[type="text"]:focus,
    .generatr-form .form-row input[type="number"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    .generatr-form .form-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      flex: 0 0 auto;
      accent-color: var(--primary);
    }

    .generatr-form .form-row.form-row-post-processing {
      align-items: flex-start;
    }

    .btn-generate {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.45rem 0.85rem;
      background: var(--primary);
      color: var(--secondary);
      border: 1px solid var(--primary);
      border-radius: 4px;
      cursor: pointer;
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: opacity 0.15s ease;
    }

    .btn-generate:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn-generate:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .generatr-loading {
      font-size: 0.8rem;
      color: var(--theme-b);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .generatr-loading.hidden {
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 0.9rem;
      height: 0.9rem;
      border: 2px solid var(--theme-a);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .generatr-result {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--theme-a);
      padding-inline: 1.5rem;
    }

    .generatr-result.hidden {
      display: none;
    }

    .generatr-result h3 {
      font-size: 0.8rem;
      margin: 0 0 0.4rem 0;
      color: var(--theme-b);
    }

    .generatr-result ul {
      margin: 0;
      padding-left: 1.1rem;
      font-size: 0.75rem;
      color: var(--primary);
      line-height: 1.5;
      word-break: break-all;
    }

    .generatr-result .error {
      color: var(--theme-c);
      font-size: 0.8rem;
    }

    .generatr-result .generatr-error.hidden {
      display: none;
    }

    .hidden {
      display: none !important;
    }

    .button {
      cursor: pointer;
      border-bottom: 2px solid var(--theme-a);
      padding-inline: 5px;
      padding-block: 5px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .button:hover {
      opacity: 0.5;
    }

    .button.icon-btn {
      width: 36px;
      min-width: 36px;
      padding: 6px;
      text-align: center;
      border: none;
      border-bottom: 2px solid var(--theme-a);
    }

    .button.icon-btn:hover {
      border-bottom-color: var(--primary);
    }

    .fixed-button {
      width: 40px;
      text-align: center;
      font-weight: bold;
      border: none;
      border-bottom: 2px solid var(--primary);
      background-color: var(--primary);
      color: var(--secondary);
    }

    .processing-type-active {
      border: none;
      border-bottom: 2px solid var(--primary);
      background-color: var(--primary);
      color: #000;
    }

    .drumpattern-sample .waveform-actions .processing-type-active {
      background-color: var(--theme-b);
      border-bottom-color: var(--theme-b);
      color: #000;
    }

    .transition-sample .waveform-actions .button.processing-type-active {
      background-color: var(--theme-c);
      border-bottom-color: var(--theme-c);
      color: #000;
    }

    .waveform {
      margin-bottom: 1rem;
    }

    .waveform-wrapper {
      /* border: 2px solid var(--theme-a); */
      padding: 10px;
      margin-bottom: 1rem;
      /* border-radius: 10px; */
      transition: opacity 0.2s ease;
    }

    .waveform-wrapper.waveform-processing {
      opacity: 0.52;
      pointer-events: none;
    }

    .waveform-processing .waveform-duration {
      color: var(--theme-b);
    }

    .waveform-title {
      font-size: 0.75rem;
      margin-bottom: 1rem;
    }

    .waveform-actions,
    .title-container {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .processing-actions-divider {
      width: 1px;
      height: 20px;
      border-left: 1px solid var(--theme-a);
      opacity: 0.6;
      align-self: center;
      margin: 0 4px;
    }

    .drumpattern-sample .waveform-actions .processing-actions-divider {
      border-left-color: var(--theme-b);
    }

    .transition-sample .waveform-actions .processing-actions-divider {
      border-left-color: var(--theme-c);
    }

    .waveform-duration {
      font-size: 0.75rem;
      color: var(--theme-c);
      font-weight: bold;
    }

    /* Drumpattern sample: blue theme */
    .drumpattern-sample .waveform-title {
      color: var(--theme-b);
    }

    .drumpattern-sample .waveform-actions .button {
      color: var(--theme-b);
    }

    .drumpattern-sample .waveform-actions .fixed-button {
      background-color: var(--theme-b);
      border-bottom-color: var(--theme-b);
      color: var(--secondary);
    }

    .drumpattern-sample .waveform-actions .button:hover {
      border-bottom-color: var(--theme-b);
    }

    /* Transition sample: orange theme */
    .transition-sample .waveform-title {
      color: var(--theme-c);
    }

    .transition-sample .waveform-actions .button {
      color: var(--theme-c);
    }

    .transition-sample .waveform-actions .fixed-button {
      background-color: var(--theme-c);
      border-bottom-color: var(--theme-c);
      color: var(--secondary);
    }

    .transition-sample .waveform-actions .button:hover {
      border-bottom-color: var(--theme-c);
    }

    .waveform-actions .button.processing-type-active {
      color: #000;
    }

    #logs {
      background-color: var(--theme-a);
    }

    .disabled {
      opacity: 0.25;
    }

    .center-offset {
      margin-top: 3px;
    }

    #app-version-chip {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 1100;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.35rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--theme-a);
      background: rgba(0, 0, 0, 0.82);
      color: var(--primary);
      font-size: 0.72rem;
      backdrop-filter: blur(3px);
    }

    #app-version-chip a {
      color: var(--primary);
      text-decoration: none;
      opacity: 0.9;
    }

    #app-version-chip a:hover {
      opacity: 1;
    }

    #generatr-beat-variants-list label input {
      margin-right: 5px;
    }
  </style>
</head>

<body>
  {% include '_loading_overlay.html' %}
  {% include '_app_toolbar.html' %}
  {% include '_auditionr_subtoolbar.html' %}

  <div class="auditionr-layout page-layout">
    <div class="auditionr-main">
      <main id="waveforms">
        <div id="waveform-container"></div>
        <div id="queue-empty-placeholder" class="queue-empty hidden">
          <div class="queue-empty-icon"><i class="fa-solid fa-inbox"></i></div>
          <div>Queue is empty</div>
        </div>
      </main>
    </div>
    <div class="auditionr-sidebar-wrapper">
      <button type="button" class="sidebar-toggle" id="sidebar-toggle" title="Show generate sidebar"
        aria-label="Toggle generate sidebar">
        <i class="fa-solid fa-chevron-left" id="sidebar-toggle-icon"></i>
      </button>
      <aside class="auditionr-sidebar collapsed" id="auditionr-sidebar">
        <div class="auditionr-sidebar-content">
          <div class="generatr-card">
            <h2><i class="fa-solid fa-wand-magic-sparkles"></i> Generate Samples</h2>
            <form class="generatr-form" id="generatr-form">
              <div class="form-row">
                <label for="generatr-type">Type</label>
                <select id="generatr-type" name="type">
                  <option value="beat">beat</option>
                  <option value="drone">drone</option>
                  <option value="bass">bass</option>
                  <option value="transition">transition</option>
                </select>
              </div>
              <div class="form-row form-row-subcommand hidden" id="generatr-subcommand-row">
                <label for="generatr-subcommand">Subcommand</label>
                <select id="generatr-subcommand" name="subcommand">
                  <option value="reese">reese</option>
                  <option value="donk">donk</option>
                </select>
              </div>
              <div class="form-row form-row-subcommand hidden" id="generatr-transition-subcommand-row">
                <label for="generatr-transition-subcommand">Subcommand</label>
                <select id="generatr-transition-subcommand" name="transition_subcommand">
                  <option value="sweep">sweep</option>
                  <option value="closh">closh</option>
                  <option value="kickboom">kickboom</option>
                  <option value="longcrash">longcrash</option>
                  <option value="riser">riser</option>
                  <option value="drop">drop</option>
                </select>
              </div>
              <div class="form-row hidden" id="generatr-drone-name-row">
                <label for="generatr-drone-name">Sample name</label>
                <input type="text" id="generatr-drone-name" placeholder="omit for random">
              </div>
              <div class="form-row hidden" id="generatr-drone-notes-row">
                <label for="generatr-drone-notes">Notes</label>
                <input type="text" id="generatr-drone-notes" placeholder="e.g. C2,D#3,F#3 (overrides chord/scale picks)">
              </div>
              <div class="form-row hidden" id="generatr-drone-chart-name-row">
                <label for="generatr-drone-chart-name">Chart name</label>
                <input type="text" id="generatr-drone-chart-name" placeholder="filter by chart name substring">
              </div>
              <div class="form-row hidden" id="generatr-drone-chart-type-row">
                <label for="generatr-drone-chart-type">Chart type</label>
                <select id="generatr-drone-chart-type" name="drone_chart_type">
                  <option value="">(any)</option>
                  <option value="chord">chord</option>
                  <option value="scale">scale</option>
                </select>
              </div>
              <div class="form-row hidden" id="generatr-drone-tags-row">
                <label for="generatr-drone-tags">Tags</label>
                <input type="text" id="generatr-drone-tags" placeholder="comma-separated">
              </div>
              <div class="form-row hidden" id="generatr-drone-roots-row">
                <label for="generatr-drone-roots">Roots</label>
                <input type="text" id="generatr-drone-roots" placeholder="comma-separated">
              </div>
              <div class="form-row hidden" id="generatr-drone-pattern-row">
                <label for="generatr-drone-pattern">MIDI pattern</label>
                <select id="generatr-drone-pattern"></select>
              </div>
              <div class="form-row hidden" id="generatr-drone-instrument-row">
                <label for="generatr-drone-instrument">Instrument</label>
                <select id="generatr-drone-instrument"></select>
              </div>
              <div class="form-row hidden" id="generatr-drone-effect-row">
                <label for="generatr-drone-effect">Effect / FX chain</label>
                <select id="generatr-drone-effect"></select>
              </div>
              <div class="form-row hidden" id="generatr-drone-iterations-row">
                <label for="generatr-drone-iterations">Iterations</label>
                <input type="number" id="generatr-drone-iterations" min="1" value="1">
              </div>
              <div class="form-row hidden" id="generatr-drone-split-row">
                <label for="generatr-drone-split">Render Options</label>
                <div>
                  <label><input type="checkbox" id="generatr-drone-split"> Milestone WAVs</label>
                </div>
              </div>
              <div class="form-row hidden" id="generatr-beat-tempo-row">
                <label for="generatr-beat-tempo">Tempo</label>
                <input type="number" id="generatr-beat-tempo" min="1" placeholder="pattern tempo">
              </div>
              <div class="form-row hidden" id="generatr-beat-loops-row">
                <label for="generatr-beat-loops">Loops</label>
                <input type="number" id="generatr-beat-loops" min="1" value="2">
              </div>
              <div class="form-row hidden" id="generatr-beat-pattern-row">
                <label for="generatr-beat-pattern">Pattern</label>
                <input type="text" id="generatr-beat-pattern" placeholder="use random pattern">
              </div>
              <div class="form-row hidden" id="generatr-beat-kit-row">
                <label for="generatr-beat-kit">Kit</label>
                <input type="text" id="generatr-beat-kit" placeholder="use random kit">
              </div>
              <div class="form-row hidden" id="generatr-beat-randomization-config-row">
                <label for="generatr-beat-randomization-config">Sample Library</label>
                <select id="generatr-beat-randomization-config"></select>
              </div>
              <div class="form-row hidden" id="generatr-beat-swing-row">
                <label for="generatr-beat-swing">Swing</label>
                <input type="number" id="generatr-beat-swing" min="0" max="1" step="0.01" value="0">
              </div>
              <div class="form-row hidden" id="generatr-beat-iterations-row">
                <label for="generatr-beat-iterations">Iterations</label>
                <input type="number" id="generatr-beat-iterations" min="1" value="1">
              </div>
              <div class="form-row hidden" id="generatr-beat-variants-row">
                <label>Render Variants</label>
                <div id="generatr-beat-variants-list">
                  <label><input type="checkbox" value="1/2">1/2 Tempo</label>
                  <label><input type="checkbox" value="1/4">1/4 Tempo</label>
                  <label><input type="checkbox" value="3/4">3/4 Tempo</label>
                </div>
              </div>
              <div class="form-row form-row-post-processing hidden" id="generatr-beat-post-processing-row">
                <label>Post Processing</label>
                <div id="generatr-beat-post-processing-list"></div>
              </div>
              <button type="submit" class="btn-generate" id="generatr-btn">
                <i class="fa-solid fa-play"></i> Generate
              </button>
              <div class="generatr-loading hidden" id="generatr-loading">
                <span class="spinner"></span>
                <span>Generating…</span>
              </div>
            </form>
            <div class="generatr-result hidden" id="generatr-result">
              <h3>Generated files</h3>
              <ul id="generated-paths"></ul>
              <p class="error generatr-error hidden" id="generatr-error"></p>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>
  {% include '_app_version_chip.html' %}
  <script>
    var socket = io();
    var lastFolderCounts = { archive: 0, trash: 0, exports: 0, saved: 0 };
    var selectedWaveformTimestamps = {};
    var currentDisplayedFiles = [];
    var waveformInstances = {};
    var processingGuardMs = 120000;
    var db = 2;
    var lastEdited = "";
    var sharedAudioContext = null;
    var currentDrumpatternStop = null;

    function getAudioContext() {
      if (!sharedAudioContext) sharedAudioContext = new (window.AudioContext || window.webkitAudioContext)();
      return sharedAudioContext;
    }
    function emptyTrash() {
      var button = document.getElementById("empty-trash-button");
      var originalHtml = button.innerHTML;
      button.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      button.disabled = true;
      button.title = "Emptying...";

      fetch("/emptytrash")
        .then(response => response.json())
        .then(data => {
          console.log("Response:", data);
          button.title = "Emptied.";
          setTimeout(function () {
            button.innerHTML = originalHtml;
            updateFolderCounts(lastFolderCounts);
            button.title = "Empty Trash";
            button.disabled = false;
          }, 800);
        })
        .catch(function (error) {
          console.error("Error:", error);
          button.innerHTML = originalHtml;
          button.title = "Empty Trash";
          button.disabled = false;
        });
    }

    function unarchiveSamples() {
      var button = document.getElementById("unarchive-samples-button");
      var originalHtml = button.innerHTML;
      button.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      button.disabled = true;
      button.title = "Moving files...";

      fetch("/unarchive")
        .then(response => response.json())
        .then(data => {
          console.log("Response:", data);
          button.title = "Files moved.";
          setTimeout(function () {
            button.innerHTML = originalHtml;
            updateFolderCounts(lastFolderCounts);
            button.title = "Unarchive Samples";
            button.disabled = false;
          }, 800);
        })
        .catch(function (error) {
          console.error("Error:", error);
          button.innerHTML = originalHtml;
          button.title = "Unarchive Samples";
          button.disabled = false;
        });

    function formatTimestamp(seconds) {
      const roundedSeconds = Math.round(seconds); // Round to the nearest second
      const hours = Math.floor(roundedSeconds / 3600);
      const minutes = Math.floor((roundedSeconds % 3600) / 60);
      const remainingSeconds = roundedSeconds % 60;
      return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
    }

    function auditionrBasename(absPath) {
      return absPath.split("/").pop();
    }

    /** GET /exports/... — encode #, ?, etc. so the path is not truncated as a URL fragment. */
    function auditionrExportsMediaUrl(absPath, cacheBust) {
      var u = "/exports/" + encodeURIComponent(auditionrBasename(absPath));
      return cacheBust ? u + "?v=" + Date.now() : u;
    }

    /** POST body path token; keeps literal characters (e.g. #) for server basename resolution. */
    function auditionrExportsApiPath(absPath) {
      return "/exports/" + auditionrBasename(absPath);
    }

    function revealSample(path) {
      fetch("/reveal", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      }).then(response => response.json())
        .then(data => { if (data.error) alert(data.error); });
    }

    function saveSample(path) {
      fetch("/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      }).then(response => response.json())
        .then(data => console.log(data))
        .catch(error => console.error("Error:", error));
    }

    function resolveDisplayedFileFromProcessPath(pathToken) {
      if (!pathToken || typeof pathToken !== "string") return null;
      pathToken = pathToken.trim();
      if (!pathToken) return null;
      if (waveformInstances[pathToken]) return pathToken;
      var slug = pathToken.indexOf("/exports/") === 0
        ? pathToken.slice("/exports/".length)
        : auditionrBasename(pathToken);
      try {
        slug = decodeURIComponent(slug);
      } catch (e) {}
      var i;
      for (i = 0; i < currentDisplayedFiles.length; i++) {
        var abs = currentDisplayedFiles[i];
        if (auditionrBasename(abs) === slug || auditionrExportsApiPath(abs) === pathToken) return abs;
      }
      return null;
    }

    function endWaveformProcessing(absPath, opts) {
      opts = opts || {};
      var inst = waveformInstances[absPath];
      if (!inst) return;
      inst.pendingProcessingReveal = false;
      if (inst.processingSafetyTimer) {
        clearTimeout(inst.processingSafetyTimer);
        inst.processingSafetyTimer = null;
      }
      if (inst.wrapper) inst.wrapper.classList.remove("waveform-processing");
      if (!opts.skipDurationRepair && inst.wavesurfer && inst.durationEl) {
        var d = inst.wavesurfer.getDuration();
        if (typeof d === "number" && !isNaN(d) && d > 0) {
          inst.durationEl.textContent = formatTimestamp(d);
        }
      }
    }

    function beginWaveformProcessing(absPath) {
      var inst = waveformInstances[absPath];
      if (!inst || !inst.wrapper || !inst.durationEl) return;
      if (typeof inst.stopPlayback === "function") {
        try { inst.stopPlayback(); } catch (err) {}
      }
      inst.pendingProcessingReveal = true;
      inst.wrapper.classList.add("waveform-processing");
      inst.durationEl.textContent = "processing...";
      if (inst.processingSafetyTimer) clearTimeout(inst.processingSafetyTimer);
      inst.processingSafetyTimer = setTimeout(function () {
        if (!waveformInstances[absPath] || !waveformInstances[absPath].pendingProcessingReveal) return;
        endWaveformProcessing(absPath);
      }, processingGuardMs);
    }

    function processSample(params) {
      var fileAbs = resolveDisplayedFileFromProcessPath(params.path);
      if (fileAbs) beginWaveformProcessing(fileAbs);
      fetch("/process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(params)
      })
        .then(function (response) {
          return response.json().then(function (data) {
            return { ok: response.ok, data: data };
          });
        })
        .then(function (pack) {
          if (!pack.ok || (pack.data && pack.data.error)) {
            if (fileAbs) endWaveformProcessing(fileAbs);
          }
          console.log(pack.data);
        })
        .catch(function (error) {
          if (fileAbs) endWaveformProcessing(fileAbs);
          console.error("Error:", error);
        });
    }

    function removeWaveform(file) {
      var inst = waveformInstances[file];
      if (!inst) return;
      if (inst.processingSafetyTimer) {
        clearTimeout(inst.processingSafetyTimer);
        inst.processingSafetyTimer = null;
      }
      if (inst.stopPlayback) inst.stopPlayback();
      if (inst.wavesurfer) {
        try { inst.wavesurfer.destroy(); } catch (e) { }
      }
      if (inst.wrapper && inst.wrapper.parentNode) {
        inst.wrapper.parentNode.removeChild(inst.wrapper);
      }
      delete waveformInstances[file];

    function applyExportsUpdate(newFiles, updatedPath, undoAvailability) {
      if (currentDrumpatternStop) {
        currentDrumpatternStop();
        currentDrumpatternStop = null;
      }
      var removed = currentDisplayedFiles.filter(function (f) { return newFiles.indexOf(f) === -1; });
      removed.forEach(removeWaveform);

      currentDisplayedFiles = newFiles;
      var container = document.getElementById("waveform-container");
      var emptyPlaceholder = document.getElementById("queue-empty-placeholder");

      newFiles.forEach(function (file) {
        if (!selectedWaveformTimestamps.hasOwnProperty(file)) selectedWaveformTimestamps[file] = 0;
      });

      var orderedWrappers = [];
      var pendingReady = 0;
      newFiles.forEach(function (file) {
        var inst = waveformInstances[file];
        if (inst && inst.wrapper) {
          orderedWrappers.push(inst.wrapper);
        } else {
          pendingReady++;
        }
      });
      function onWaveformReady() {
        pendingReady--;
        if (pendingReady === 0 && window.__pageReady) window.__pageReady();
      }
      newFiles.forEach(function (file) {
        var inst = waveformInstances[file];
        if (inst && inst.wrapper) {
          /* already pushed */
          if (undoAvailability && Object.prototype.hasOwnProperty.call(undoAvailability, file)) {
            setUndoButtonState(file, !!undoAvailability[file]);
          }
        } else {
          var created = createSingleWaveform(file, onWaveformReady);
          if (created) {
            waveformInstances[file] = created;
            orderedWrappers.push(created.wrapper);
            if (undoAvailability && Object.prototype.hasOwnProperty.call(undoAvailability, file)) {
              setUndoButtonState(file, !!undoAvailability[file]);
            }
          } else {
            onWaveformReady();
          }
        }
      });

      container.innerHTML = "";
      orderedWrappers.forEach(function (w) { container.appendChild(w); });

      if (emptyPlaceholder) {
        if (!newFiles.length) {
          emptyPlaceholder.classList.remove("hidden");
        } else {
          emptyPlaceholder.classList.add("hidden");
        }
      }

      if (pendingReady === 0 && window.__pageReady) window.__pageReady();
      if (updatedPath && newFiles.indexOf(updatedPath) !== -1) {
        refreshWaveform(updatedPath);
      }
    }

      normalizeButton.addEventListener("click", () => processSample({

      }));

      var deleteButton = document.createElement("div");
      var duplicateButton = document.createElement("div");
      duplicateButton.innerHTML = "<i class=\"fa-solid fa-copy\"></i>";
      duplicateButton.classList.add("button", "icon-btn");
      duplicateButton.title = "Duplicate";

      deleteButton.addEventListener("click", () => deleteSample(apiPath));
      actions.appendChild(deleteButton);

      var trimStartButton = null;
      var trimEndButton = null;
      var activeProcessingType = null;
      var processingActionButtons = [];
      var processingActionsDivider = document.createElement("div");
      processingActionsDivider.classList.add("processing-actions-divider", "hidden");

        .concat((processingCatalog.types || []).map(function (type) {
          return { key: type.key, label: type.label };
        }))
        .filter(function (type) { return type.key !== "normalize"; });

      function clearProcessingActions() {
        processingActionButtons.forEach(function (btn) { actions.removeChild(btn); });
        processingActionButtons = [];
        trimStartButton = null;
        trimEndButton = null;

      function addProcessingAction(label, command, extraParams) {
        var btn = document.createElement("div");
        btn.innerText = label;
        btn.classList.add("button");
        btn.addEventListener("click", () => processSample(Object.assign({
          path: apiPath,
          command: command,
          files: getCurrentFiles()
        }, extraParams || {})));
        actions.appendChild(btn);
        processingActionButtons.push(btn);
        return btn;
      }

      function renderProcessingActions(processingType) {
        clearProcessingActions();
        processingActionsDivider.classList.toggle("hidden", !processingType);
        if (!processingType) return;

        if (processingType === "cut") {
          trimStartButton = addProcessingAction(
            `Start At ${formatTimestamp(selectedWaveformTimestamps[file])}`,
            "trim_sample_start",
            { seconds: selectedWaveformTimestamps[file] }
          );
          trimEndButton = addProcessingAction(
            `End At ${formatTimestamp(selectedWaveformTimestamps[file])}`,
            "trim_sample_end",
            { seconds: selectedWaveformTimestamps[file] }
          );
          return;
        }
        (processingCatalog.actions || [])
          .filter(function (action) { return action.type === processingType; })
          .forEach(function (action) {
            addProcessingAction(action.label, action.command, action.params || {});
          });
      }

      processingTypes.forEach(function (type) {
        var processingTypeButton = document.createElement("div");
        processingTypeButton.innerText = type.label;
        processingTypeButton.classList.add("button");
        processingTypeButton.addEventListener("click", function () {
          if (activeProcessingType === type.key) {
            activeProcessingType = null;
            processingTypeButton.classList.remove("processing-type-active");
            renderProcessingActions(null);
            return;
          }

          activeProcessingType = type.key;
          Object.keys(processingTypeButtons).forEach(function (k) {
            processingTypeButtons[k].classList.toggle("processing-type-active", k === type.key);
          });
          renderProcessingActions(type.key);
        });
        processingTypeButtons[type.key] = processingTypeButton;
        actions.appendChild(processingTypeButton);
      });
      actions.appendChild(processingActionsDivider);

      wrapper.appendChild(actions);

      fetchUndoStatus(apiPath).then(function (canUndo) {
        undoButton.classList.toggle("disabled", !canUndo);
      });

      var container = document.getElementById("waveform-container");
      container.appendChild(wrapper);
      var wavesurfer = WaveSurfer.create({
        container: "#" + waveformIdSafe,
        waveColor: "#353531",
        progressColor: isDrumpattern ? "#016fb9" : (isTransition ? "#ec4e20" : "#ff9505"),
        backend: "MediaElement",
        height: 80
      });

      wavesurfer.load(mediaUrl);

      wavesurfer.on("error", function () {
        var pinnedErr = waveformInstances[file];
        if (pinnedErr && pinnedErr.pendingProcessingReveal) {
          endWaveformProcessing(file);
        }
      });

      wavesurfer.on("seeking", function (currentTime) {
        selectedWaveformTimestamps[file] = currentTime;
        if (trimStartButton) trimStartButton.innerText = `Start At ${formatTimestamp(selectedWaveformTimestamps[file])}`;
        if (trimEndButton) trimEndButton.innerText = `End At ${formatTimestamp(selectedWaveformTimestamps[file])}`;
      });

      var drumpatternBuffer = null;
      var drumpatternPlaying = false;
      var drumpatternSourceNode = null;
      var drumpatternStartTime = 0;
      var drumpatternRafId = null;

      wavesurfer.on("ready", function () {
        duration.innerText = `${formatTimestamp(wavesurfer.getDuration())}`;
        var pinnedReady = waveformInstances[file];
        if (pinnedReady && pinnedReady.pendingProcessingReveal) {
          endWaveformProcessing(file, { skipDurationRepair: true });
        }
        if (isDrumpattern) {
          fetch(mediaUrl)
            .then(function (r) { return r.arrayBuffer(); })
            .then(function (ab) {
              return getAudioContext().decodeAudioData(ab);
            })
            .then(function (buffer) {
              drumpatternBuffer = buffer;
              playButton.classList.remove("disabled");
            })
            .catch(function (e) {
              console.error("Drumpattern decode failed", e);
              playButton.classList.remove("disabled");
            });
        }
        if (typeof onReady === "function") onReady();
      });

      function updatePlayButton(isPlaying) {
        if (isPlaying) {
          playButton.innerHTML = "<i class=\"fa-solid fa-pause center-offset\"></i>";
          playButton.title = "Pause";
        } else {
          playButton.innerHTML = "<i class=\"fa-solid fa-play center-offset\"></i>";
          playButton.title = "Play";
        }
      }

      function stopPlayback() {
        if (isDrumpattern) {
          try { if (drumpatternSourceNode) drumpatternSourceNode.stop(); } catch (err) { }
          drumpatternSourceNode = null;
          drumpatternPlaying = false;
          if (drumpatternRafId != null) cancelAnimationFrame(drumpatternRafId);
          drumpatternRafId = null;
          if (currentDrumpatternStop === stopPlayback) currentDrumpatternStop = null;
          wavesurfer.seekTo(0);
          updatePlayButton(false);
          return;
        }
        var mediaEl = wavesurfer.getMediaElement && wavesurfer.getMediaElement();
        if (mediaEl) mediaEl.loop = false;
        try { wavesurfer.pause(); } catch (e) { }
        if (wavesurfer.getDuration() > 0) wavesurfer.seekTo(0);
        updatePlayButton(false);
      }

      function updateDrumpatternPlayhead() {
        if (!drumpatternPlaying || !drumpatternBuffer) return;
        var ctx = getAudioContext();
        var d = drumpatternBuffer.duration;
        var elapsed = ctx.currentTime - drumpatternStartTime;
        var t = d > 0 ? (elapsed % d) / d : 0;
        wavesurfer.seekTo(Math.min(1, Math.max(0, t)));
        drumpatternRafId = requestAnimationFrame(updateDrumpatternPlayhead);
      }

      wavesurfer.on("play", function () {
        updatePlayButton(true);
      });

      wavesurfer.on("pause", function () {
        if (!isDrumpattern && !wavesurfer.isPlaying()) updatePlayButton(false);
      });

      playButton.addEventListener("click", function () {
        if (isDrumpattern) {
          if (playButton.classList.contains("disabled") || !drumpatternBuffer) return;
          if (drumpatternPlaying) {
            stopPlayback();
            return;
          }
          if (currentDrumpatternStop && currentDrumpatternStop !== stopPlayback) currentDrumpatternStop();
          var ctx = getAudioContext();
          if (ctx.state === "suspended") ctx.resume();
          var src = ctx.createBufferSource();
          src.buffer = drumpatternBuffer;
          src.loop = true;
          src.connect(ctx.destination);
          src.start(0);
          drumpatternSourceNode = src;
          drumpatternStartTime = ctx.currentTime;
          drumpatternPlaying = true;
          currentDrumpatternStop = stopPlayback;
          updatePlayButton(true);
          drumpatternRafId = requestAnimationFrame(updateDrumpatternPlayhead);
          return;
        }

        if (wavesurfer.isPlaying()) {
          stopPlayback();
        } else {
          var mediaEl = wavesurfer.getMediaElement && wavesurfer.getMediaElement();
          if (mediaEl) mediaEl.loop = true;
          wavesurfer.play();
        }
      });

      return {
        wrapper: wrapper,
        wavesurfer: wavesurfer,
        durationEl: duration,
        stopPlayback: stopPlayback,
        undoButton: undoButton,
        pendingProcessingReveal: false,
        processingSafetyTimer: null
      };
    }

    (function () {
      /**
       * Feature flags (auditionr only): ?flags=FLAG_A,FLAG_B
       * Flags are trimmed, lowercased, and stored in a Set for quick lookup.
       * Example: ?flags=all_cli_options — also shows bass and transition in Generate Samples.
       */
      function parseAuditionrFeatureFlags() {
        try {
          var params = new URLSearchParams(window.location.search);
          var raw = params.get("flags") || "";
          return new Set(
            raw.split(",")
              .map(function (s) { return String(s).trim().toLowerCase(); })
              .filter(function (s) { return s.length > 0; })
          );
        } catch (e) {
          return new Set();
        }
      }

      var auditionrFeatureFlags = parseAuditionrFeatureFlags();
      var FLAG_ALL_CLI_OPTIONS = "all_cli_options";

      var typeSelect = document.getElementById("generatr-type");
      if (typeSelect && !auditionrFeatureFlags.has(FLAG_ALL_CLI_OPTIONS)) {
        var gatedTypeValues = { bass: true, transition: true };
        var toRemove = [];
        Array.from(typeSelect.options).forEach(function (opt) {
          if (gatedTypeValues[opt.value]) toRemove.push(opt);
        });
        toRemove.forEach(function (opt) { opt.remove(); });
        var stillValid = Array.from(typeSelect.options).some(function (o) { return o.value === typeSelect.value; });
        if (!stillValid) typeSelect.value = "beat";
      }

      var subcommandRow = document.getElementById("generatr-subcommand-row");
      var transitionSubcommandRow = document.getElementById("generatr-transition-subcommand-row");
      var droneRows = [
        document.getElementById("generatr-drone-name-row"),
        document.getElementById("generatr-drone-notes-row"),
        document.getElementById("generatr-drone-chart-name-row"),
        document.getElementById("generatr-drone-chart-type-row"),
        document.getElementById("generatr-drone-tags-row"),
        document.getElementById("generatr-drone-roots-row"),
        document.getElementById("generatr-drone-pattern-row"),
        document.getElementById("generatr-drone-instrument-row"),
        document.getElementById("generatr-drone-effect-row"),
        document.getElementById("generatr-drone-iterations-row"),
        document.getElementById("generatr-drone-split-row")
      ];
      var beatRows = [
        document.getElementById("generatr-beat-tempo-row"),
        document.getElementById("generatr-beat-loops-row"),
        document.getElementById("generatr-beat-pattern-row"),
        document.getElementById("generatr-beat-kit-row"),
        document.getElementById("generatr-beat-randomization-config-row"),
        document.getElementById("generatr-beat-swing-row"),
        document.getElementById("generatr-beat-iterations-row"),
        document.getElementById("generatr-beat-variants-row")
      ];
      var generatrPostProcessingRow = document.getElementById("generatr-beat-post-processing-row");
      var beatTempoInput = document.getElementById("generatr-beat-tempo");
      var beatLoopsInput = document.getElementById("generatr-beat-loops");
      var beatPatternInput = document.getElementById("generatr-beat-pattern");
      var beatKitInput = document.getElementById("generatr-beat-kit");
      var beatRandomizationConfigSelect = document.getElementById("generatr-beat-randomization-config");
      var beatSwingInput = document.getElementById("generatr-beat-swing");
      var beatIterationsInput = document.getElementById("generatr-beat-iterations");
      var beatVariantsList = document.getElementById("generatr-beat-variants-list");
      var beatPostProcessingList = document.getElementById("generatr-beat-post-processing-list");
      var droneNameInput = document.getElementById("generatr-drone-name");
      var droneNotesInput = document.getElementById("generatr-drone-notes");
      var droneChartNameInput = document.getElementById("generatr-drone-chart-name");
      var droneChartTypeSelect = document.getElementById("generatr-drone-chart-type");
      var droneTagsInput = document.getElementById("generatr-drone-tags");
      var droneRootsInput = document.getElementById("generatr-drone-roots");
      var dronePatternSelect = document.getElementById("generatr-drone-pattern");
      var droneInstrumentSelect = document.getElementById("generatr-drone-instrument");
      var droneEffectSelect = document.getElementById("generatr-drone-effect");
      var droneIterationsInput = document.getElementById("generatr-drone-iterations");
      var droneSplitCheckbox = document.getElementById("generatr-drone-split");
      var form = document.getElementById("generatr-form");
      var btnGenerate = document.getElementById("generatr-btn");
      var loadingEl = document.getElementById("generatr-loading");
      var resultEl = document.getElementById("generatr-result");
      var pathsList = document.getElementById("generated-paths");
      var errorEl = document.getElementById("generatr-error");
      var sidebar = document.getElementById("auditionr-sidebar");
      var sidebarToggle = document.getElementById("sidebar-toggle");
      var sidebarToggleIcon = document.getElementById("sidebar-toggle-icon");
      var generatrSidebarOptionsLoaded = false;

      function setSelectOptions(selectEl, values, includeRandom) {
        var current = selectEl.value;
        selectEl.innerHTML = "";
        if (includeRandom) {
          var randomOpt = document.createElement("option");
          randomOpt.value = "";
          randomOpt.textContent = "(random)";
          selectEl.appendChild(randomOpt);
        }
        (values || []).forEach(function (val) {
          var opt = document.createElement("option");
          opt.value = val;
          opt.textContent = val;
          selectEl.appendChild(opt);
        });
        if (current && Array.from(selectEl.options).some(function (opt) { return opt.value === current; })) {
          selectEl.value = current;
        }
      }

      function renderBeatPostProcessing(actionsPayload) {
        beatPostProcessingList.innerHTML = "";
        var actions = (actionsPayload && actionsPayload.actions) || [];
        beatPostProcessingList.style.display = "grid";
        beatPostProcessingList.style.gridTemplateColumns = "1fr";
        beatPostProcessingList.style.gap = "4px";
        beatPostProcessingList.style.maxHeight = "260px";
        beatPostProcessingList.style.overflowY = "auto";
        beatPostProcessingList.style.padding = "8px";
        beatPostProcessingList.style.border = "1px solid rgba(255,255,255,0.12)";
        beatPostProcessingList.style.borderRadius = "6px";
        actions.forEach(function (action, idx) {
          var label = document.createElement("label");
          label.style.display = "flex";
          label.style.alignItems = "center";
          label.style.gap = "8px";
          var input = document.createElement("input");
          input.type = "checkbox";
          input.value = action.token;
          input.id = "generatr-beat-post-" + idx;
          var text = document.createElement("span");
          text.textContent = action.token;
          label.appendChild(input);
          label.appendChild(text);
          beatPostProcessingList.appendChild(label);
        });
      }

      function loadGeneratrSidebarOptions() {
        if (generatrSidebarOptionsLoaded) return Promise.resolve();
        return Promise.all([
          fetch("/api/generatr/options").then(function (res) { return res.json(); }),
          fetch("/api/drum-path-presets").then(function (res) { return res.json(); })
        ])
          .then(function (parts) {
            var data = parts[0] || {};
            var presetData = parts[1] || {};
            var presetNames = Object.keys((presetData && presetData.presets) || {});
            setSelectOptions(beatRandomizationConfigSelect, presetNames, false);
            var activeOpt = document.createElement("option");
            activeOpt.value = "";
            activeOpt.textContent = "(active preset)";
            beatRandomizationConfigSelect.insertBefore(activeOpt, beatRandomizationConfigSelect.firstChild);
            if (presetData.activePreset) {
              beatRandomizationConfigSelect.value = presetData.activePreset;
            }
            setSelectOptions(dronePatternSelect, data.droneMidiPatterns || [], true);
            setSelectOptions(droneInstrumentSelect, data.droneInstruments || [], true);
            setSelectOptions(droneEffectSelect, data.droneEffects || [], true);
            renderBeatPostProcessing(data.processingActions || { actions: [] });
            generatrSidebarOptionsLoaded = true;
          })
          .catch(function (err) {
            console.error("Failed to load generate options:", err);
          });
      }

      function updateGeneratrSubcommandVisibility() {
        var type = typeSelect.value;
        subcommandRow.classList.toggle("hidden", type !== "bass");
        transitionSubcommandRow.classList.toggle("hidden", type !== "transition");
        beatRows.forEach(function (row) {
          row.classList.toggle("hidden", type !== "beat");
        });
        droneRows.forEach(function (row) {
          row.classList.toggle("hidden", type !== "drone");
        });
        if (generatrPostProcessingRow) {
          generatrPostProcessingRow.classList.toggle(
            "hidden",
            type !== "beat" && type !== "drone"
          );
        }
        if (type === "beat" || type === "drone") {
          loadGeneratrSidebarOptions();
        }
      }
      typeSelect.addEventListener("change", updateGeneratrSubcommandVisibility);
      updateGeneratrSubcommandVisibility();

      if (sidebarToggle && sidebar) {
        // Ensure initial icon/title match initial collapsed state
        (function syncSidebarToggleState() {
          var collapsed = sidebar.classList.contains("collapsed");
          sidebarToggleIcon.className = collapsed ? "fa-solid fa-chevron-left" : "fa-solid fa-chevron-right";
          sidebarToggle.title = collapsed ? "Show generate sidebar" : "Hide generate sidebar";
        })();

        sidebarToggle.addEventListener("click", function () {
          sidebar.classList.toggle("collapsed");
          var collapsed = sidebar.classList.contains("collapsed");
          sidebarToggleIcon.className = collapsed ? "fa-solid fa-chevron-left" : "fa-solid fa-chevron-right";
          sidebarToggle.title = collapsed ? "Show generate sidebar" : "Hide generate sidebar";
        });
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var type = typeSelect.value;
        var subcommand = "";
        var body = { type: type };
        if (type === "bass") subcommand = document.getElementById("generatr-subcommand").value;
        else if (type === "transition") subcommand = document.getElementById("generatr-transition-subcommand").value;
        if (subcommand) body.subcommand = subcommand;
        if (type === "beat") {
          var checkedPost = Array.from(
            beatPostProcessingList.querySelectorAll("input[type='checkbox']:checked")
          ).map(function (el) { return el.value; });
          var tempoRaw = (beatTempoInput.value || "").trim();
          body.tempo = tempoRaw ? parseInt(tempoRaw, 10) : null;
          body.loops = parseInt(beatLoopsInput.value || "2", 10);
          body.pattern = (beatPatternInput.value || "").trim();
          body.kit = (beatKitInput.value || "").trim();
          body.sampleLibrary = beatRandomizationConfigSelect.value || "";
          body.swing = parseFloat(beatSwingInput.value || "0");
          body.iterations = parseInt(beatIterationsInput.value || "1", 10);
          body.variants = Array.from(
            beatVariantsList.querySelectorAll("input[type='checkbox']:checked")
          ).map(function (el) { return el.value; });
          body.postProcessing = checkedPost;
        } else if (type === "drone") {
          var dronePost = Array.from(
            beatPostProcessingList.querySelectorAll("input[type='checkbox']:checked")
          ).map(function (el) { return el.value; });
          body.name = (droneNameInput.value || "").trim();
          body.notes = (droneNotesInput.value || "").trim();
          body.chartName = (droneChartNameInput.value || "").trim();
          body.chartType = (droneChartTypeSelect.value || "").trim();
          body.tags = (droneTagsInput.value || "").trim();
          body.roots = (droneRootsInput.value || "").trim();
          body.pattern = (dronePatternSelect.value || "").trim();
          body.instrument = (droneInstrumentSelect.value || "").trim();
          body.effect = (droneEffectSelect.value || "").trim();
          body.iterations = Math.max(1, parseInt(droneIterationsInput.value || "1", 10) || 1);
          body.splitProcessing = !!droneSplitCheckbox.checked;
          body.postProcessing = dronePost;
        }

        btnGenerate.disabled = true;
        loadingEl.classList.remove("hidden");
        resultEl.classList.add("hidden");
        pathsList.innerHTML = "";
        errorEl.classList.add("hidden");
        errorEl.textContent = "";

        fetch("/api/generatr/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            resultEl.classList.remove("hidden");
            if (data.error) {
              errorEl.textContent = data.error;
              errorEl.classList.remove("hidden");
            } else {
              if (data.paths && data.paths.length) {
                data.paths.forEach(function (path) {
                  var li = document.createElement("li");
                  li.textContent = path;
                  pathsList.appendChild(li);
                });
              } else {
                pathsList.appendChild(document.createTextNode("(no files returned)"));
              }
              socket.emit("requestExports");
            }
          })
          .catch(function (err) {
            resultEl.classList.remove("hidden");
            errorEl.textContent = err.message || "Request failed";
            errorEl.classList.remove("hidden");
          })
          .finally(function () {
            btnGenerate.disabled = false;
            loadingEl.classList.add("hidden");
          });
      });
    })();
  </script>
</body>

</html>
