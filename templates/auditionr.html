<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ pagename }} | dronmakr v{{ version }}</title>
  <script src="/static/vendor/socket.io.min.js"></script>
  <script src="/static/vendor/wavesurfer.min.js"></script>
  {% include '_app_favicons.html' %}
  <link rel="stylesheet" href="/static/vendor/fonts/fragment-mono.css">
  <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css">
  <style>
    {% include '_app_css_root.html' %}

    body {
      height: 100%;
      box-sizing: border-box;
      overflow: hidden;
      padding-top: calc(var(--toolbar-height) + 0.1rem);
      padding-right: 0;
      display: flex;
      flex-direction: column;
    }

    /* Themed scrollbar */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--theme-a) var(--secondary);
    }

    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    *::-webkit-scrollbar-track {
      background: var(--secondary);
    }

    *::-webkit-scrollbar-thumb {
      background: var(--theme-a);
      border-radius: 4px;
    }

    *::-webkit-scrollbar-thumb:hover {
      background: var(--theme-b);
    }

    /* Floating chip (bottom-left): mirror #app-version-chip */
    #auditionr-actions-chip.auditionr-floating-chip {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 1100;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.35rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--theme-a);
      background: rgba(0, 0, 0, 0.82);
      color: var(--primary);
      font-size: 0.72rem;
      backdrop-filter: blur(3px);
      box-sizing: border-box;
      max-width: calc(100vw - 24px);
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .auditionr-chip-sep {
      width: 1px;
      align-self: stretch;
      min-height: 1rem;
      background: var(--theme-a);
      opacity: 0.85;
      flex-shrink: 0;
    }

    .auditionr-chip-seg {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      white-space: nowrap;
    }

    .auditionr-chip-seg i {
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .auditionr-chip-stat {
      opacity: 0.95;
      user-select: none;
    }

    .auditionr-chip-btn {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.15s ease;
    }

    .auditionr-chip-btn:hover:not(:disabled) {
      opacity: 1;
    }

    .auditionr-chip-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .auditionr-layout {
      display: flex;
      width: 100%;
      max-width: 100%;
      gap: 0;
      flex: 1 1 auto;
      min-height: 0;
    }

    .auditionr-main {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #waveforms {
      max-width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding-right: 0.5rem;
      box-sizing: border-box;
      position: relative;
    }

    .queue-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      pointer-events: none;
      color: var(--theme-b);
      opacity: 0.7;
      font-size: 0.9rem;
      text-align: center;
    }

    .queue-empty-icon {
      font-size: 1.6rem;
      color: var(--theme-a);
    }

    .auditionr-sidebar {
      width: 600px;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      transition: width 0.2s ease, min-width 0.2s ease;
      overflow: hidden;
    }

    .auditionr-sidebar.collapsed {
      width: 0;
      min-width: 0;
      border-left-width: 0;
      overflow: hidden;
    }

    .auditionr-sidebar-content {
      min-width: 500px;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .sidebar-toggle {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      width: 20px;
      height: 48px;
      padding: 0;
      border: none;
      border-radius: 0 4px 4px 0;
      background: var(--theme-a);
      color: var(--primary);
      cursor: pointer;
      font-size: 0.75rem;
      z-index: 2;
      transition: background 0.15s ease;
    }

    .sidebar-toggle:hover {
      background: var(--primary);
      color: var(--secondary);
    }

    .auditionr-sidebar-wrapper {
      position: relative;
      flex-shrink: 0;
      min-width: 20px;
      height: 100%;
      min-height: 0;
      align-self: stretch;
      display: flex;
      flex-direction: column;
    }

    .generatr-card {
      padding: 1rem;
      padding-left: 2rem;
      overflow-y: scroll;
      max-height: 85vh;
    }

    .generatr-card h2 {
      font-size: 0.9rem;
      margin: 0 0 0.75rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary);
    }

    .edit-samples-card {
      border: none;
      box-shadow: none;
      background: transparent;
      padding-left: 2rem;
      padding-right: 1rem;
      min-height: 85vh;
    }

    .generatr-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.65rem 0.85rem;
      align-items: start;
    }

    .generatr-form .form-row {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.3rem;
      min-width: 0;
    }

    /* Type, subcommands as single selects, checkbox blocks, post-processing */
    .generatr-form .form-row-full {
      grid-column: 1 / -1;
    }

    .generatr-form > .btn-generate {
      grid-column: 1 / -1;
    }

    .generatr-form > .generatr-loading {
      grid-column: 1 / -1;
    }

    .generatr-form .form-row > label:first-of-type {
      font-size: 0.72rem;
      color: var(--theme-b);
      text-align: left;
      align-self: flex-start;
      min-width: 0;
      line-height: 1.2;
      margin: 0;
    }

    .generatr-form .form-row select,
    .generatr-form .form-row input[type="text"],
    .generatr-form .form-row input[type="number"] {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.4rem 0.5rem;
      background: var(--theme-a);
      border: 1px solid var(--theme-a);
      border-radius: 4px;
      color: var(--primary);
      width: 100%;
      box-sizing: border-box;
      min-width: 0;
      cursor: pointer;
    }

    .generatr-form .form-row select:focus,
    .generatr-form .form-row input[type="text"]:focus,
    .generatr-form .form-row input[type="number"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    .generatr-form .form-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      flex: 0 0 auto;
      accent-color: var(--primary);
    }

    .generatr-form .form-row.form-row-post-processing {
      align-items: stretch;
    }

    .generatr-checkbox-group,
    #generatr-beat-variants-list {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.85rem;
    }

    .generatr-checkbox-group label,
    #generatr-beat-variants-list label {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: var(--primary);
      margin: 0;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-generate {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.45rem 0.85rem;
      background: var(--primary);
      color: var(--secondary);
      border: 1px solid var(--primary);
      border-radius: 4px;
      cursor: pointer;
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: opacity 0.15s ease;
    }

    .btn-generate:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn-generate:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .generatr-loading {
      font-size: 0.8rem;
      color: var(--theme-b);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .generatr-loading.hidden {
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 0.9rem;
      height: 0.9rem;
      border: 2px solid var(--theme-a);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .generatr-result {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--theme-a);
      padding-inline: 1.5rem;
    }

    .generatr-result.hidden {
      display: none;
    }

    .generatr-result h3 {
      font-size: 0.8rem;
      margin: 0 0 0.4rem 0;
      color: var(--theme-b);
    }

    .generatr-result ul {
      margin: 0;
      padding-left: 1.1rem;
      font-size: 0.75rem;
      color: var(--primary);
      line-height: 1.5;
      word-break: break-all;
    }

    .generatr-result .error {
      color: var(--theme-c);
      font-size: 0.8rem;
    }

    .generatr-result .generatr-error.hidden {
      display: none;
    }

    .hidden {
      display: none !important;
    }

    .auditionr-sidebar-tabs {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }

    .sidebar-tab-row {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--theme-a);
      flex-shrink: 0;
    }

    .sidebar-tab-btn {
      flex: 1;
      padding: 0.55rem 0.5rem;
      font-size: 0.78rem;
      border: none;
      background: none;
      color: var(--theme-b);
      cursor: pointer;
      font-family: inherit;
    }

    .sidebar-tab-btn.sidebar-tab-active {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
    }

    .sidebar-tab-panel {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .sidebar-tab-panel.hidden {
      display: none !important;
    }

    .edit-action-nav {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 0.75rem;
      padding-right: 2px;
      flex-wrap: wrap;
    }

    .edit-action-nav-btn {
      text-align: left;
      font-family: inherit;
      font-size: 0.78rem;
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: transparent;
      color: var(--theme-b);
      cursor: pointer;
    }

    .edit-action-nav-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .edit-action-nav-btn.edit-action-nav-active {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(255, 149, 5, 0.08);
    }

    .edit-action-detail .edit-sample-section {
      display: none;
    }

    .edit-action-detail .edit-sample-section.edit-sample-section-visible {
      display: block;
    }

    .edit-sample-section {
      border: none;
      border-radius: 0;
      padding: 0;
      margin: 0;
    }

    .edit-sample-section h3 {
      font-size: 0.82rem;
      margin: 0 0 0.45rem 0;
      color: var(--primary);
    }

    .edit-presets-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin: 0;
    }

    .edit-presets-divider {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      margin: 0.65rem 0 0.5rem 0;
      padding: 0;
      height: 0;
    }

    .edit-apply-row {
      width: 100%;
      margin-top: 0.65rem;
    }

    .edit-apply-row .btn-edit-apply {
      width: 100%;
      margin-top: 0;
    }

    .edit-preset-btn {
      font-size: 0.65rem;
      padding: 0.25rem 0.45rem;
      border-radius: 4px;
      border: 1px solid var(--theme-a);
      background: transparent;
      color: var(--theme-b);
      cursor: pointer;
      font-family: inherit;
    }

    .edit-preset-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .edit-controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.5rem 0.85rem;
      align-items: start;
      margin: 0;
    }

    .edit-control-row {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.2rem;
      font-size: 0.72rem;
      color: var(--theme-b);
      min-width: 0;
    }

    .edit-control-row input[type="range"] {
      width: 100%;
    }

    .edit-control-row select {
      font-family: inherit;
      font-size: 0.78rem;
      padding: 0.35rem;
      background: var(--theme-a);
      border: 1px solid var(--theme-a);
      color: var(--primary);
      border-radius: 4px;
    }

    .btn-edit-apply {
      margin-top: 0;
      padding: 0.4rem 0.75rem;
      font-size: 0.78rem;
      border-radius: 4px;
      border: none;
      background: var(--primary);
      color: var(--secondary);
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
    }

    .btn-edit-apply:hover {
      opacity: 0.88;
    }

    .button {
      cursor: pointer;
      border-bottom: 2px solid var(--theme-a);
      padding-inline: 5px;
      padding-block: 5px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .button:hover {
      opacity: 0.5;
    }

    .button.icon-btn {
      width: 36px;
      min-width: 36px;
      padding: 6px;
      text-align: center;
      border: none;
      border-bottom: 2px solid var(--theme-a);
    }

    .button.icon-btn:hover {
      border-bottom-color: var(--primary);
    }

    .fixed-button {
      width: 40px;
      text-align: center;
      font-weight: bold;
      border: none;
      border-bottom: 2px solid var(--primary);
      background-color: var(--primary);
      color: var(--secondary);
    }

    .processing-type-active {
      border: none;
      border-bottom: 2px solid var(--primary);
      background-color: var(--primary);
      color: #000;
    }

    .drumpattern-sample .waveform-actions .processing-type-active {
      background-color: var(--theme-b);
      border-bottom-color: var(--theme-b);
      color: #000;
    }

    .transition-sample .waveform-actions .button.processing-type-active {
      background-color: var(--theme-c);
      border-bottom-color: var(--theme-c);
      color: #000;
    }

    .folysplitr-sample .waveform-actions .button.processing-type-active {
      background-color: var(--theme-e);
      border-bottom-color: var(--theme-e);
      color: #000;
    }

    .waveform {
      margin-bottom: 1rem;
    }

    .waveform-wrapper {
      /* border: 2px solid var(--theme-a); */
      padding: 10px;
      margin-bottom: 1rem;
      /* border-radius: 10px; */
      transition: opacity 0.2s ease;
    }

    .waveform-wrapper.waveform-processing {
      opacity: 0.52;
      pointer-events: none;
    }

    .waveform-processing .waveform-duration-wrap {
      color: var(--theme-b);
    }

    .waveform-title-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      border-radius: 4px;
      border: none;
      background: transparent;
      font-family: inherit;
      text-align: left;
      box-sizing: border-box;
      padding: 0;
      padding-right: 5px;
    }

    .waveform-title-edit-icon {
      opacity: 0;
      flex-shrink: 0;
      font-size: 0.65rem;
      width: 1em;
      transition: opacity 0.12s ease;
      color: inherit;
    }

    .waveform-title-row:hover ~ .waveform-duration-wrap .waveform-title-edit-icon,
    .waveform-title-row.waveform-sample-selected ~ .waveform-duration-wrap .waveform-title-edit-icon,
    .waveform-title-row:focus-visible ~ .waveform-duration-wrap .waveform-title-edit-icon,
    .waveform-duration-wrap:hover .waveform-title-edit-icon {
      opacity: 1;
    }

    .waveform-wrapper:not(.drumpattern-sample):not(.transition-sample):not(.folysplitr-sample) .waveform-title-text {
      color: var(--primary);
    }

    .drumpattern-sample .waveform-title-text {
      color: var(--theme-b);
    }

    .transition-sample .waveform-title-text {
      color: var(--theme-c);
    }

    .folysplitr-sample .waveform-title-text {
      color: var(--theme-e);
    }

    .waveform-actions,
    .title-container {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
    }

    .title-container {
      margin-bottom: 1rem;
    }

    .waveform-duration-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: bold;
      color: var(--theme-c);
    }

    .waveform-duration {
      color: inherit;
    }

    .processing-actions-divider {
      width: 1px;
      height: 20px;
      border-left: 1px solid var(--theme-a);
      opacity: 0.6;
      align-self: center;
      margin: 0 4px;
    }

    .drumpattern-sample .waveform-actions .processing-actions-divider {
      border-left-color: var(--theme-b);
    }

    .transition-sample .waveform-actions .processing-actions-divider {
      border-left-color: var(--theme-c);
    }

    .folysplitr-sample .waveform-actions .processing-actions-divider {
      border-left-color: var(--theme-e);
    }

    /* Drumpattern sample: blue theme */
    .drumpattern-sample .waveform-actions .button {
      color: var(--theme-b);
    }

    .drumpattern-sample .waveform-actions .fixed-button {
      background-color: var(--theme-b);
      border-bottom-color: var(--theme-b);
      color: var(--secondary);
    }

    .drumpattern-sample .waveform-actions .button:hover {
      border-bottom-color: var(--theme-b);
    }

    /* Transition sample: orange theme */
    .transition-sample .waveform-actions .button {
      color: var(--theme-c);
    }

    .transition-sample .waveform-actions .fixed-button {
      background-color: var(--theme-c);
      border-bottom-color: var(--theme-c);
      color: var(--secondary);
    }

    .transition-sample .waveform-actions .button:hover {
      border-bottom-color: var(--theme-c);
    }

    /* Folysplitr exports: sea-green theme */
    .folysplitr-sample .waveform-actions .button {
      color: var(--theme-e);
    }

    .folysplitr-sample .waveform-actions .fixed-button {
      background-color: var(--theme-e);
      border-bottom-color: var(--theme-e);
      color: var(--secondary);
    }

    .folysplitr-sample .waveform-actions .button:hover {
      border-bottom-color: var(--theme-e);
    }

    .waveform-actions .button.processing-type-active {
      color: #000;
    }

    #logs {
      background-color: var(--theme-a);
    }

    .disabled {
      opacity: 0.25;
    }

    .center-offset {
      margin-top: 3px;
    }

    #app-version-chip {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 1100;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.35rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--theme-a);
      background: rgba(0, 0, 0, 0.82);
      color: var(--primary);
      font-size: 0.72rem;
      backdrop-filter: blur(3px);
    }

    #app-version-chip a {
      color: var(--primary);
      text-decoration: none;
      opacity: 0.9;
    }

    #app-version-chip a:hover {
      opacity: 1;
    }
  </style>
</head>

<body>
  {% include '_loading_overlay.html' %}
  {% include '_app_toolbar.html' %}
  {% include '_auditionr_subtoolbar.html' %}

  <div class="auditionr-layout page-layout">
    <div class="auditionr-main">
      <main id="waveforms">
        <div id="waveform-container"></div>
        <div id="queue-empty-placeholder" class="queue-empty hidden">
          <div class="queue-empty-icon"><i class="fa-solid fa-inbox"></i></div>
          <div>Queue is empty</div>
        </div>
      </main>
    </div>
    <div class="auditionr-sidebar-wrapper">
      <button type="button" class="sidebar-toggle" id="sidebar-toggle" title="Show sidebar"
        aria-label="Toggle sidebar">
        <i class="fa-solid fa-chevron-left" id="sidebar-toggle-icon"></i>
      </button>
      <aside class="auditionr-sidebar collapsed" id="auditionr-sidebar">
        <div class="auditionr-sidebar-content">
          <div class="auditionr-sidebar-tabs">
            <div class="sidebar-tab-row">
              <button type="button" class="sidebar-tab-btn sidebar-tab-active" id="sidebar-tab-btn-generate" data-sidebar-tab="generate"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate Samples</button>
              <button type="button" class="sidebar-tab-btn" id="sidebar-tab-btn-edit" data-sidebar-tab="edit"><i class="fa-solid fa-pencil"></i> Edit Samples</button>
            </div>
            <div id="sidebar-panel-generate" class="sidebar-tab-panel">
          <div class="generatr-card">
            <form class="generatr-form" id="generatr-form">
              <div class="form-row form-row-full">
                <label for="generatr-type">Type</label>
                <select id="generatr-type" name="type">
                  <option value="beat">beat</option>
                  <option value="drone">drone</option>
                  <option value="bass">bass</option>
                  <option value="transition">transition</option>
                </select>
              </div>
              <div class="form-row form-row-full form-row-subcommand hidden" id="generatr-subcommand-row">

  </div>
  {% include '_app_version_chip.html' %}
  <script>
    var socket = io();
    var lastFolderCounts = { archive: 0, trash: 0, exports: 0, saved: 0 };
    var selectedWaveformTimestamps = {};
    var processingCatalog = { types: [], actions: [], paramSchemas: {}, presets: [] };
    var currentDisplayedFiles = [];
    var waveformInstances = {};
    var processingGuardMs = 120000;
    var db = 2;
    var lastEdited = "";
    var sharedAudioContext = null;
    var currentDrumpatternStop = null;
    var waveformDurations = {};
    var selectedEditAbsPath = null;
    var selectedEditApiPath = null;
    var AUDITIONR_SIDEBAR_TAB_KEY = "auditionr_sidebar_tab";
    var auditionrSidebarActiveTab = "generate";
    var editPanelSelectedActionType = "fade";

    var EDIT_SECTION_ORDER = ["fade", "eq", "gain", "filter", "noisegate", "stretch", "pitch", "reverb", "compress", "overdrive", "distort", "chorus", "flanger", "phaser"];

    function mergeProcessingCatalog(payload) {
      if (!payload || typeof payload !== "object") return;
      processingCatalog.types = Array.isArray(payload.types) ? payload.types : [];
      processingCatalog.actions = Array.isArray(payload.actions) ? payload.actions : [];
      processingCatalog.paramSchemas = payload.paramSchemas || {};
      processingCatalog.presets = Array.isArray(payload.presets) ? payload.presets : [];
      renderEditSamplesPanel();
    }

    function fmtSpecNum(x) {
      if (typeof x !== "number" || isNaN(x)) return "0";
      var ax = Math.abs(x);
      var r = ax >= 100 ? 2 : (ax >= 10 ? 3 : 5);
      var s = Number(x.toFixed(r)).toString();
      return s;
    }

    function editSliderPhysical(schema, uRaw) {
      var u = Math.max(0, Math.min(1, parseFloat(uRaw)));
      if (schema.range_db) return schema.range_db[0] + (schema.range_db[1] - schema.range_db[0]) * u;
      if (schema.range_hz) return schema.range_hz[0] + (schema.range_hz[1] - schema.range_hz[0]) * u;
      if (schema.range_ms) return schema.range_ms[0] + (schema.range_ms[1] - schema.range_ms[0]) * u;
      if (schema.range_linear) return schema.range_linear[0] + (schema.range_linear[1] - schema.range_linear[0]) * u;
      return u;
    }

    function readEditControl(sectionEl, schemaKey) {
      var el = sectionEl.querySelector('[data-schema-key="' + schemaKey + '"]');
      return el ? String(el.value) : "";
    }

    function selectSampleForEdit(file, apiPath, opts) {
      opts = opts || {};
      selectedEditAbsPath = file;
      selectedEditApiPath = apiPath;
      syncWaveformTitleSelection();
      if (opts.openEditTab) {
        ensureSidebarOpenForEdit();
        openAuditionrSidebarTab("edit");
      }
    }

    function syncWaveformTitleSelection() {
      Object.keys(waveformInstances).forEach(function (absPath) {
        var inst = waveformInstances[absPath];
        if (!inst || !inst.titleRowEl) return;
        inst.titleRowEl.classList.toggle("waveform-sample-selected", selectedEditAbsPath === absPath);
      });
    }

    function applyEditProcessingSpec(spec) {
      if (!selectedEditApiPath) {
        window.alert("Select a sample first (click its name or use the waveform).");
        return;
      }
      processSample({
        path: selectedEditApiPath,
        processing_spec: spec,
        files: getCurrentFiles()
      });
    }

    function updateEditActionVisibility() {
      var nav = document.getElementById("edit-action-nav");
      var detail = document.getElementById("edit-action-detail");
      if (!nav || !detail) return;
      nav.querySelectorAll(".edit-action-nav-btn").forEach(function (btn) {
        btn.classList.toggle("edit-action-nav-active", btn.dataset.editType === editPanelSelectedActionType);
      });
      detail.querySelectorAll(".edit-sample-section").forEach(function (sec) {
        sec.classList.toggle("edit-sample-section-visible", sec.dataset.editType === editPanelSelectedActionType);
      });
    }

    function openAuditionrSidebarTab(tab) {
      var genBtn = document.getElementById("sidebar-tab-btn-generate");
      var editBtn = document.getElementById("sidebar-tab-btn-edit");
      var genPanel = document.getElementById("sidebar-panel-generate");
      var editPanel = document.getElementById("sidebar-panel-edit");
      if (!genBtn || !editBtn || !genPanel || !editPanel) return;
      var isGen = tab === "generate";
      auditionrSidebarActiveTab = isGen ? "generate" : "edit";
      genBtn.classList.toggle("sidebar-tab-active", isGen);
      editBtn.classList.toggle("sidebar-tab-active", !isGen);
      genPanel.classList.toggle("hidden", !isGen);
      editPanel.classList.toggle("hidden", isGen);
      try { sessionStorage.setItem(AUDITIONR_SIDEBAR_TAB_KEY, tab); } catch (e) {}
    }

    function ensureSidebarOpenForEdit() {
      var sidebar = document.getElementById("auditionr-sidebar");
      var sidebarToggle = document.getElementById("sidebar-toggle");
      var sidebarToggleIcon = document.getElementById("sidebar-toggle-icon");
      if (!sidebar || !sidebarToggle || !sidebarToggleIcon) return;
      if (sidebar.classList.contains("collapsed")) {
        sidebar.classList.remove("collapsed");
        sidebarToggleIcon.className = "fa-solid fa-chevron-right";
        sidebarToggle.title = "Hide sidebar";
      }
    }

    function buildSpecFromSection(sectionEl, typeKey) {
      var schemas = (processingCatalog.paramSchemas && processingCatalog.paramSchemas[typeKey]) || [];
      function phys(sk) {
        var sch = schemas.filter(function (s) { return s.key === sk; })[0];
        if (!sch) return 0;
        return editSliderPhysical(sch, readEditControl(sectionEl, sk));
      }

      switch (typeKey) {
        case "fade": {
          var style = readEditControl(sectionEl, "style") || "in";
          var ms = phys("duration_ms_ui");
          return "fade:[style=" + style + "][duration_ms=" + fmtSpecNum(ms) + "]";
        }
        case "eq": {
          var band = readEditControl(sectionEl, "band") || "lows";
          var db = phys("db_ui");
          return "eq:[band=" + band + "][db=" + fmtSpecNum(db) + "]";
        }
        case "gain": {
          var db = phys("db_ui");
          return "gain:[db=" + fmtSpecNum(db) + "]";
        }
        case "filter": {
          var kind = readEditControl(sectionEl, "kind") || "lpf";
          if (kind === "bpf") {
            var lo = phys("low_hz_ui");
            var hi = phys("high_hz_ui");
            return "filter:[kind=bpf][low_hz=" + fmtSpecNum(lo) + "][high_hz=" + fmtSpecNum(hi) + "]";
          }
          var cf = phys("cutoff_hz_ui");
          return "filter:[kind=" + kind + "][cutoff_hz=" + fmtSpecNum(cf) + "]";
        }
        case "noisegate": {
          var th = phys("threshold_db_ui");
          var atk = phys("attack_ms_ui");
          var rel = phys("release_ms_ui");
          var rat = phys("ratio_ui");
          return "noisegate:[threshold_db=" + fmtSpecNum(th) + "][attack_ms=" + fmtSpecNum(atk) + "][release_ms=" + fmtSpecNum(rel) + "][ratio=" + fmtSpecNum(rat) + "]";
        }
        case "stretch": {
          var mode = readEditControl(sectionEl, "mode") || "simple";
          if (mode === "paul") {
            var st = phys("paul_stretch_ui");
            var ws = phys("paul_window_ui");
            return "stretch:[mode=paul][stretch=" + fmtSpecNum(st) + "][window_size=" + fmtSpecNum(ws) + "]";
          }
          var sf = phys("stretch_factor_ui");
          return "stretch:[mode=simple][stretch_factor=" + fmtSpecNum(sf) + "]";
        }
        case "pitch": {
          var pm = readEditControl(sectionEl, "mode") || "preserve";
          var sem = phys("semitones_ui");
          return "pitch:[mode=" + pm + "][semitones=" + fmtSpecNum(sem) + "]";
        }
        case "reverb": {
          var wet = phys("wet_level_ui");
          var ls = phys("length_sec_ui");
          var ds = phys("decay_sec_ui");
          var hp = phys("highpass_hz_ui");
          var er = Math.round(phys("early_reflections_ui"));
          var td = phys("tail_diffusion_ui");
          var ed = readEditControl(sectionEl, "early_diffuse") || "true";
          return "reverb:[wet_level=" + fmtSpecNum(wet) + "][length_sec=" + fmtSpecNum(ls) + "][decay_sec=" + fmtSpecNum(ds) + "][highpass_hz=" + fmtSpecNum(hp) + "][early_reflections=" + er + "][tail_diffusion=" + fmtSpecNum(td) + "][early_diffuse=" + ed + "]";
        }
        case "compress": {
          return "compress:[threshold_db=" + fmtSpecNum(phys("threshold_db_ui")) + "][ratio=" + fmtSpecNum(phys("ratio_ui")) + "][attack_ms=" + fmtSpecNum(phys("attack_ms_ui")) + "][release_ms=" + fmtSpecNum(phys("release_ms_ui")) + "]";
        }
        case "overdrive": {
          return "overdrive:[drive_db=" + fmtSpecNum(phys("drive_db_ui")) + "][highpass_hz=" + fmtSpecNum(phys("highpass_hz_ui")) + "][lowpass_hz=" + fmtSpecNum(phys("lowpass_hz_ui")) + "]";
        }
        case "distort":
          return "distort:[drive_db=" + fmtSpecNum(phys("drive_db_ui")) + "]";
        case "chorus":
          return "chorus:[rate_hz=" + fmtSpecNum(phys("rate_hz_ui")) + "][depth=" + fmtSpecNum(phys("depth_ui")) + "][centre_delay_ms=" + fmtSpecNum(phys("centre_delay_ms_ui")) + "][feedback=" + fmtSpecNum(phys("feedback_ui")) + "][mix=" + fmtSpecNum(phys("mix_ui")) + "]";
        case "flanger":
          return "flanger:[rate_hz=" + fmtSpecNum(phys("rate_hz_ui")) + "][depth=" + fmtSpecNum(phys("depth_ui")) + "][centre_delay_ms=" + fmtSpecNum(phys("centre_delay_ms_ui")) + "][feedback=" + fmtSpecNum(phys("feedback_ui")) + "][mix=" + fmtSpecNum(phys("mix_ui")) + "]";
        case "phaser":
          return "phaser:[rate_hz=" + fmtSpecNum(phys("rate_hz_ui")) + "][depth=" + fmtSpecNum(phys("depth_ui")) + "][centre_frequency_hz=" + fmtSpecNum(phys("centre_frequency_hz_ui")) + "][feedback=" + fmtSpecNum(phys("feedback_ui")) + "][mix=" + fmtSpecNum(phys("mix_ui")) + "]";
        default:
          return null;
      }
    }

    function renderEditSamplesPanel() {
      var navEl = document.getElementById("edit-action-nav");
      var detailEl = document.getElementById("edit-action-detail");
      if (!navEl || !detailEl) return;

      if (EDIT_SECTION_ORDER.indexOf(editPanelSelectedActionType) === -1) {
        editPanelSelectedActionType = EDIT_SECTION_ORDER[0] || "fade";
      }

      navEl.innerHTML = "";
      detailEl.innerHTML = "";
      var typesByKey = {};
      (processingCatalog.types || []).forEach(function (t) { typesByKey[t.key] = t.label; });

      EDIT_SECTION_ORDER.forEach(function (typeKey) {
        var navBtn = document.createElement("button");
        navBtn.type = "button";
        navBtn.className = "edit-action-nav-btn";
        navBtn.dataset.editType = typeKey;
        navBtn.textContent = typesByKey[typeKey] || typeKey;
        navBtn.addEventListener("click", function () {
          editPanelSelectedActionType = typeKey;
          updateEditActionVisibility();
        });
        navEl.appendChild(navBtn);

        var schemas = (processingCatalog.paramSchemas && processingCatalog.paramSchemas[typeKey]) || [];
        var sec = document.createElement("section");
        sec.className = "edit-sample-section";
        sec.dataset.editType = typeKey;

        var presetsWrap = document.createElement("div");
        presetsWrap.className = "edit-presets-row";
        (processingCatalog.presets || []).filter(function (p) { return p.type === typeKey; }).forEach(function (preset) {
          var b = document.createElement("button");
          b.type = "button";
          b.className = "edit-preset-btn";
          b.textContent = preset.label;
          b.title = preset.spec || preset.token || "";
          b.addEventListener("click", function () {
            applyEditProcessingSpec(preset.spec || preset.token);
          });
          presetsWrap.appendChild(b);
        });
        var controlsWrap = document.createElement("div");
        controlsWrap.className = "edit-controls";
        schemas.forEach(function (schema) {
          if (schema.widget === "slider") {
            var row = document.createElement("label");
            row.className = "edit-control-row";
            var span = document.createElement("span");
            span.textContent = schema.label;
            var input = document.createElement("input");
            input.type = "range";
            input.min = 0;
            input.max = 1;
            input.step = schema.step != null ? schema.step : 0.01;
            input.value = schema.default != null ? String(schema.default) : "0.5";
            input.dataset.schemaKey = schema.key;
            row.appendChild(span);
            row.appendChild(input);
            controlsWrap.appendChild(row);
          } else if (schema.widget === "select") {
            var row2 = document.createElement("label");
            row2.className = "edit-control-row";
            var span2 = document.createElement("span");
            span2.textContent = schema.label;
            var sel = document.createElement("select");
            sel.dataset.schemaKey = schema.key;
            (schema.options || []).forEach(function (opt) {
              var o = document.createElement("option");
              o.value = opt.value;
              o.textContent = opt.label;
              sel.appendChild(o);
            });
            var def = schema.default || ((schema.options || [])[0] || {}).value;
            if (def !== undefined) sel.value = String(def);
            row2.appendChild(span2);
            row2.appendChild(sel);
            controlsWrap.appendChild(row2);
          }
        });
        sec.appendChild(controlsWrap);

        var applyBtn = document.createElement("button");
        applyBtn.type = "button";
        applyBtn.className = "btn-edit-apply";
        applyBtn.textContent = "Apply";
        applyBtn.addEventListener("click", function () {
          var spec = buildSpecFromSection(sec, typeKey);
          if (spec) applyEditProcessingSpec(spec);
        });
        var applyRow = document.createElement("div");
        applyRow.className = "edit-apply-row";
        applyRow.appendChild(applyBtn);
        sec.appendChild(applyRow);

        if (presetsWrap.childNodes.length) {
          var presetsDivider = document.createElement("div");
          presetsDivider.className = "edit-presets-divider";
          presetsDivider.setAttribute("aria-hidden", "true");
          sec.appendChild(presetsDivider);
          sec.appendChild(presetsWrap);
        }

        detailEl.appendChild(sec);
      });

      updateEditActionVisibility();
    }

    function getAudioContext() {
      if (!sharedAudioContext) sharedAudioContext = new (window.AudioContext || window.webkitAudioContext)();
      return sharedAudioContext;
    }
    function emptyTrash() {
      var button = document.getElementById("empty-trash-button");
      var originalHtml = button.innerHTML;
      button.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      button.disabled = true;
      button.title = "Emptying...";

      fetch("/emptytrash")
        .then(response => response.json())
        .then(data => {
          console.log("Response:", data);
          button.title = "Emptied.";
          setTimeout(function () {
            button.innerHTML = originalHtml;
            updateFolderCounts(lastFolderCounts);
            button.title = "Empty Trash";
            button.disabled = false;
          }, 800);
        })
        .catch(function (error) {
          console.error("Error:", error);
          button.innerHTML = originalHtml;
          button.title = "Empty Trash";
          button.disabled = false;
        });
    }

    function unarchiveSamples() {
      var button = document.getElementById("unarchive-samples-button");
      var originalHtml = button.innerHTML;
      button.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      button.disabled = true;
      button.title = "Moving files...";

      fetch("/unarchive")
        .then(response => response.json())
        .then(data => {
          console.log("Response:", data);
          button.title = "Files moved.";
          setTimeout(function () {
            button.innerHTML = originalHtml;
            updateFolderCounts(lastFolderCounts);
            button.title = "Unarchive Samples";
            button.disabled = false;
          }, 800);
        })
        .catch(function (error) {
          console.error("Error:", error);
          button.innerHTML = originalHtml;
          button.title = "Unarchive Samples";
          button.disabled = false;
        });
    }

    function skipSample(path) {
      fetch("/skip", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      }).then(response => response.json())
        .then(data => console.log(data))
        .catch(error => console.error("Error:", error));
    }

    function deleteSample(path) {
      fetch("/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      }).then(response => response.json())
        .then(data => console.log(data))
        .catch(error => console.error("Error:", error));
    }

    function duplicateSample(path) {
      fetch("/duplicate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      }).then(response => response.json())
        .then(data => {
          console.log(data);
          if (data.error) return;
          socket.emit("requestExports");
        })
        .catch(error => console.error("Error:", error));
    }

    function formatTimestamp(seconds) {
      const roundedSeconds = Math.round(seconds); // Round to the nearest second
      const hours = Math.floor(roundedSeconds / 3600);
      const minutes = Math.floor((roundedSeconds % 3600) / 60);
      const remainingSeconds = roundedSeconds % 60;
      return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
    }

    function auditionrBasename(absPath) {
      return absPath.split("/").pop();
    }

    /** GET /exports/... — encode #, ?, etc. so the path is not truncated as a URL fragment. */
    function auditionrExportsMediaUrl(absPath, cacheBust) {
      var u = "/exports/" + encodeURIComponent(auditionrBasename(absPath));
      return cacheBust ? u + "?v=" + Date.now() : u;
    }

    /** POST body path token; keeps literal characters (e.g. #) for server basename resolution. */
    function auditionrExportsApiPath(absPath) {
      return "/exports/" + auditionrBasename(absPath);
    }

    function revealSample(path) {
      fetch("/reveal", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      }).then(response => response.json())
        .then(data => { if (data.error) alert(data.error); });
    }

    function saveSample(path) {
      fetch("/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path })
      }).then(response => response.json())
        .then(data => console.log(data))
        .catch(error => console.error("Error:", error));
    }

    function resolveDisplayedFileFromProcessPath(pathToken) {
      if (!pathToken || typeof pathToken !== "string") return null;
      pathToken = pathToken.trim();
      if (!pathToken) return null;
      if (waveformInstances[pathToken]) return pathToken;
      var slug = pathToken.indexOf("/exports/") === 0
        ? pathToken.slice("/exports/".length)
        : auditionrBasename(pathToken);
      try {
        slug = decodeURIComponent(slug);
      } catch (e) {}
      var i;
      for (i = 0; i < currentDisplayedFiles.length; i++) {
        var abs = currentDisplayedFiles[i];
        if (auditionrBasename(abs) === slug || auditionrExportsApiPath(abs) === pathToken) return abs;
      }
      return null;
    }

    function endWaveformProcessing(absPath, opts) {
      opts = opts || {};
      var inst = waveformInstances[absPath];
      if (!inst) return;
      inst.pendingProcessingReveal = false;
      if (inst.processingSafetyTimer) {
        clearTimeout(inst.processingSafetyTimer);
        inst.processingSafetyTimer = null;
      }
      if (inst.wrapper) inst.wrapper.classList.remove("waveform-processing");
      if (!opts.skipDurationRepair && inst.wavesurfer && inst.durationEl) {
        var d = inst.wavesurfer.getDuration();
        if (typeof d === "number" && !isNaN(d) && d > 0) {
          inst.durationEl.textContent = formatTimestamp(d);
        }
      }
    }

    function beginWaveformProcessing(absPath) {
      var inst = waveformInstances[absPath];
      if (!inst || !inst.wrapper || !inst.durationEl) return;
      if (typeof inst.stopPlayback === "function") {
        try { inst.stopPlayback(); } catch (err) {}
      }
      inst.pendingProcessingReveal = true;
      inst.wrapper.classList.add("waveform-processing");
      inst.durationEl.textContent = "processing...";
      if (inst.processingSafetyTimer) clearTimeout(inst.processingSafetyTimer);
      inst.processingSafetyTimer = setTimeout(function () {
        if (!waveformInstances[absPath] || !waveformInstances[absPath].pendingProcessingReveal) return;
        endWaveformProcessing(absPath);
      }, processingGuardMs);
    }

    function processSample(params) {
      if (!params.command && !params.processing_spec) {
        console.warn("processSample: command or processing_spec is required");
        return;
      }
      var fileAbs = resolveDisplayedFileFromProcessPath(params.path);
      if (fileAbs) beginWaveformProcessing(fileAbs);
      fetch("/process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(params)
      })
        .then(function (response) {
          return response.json().then(function (data) {
            return { ok: response.ok, data: data };
          });
        })
        .then(function (pack) {
          if (!pack.ok || (pack.data && pack.data.error)) {
            if (fileAbs) endWaveformProcessing(fileAbs);
          }
          console.log(pack.data);
        })
        .catch(function (error) {
          if (fileAbs) endWaveformProcessing(fileAbs);
          console.error("Error:", error);
        });
    }

    function fetchUndoStatus(path) {
      return fetch("/undo-status", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path: path })
      })
        .then(response => response.json())
        .then(data => !!data.can_undo)
        .catch(() => false);
    }

      if (data.files) {
        applyExportsUpdate(data.files, data.updated_path || null, data.undo_available || null);

      if (unarchiveCountEl) unarchiveCountEl.textContent = String(counts.archive || 0);
      if (trashCountEl) trashCountEl.textContent = String(counts.trash || 0);

      return currentDisplayedFiles.slice();

    function removeWaveform(file) {
      var inst = waveformInstances[file];
      if (!inst) return;
      if (inst.processingSafetyTimer) {
        clearTimeout(inst.processingSafetyTimer);
        inst.processingSafetyTimer = null;
      }
      if (inst.stopPlayback) inst.stopPlayback();
      if (inst.wavesurfer) {
        try { inst.wavesurfer.destroy(); } catch (e) { }
      }
      if (inst.wrapper && inst.wrapper.parentNode) {
        inst.wrapper.parentNode.removeChild(inst.wrapper);
      }
      delete waveformInstances[file];
      delete selectedWaveformTimestamps[file];
      delete waveformDurations[file];
      if (selectedEditAbsPath === file) {
        selectedEditAbsPath = null;
        selectedEditApiPath = null;
      }
      syncWaveformTitleSelection();

      var inst = waveformInstances[file];
      if (!inst || !inst.wavesurfer) return;

      inst.durationEl.textContent = inst.pendingProcessingReveal ? "processing..." : "loading...";
      inst.wavesurfer.load(url);

    function applyExportsUpdate(newFiles, updatedPath, undoAvailability) {
      if (currentDrumpatternStop) {
        currentDrumpatternStop();
        currentDrumpatternStop = null;
      }
      var removed = currentDisplayedFiles.filter(function (f) { return newFiles.indexOf(f) === -1; });
      removed.forEach(removeWaveform);

      currentDisplayedFiles = newFiles;
      var container = document.getElementById("waveform-container");
      var emptyPlaceholder = document.getElementById("queue-empty-placeholder");

      newFiles.forEach(function (file) {
        if (!selectedWaveformTimestamps.hasOwnProperty(file)) selectedWaveformTimestamps[file] = 0;
      });

      var orderedWrappers = [];
      var pendingReady = 0;
      newFiles.forEach(function (file) {
        var inst = waveformInstances[file];
        if (inst && inst.wrapper) {
          orderedWrappers.push(inst.wrapper);
        } else {
          pendingReady++;
        }
      });
      function onWaveformReady() {
        pendingReady--;
        if (pendingReady === 0 && window.__pageReady) window.__pageReady();
      }
      newFiles.forEach(function (file) {
        var inst = waveformInstances[file];
        if (inst && inst.wrapper) {
          /* already pushed */
          if (undoAvailability && Object.prototype.hasOwnProperty.call(undoAvailability, file)) {
            setUndoButtonState(file, !!undoAvailability[file]);
          }
        } else {
          var created = createSingleWaveform(file, onWaveformReady);
          if (created) {
            waveformInstances[file] = created;
            orderedWrappers.push(created.wrapper);
            if (undoAvailability && Object.prototype.hasOwnProperty.call(undoAvailability, file)) {
              setUndoButtonState(file, !!undoAvailability[file]);
            }
          } else {
            onWaveformReady();
          }
        }
      });

      syncWaveformTitleSelection();

      container.innerHTML = "";
      orderedWrappers.forEach(function (w) { container.appendChild(w); });

      if (emptyPlaceholder) {
        if (!newFiles.length) {
          emptyPlaceholder.classList.remove("hidden");
        } else {
          emptyPlaceholder.classList.add("hidden");
        }
      }

      if (pendingReady === 0 && window.__pageReady) window.__pageReady();
      if (updatedPath && newFiles.indexOf(updatedPath) !== -1) {
        refreshWaveform(updatedPath);
      }
    }

      try {
        var v = getComputedStyle(document.documentElement).getPropertyValue(name);
        if (v && String(v).trim()) return String(v).trim();
      } catch (e) { /* ignore */ }
      return fallback;
    }

        var dur = wavesurfer.getDuration();

        if (pinnedReady && pinnedReady.pendingProcessingReveal) {

        if (isDrumpattern) {
          fetch(mediaUrl)
            .then(function (r) { return r.arrayBuffer(); })
            .then(function (ab) {

          playButton.innerHTML = "<i class=\"fa-solid fa-pause center-offset\"></i>";

          playButton.innerHTML = "<i class=\"fa-solid fa-play center-offset\"></i>";
          playButton.title = "Play";
        }

      function stopPlayback() {
        if (isDrumpattern) {
          try { if (drumpatternSourceNode) drumpatternSourceNode.stop(); } catch (err) { }
          drumpatternSourceNode = null;
          drumpatternPlaying = false;
          if (drumpatternRafId != null) cancelAnimationFrame(drumpatternRafId);
          drumpatternRafId = null;
          if (currentDrumpatternStop === stopPlayback) currentDrumpatternStop = null;
          wavesurfer.seekTo(0);
          updatePlayButton(false);
          return;
        }
        var mediaEl = wavesurfer.getMediaElement && wavesurfer.getMediaElement();
        if (mediaEl) mediaEl.loop = false;
        try { wavesurfer.pause(); } catch (e) { }
        if (wavesurfer.getDuration() > 0) wavesurfer.seekTo(0);
        updatePlayButton(false);
      }

      function updateDrumpatternPlayhead() {
        if (!drumpatternPlaying || !drumpatternBuffer) return;
        var ctx = getAudioContext();
        var d = drumpatternBuffer.duration;
        var elapsed = ctx.currentTime - drumpatternStartTime;
        var t = d > 0 ? (elapsed % d) / d : 0;
        wavesurfer.seekTo(Math.min(1, Math.max(0, t)));
        drumpatternRafId = requestAnimationFrame(updateDrumpatternPlayhead);
      }

      wavesurfer.on("play", function () {
        selectSampleForEdit(file, apiPath, {});
        updatePlayButton(true);
      });

      wavesurfer.on("pause", function () {
        selectSampleForEdit(file, apiPath, {});
        if (!isDrumpattern && !wavesurfer.isPlaying()) updatePlayButton(false);
      });

        selectSampleForEdit(file, apiPath, {});

          if (drumpatternPlaying) {
            stopPlayback();
            return;
          }
          if (currentDrumpatternStop && currentDrumpatternStop !== stopPlayback) currentDrumpatternStop();
          var ctx = getAudioContext();
          if (ctx.state === "suspended") ctx.resume();
          var src = ctx.createBufferSource();
          src.buffer = drumpatternBuffer;
          src.loop = true;
          src.connect(ctx.destination);
          src.start(0);
          drumpatternSourceNode = src;
          drumpatternStartTime = ctx.currentTime;
          drumpatternPlaying = true;
          currentDrumpatternStop = stopPlayback;
          updatePlayButton(true);
          drumpatternRafId = requestAnimationFrame(updateDrumpatternPlayhead);
          return;
        }

        if (wavesurfer.isPlaying()) {
          stopPlayback();
        } else {
          var mediaEl = wavesurfer.getMediaElement && wavesurfer.getMediaElement();
          if (mediaEl) mediaEl.loop = true;
          wavesurfer.play();
        }
      });

      var droneChartTypeSelect = document.getElementById("generatr-drone-chart-type");
      var droneTagsInput = document.getElementById("generatr-drone-tags");
      var droneRootsInput = document.getElementById("generatr-drone-roots");
      var dronePatternSelect = document.getElementById("generatr-drone-pattern");
      var droneInstrumentSelect = document.getElementById("generatr-drone-instrument");
      var droneEffectSelect = document.getElementById("generatr-drone-effect");
      var droneIterationsInput = document.getElementById("generatr-drone-iterations");
      var droneSplitCheckbox = document.getElementById("generatr-drone-split");
      var form = document.getElementById("generatr-form");
      var btnGenerate = document.getElementById("generatr-btn");
      var loadingEl = document.getElementById("generatr-loading");
      var resultEl = document.getElementById("generatr-result");
      var pathsList = document.getElementById("generated-paths");
      var errorEl = document.getElementById("generatr-error");
      var sidebar = document.getElementById("auditionr-sidebar");
      var sidebarToggle = document.getElementById("sidebar-toggle");
      var sidebarToggleIcon = document.getElementById("sidebar-toggle-icon");
      var generatrSidebarOptionsLoaded = false;

      function setSelectOptions(selectEl, values, includeRandom) {
        var current = selectEl.value;
        selectEl.innerHTML = "";
        if (includeRandom) {
          var randomOpt = document.createElement("option");
          randomOpt.value = "";
          randomOpt.textContent = "(random)";
          selectEl.appendChild(randomOpt);
        }
        (values || []).forEach(function (val) {
          var opt = document.createElement("option");
          opt.value = val;
          opt.textContent = val;
          selectEl.appendChild(opt);
        });
        if (current && Array.from(selectEl.options).some(function (opt) { return opt.value === current; })) {
          selectEl.value = current;
        }
      }

      function renderBeatPostProcessing(actionsPayload) {
        beatPostProcessingList.innerHTML = "";
        var actions = (actionsPayload && actionsPayload.actions) || [];
        beatPostProcessingList.style.display = "grid";
        beatPostProcessingList.style.gridTemplateColumns = "1fr";
        beatPostProcessingList.style.gap = "4px";
        beatPostProcessingList.style.maxHeight = "260px";
        beatPostProcessingList.style.overflowY = "auto";
        beatPostProcessingList.style.padding = "8px";
        beatPostProcessingList.style.border = "1px solid rgba(255,255,255,0.12)";
        beatPostProcessingList.style.borderRadius = "6px";
        actions.forEach(function (action, idx) {
          var label = document.createElement("label");
          label.style.display = "flex";
          label.style.alignItems = "center";
          label.style.gap = "8px";
          var input = document.createElement("input");
          input.type = "checkbox";
          input.value = action.spec || action.token;
          input.id = "generatr-beat-post-" + idx;
          var text = document.createElement("span");
          text.textContent = action.label || action.token;
          if (action.spec) text.title = action.spec;
          label.appendChild(input);
          label.appendChild(text);
          beatPostProcessingList.appendChild(label);
        });
      }

      function loadGeneratrSidebarOptions() {
        if (generatrSidebarOptionsLoaded) return Promise.resolve();
        return Promise.all([
          fetch("/api/generatr/options").then(function (res) { return res.json(); }),
          fetch("/api/drum-path-presets").then(function (res) { return res.json(); })
        ])
          .then(function (parts) {
            var data = parts[0] || {};
            var presetData = parts[1] || {};
            var presetNames = Object.keys((presetData && presetData.presets) || {});
            setSelectOptions(beatRandomizationConfigSelect, presetNames, false);
            var activeOpt = document.createElement("option");
            activeOpt.value = "";
            activeOpt.textContent = "(active preset)";
            beatRandomizationConfigSelect.insertBefore(activeOpt, beatRandomizationConfigSelect.firstChild);
            if (presetData.activePreset) {
              beatRandomizationConfigSelect.value = presetData.activePreset;
            }
            setSelectOptions(dronePatternSelect, data.droneMidiPatterns || [], true);
            setSelectOptions(droneInstrumentSelect, data.droneInstruments || [], true);
            setSelectOptions(droneEffectSelect, data.droneEffects || [], true);
            renderBeatPostProcessing(data.processingActions || { actions: [] });
            mergeProcessingCatalog(data.processingActions || {});
            generatrSidebarOptionsLoaded = true;
          })
          .catch(function (err) {
            console.error("Failed to load generate options:", err);
          });
      }

      function updateGeneratrSubcommandVisibility() {
        var type = typeSelect.value;
        subcommandRow.classList.toggle("hidden", type !== "bass");
        transitionSubcommandRow.classList.toggle("hidden", type !== "transition");
        beatRows.forEach(function (row) {
          row.classList.toggle("hidden", type !== "beat");
        });
        droneRows.forEach(function (row) {
          row.classList.toggle("hidden", type !== "drone");
        });
        if (generatrPostProcessingRow) {
          generatrPostProcessingRow.classList.toggle(
            "hidden",
            type !== "beat" && type !== "drone"
          );
        }
        if (type === "beat" || type === "drone") {
          loadGeneratrSidebarOptions();
        }
      }
      typeSelect.addEventListener("change", updateGeneratrSubcommandVisibility);
      updateGeneratrSubcommandVisibility();

      if (sidebarToggle && sidebar) {
        // Ensure initial icon/title match initial collapsed state
        (function syncSidebarToggleState() {
          var collapsed = sidebar.classList.contains("collapsed");
          sidebarToggleIcon.className = collapsed ? "fa-solid fa-chevron-left" : "fa-solid fa-chevron-right";
          sidebarToggle.title = collapsed ? "Show sidebar" : "Hide sidebar";
        })();

        sidebarToggle.addEventListener("click", function () {
          sidebar.classList.toggle("collapsed");
          var collapsed = sidebar.classList.contains("collapsed");
          sidebarToggleIcon.className = collapsed ? "fa-solid fa-chevron-left" : "fa-solid fa-chevron-right";
          sidebarToggle.title = collapsed ? "Show sidebar" : "Hide sidebar";
        });
      }

      var tabGen = document.getElementById("sidebar-tab-btn-generate");
      var tabEdit = document.getElementById("sidebar-tab-btn-edit");
      if (tabGen) {
        tabGen.addEventListener("click", function () { openAuditionrSidebarTab("generate"); });
      }
      if (tabEdit) {
        tabEdit.addEventListener("click", function () { openAuditionrSidebarTab("edit"); });
      }
      try {
        if (sessionStorage.getItem(AUDITIONR_SIDEBAR_TAB_KEY) === "edit") {
          openAuditionrSidebarTab("edit");
        }
      } catch (errTab) { /* ignore */ }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var type = typeSelect.value;
        var subcommand = "";
        var body = { type: type };
        if (type === "bass") subcommand = document.getElementById("generatr-subcommand").value;
        else if (type === "transition") subcommand = document.getElementById("generatr-transition-subcommand").value;
        if (subcommand) body.subcommand = subcommand;
        if (type === "beat") {
          var checkedPost = Array.from(
            beatPostProcessingList.querySelectorAll("input[type='checkbox']:checked")
          ).map(function (el) { return el.value; });
          var tempoRaw = (beatTempoInput.value || "").trim();
          body.tempo = tempoRaw ? parseInt(tempoRaw, 10) : null;
          body.loops = parseInt(beatLoopsInput.value || "2", 10);
          body.pattern = (beatPatternInput.value || "").trim();
          body.kit = (beatKitInput.value || "").trim();
          body.sampleLibrary = beatRandomizationConfigSelect.value || "";
          body.swing = parseFloat(beatSwingInput.value || "0");
          body.iterations = parseInt(beatIterationsInput.value || "1", 10);
          body.variants = Array.from(
            beatVariantsList.querySelectorAll("input[type='checkbox']:checked")
          ).map(function (el) { return el.value; });
          body.postProcessing = checkedPost;
        } else if (type === "drone") {
          var dronePost = Array.from(
            beatPostProcessingList.querySelectorAll("input[type='checkbox']:checked")
          ).map(function (el) { return el.value; });
          body.name = (droneNameInput.value || "").trim();
          body.notes = (droneNotesInput.value || "").trim();
          body.chartName = (droneChartNameInput.value || "").trim();
          body.chartType = (droneChartTypeSelect.value || "").trim();
          body.tags = (droneTagsInput.value || "").trim();
          body.roots = (droneRootsInput.value || "").trim();
          body.pattern = (dronePatternSelect.value || "").trim();
          body.instrument = (droneInstrumentSelect.value || "").trim();
          body.effect = (droneEffectSelect.value || "").trim();
          body.iterations = Math.max(1, parseInt(droneIterationsInput.value || "1", 10) || 1);
          body.splitProcessing = !!droneSplitCheckbox.checked;
          body.postProcessing = dronePost;
        }

        btnGenerate.disabled = true;
        loadingEl.classList.remove("hidden");
        resultEl.classList.add("hidden");
        pathsList.innerHTML = "";
        errorEl.classList.add("hidden");
        errorEl.textContent = "";

        fetch("/api/generatr/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            resultEl.classList.remove("hidden");
            if (data.error) {
              errorEl.textContent = data.error;
              errorEl.classList.remove("hidden");
            } else {
              if (data.paths && data.paths.length) {
                data.paths.forEach(function (path) {
                  var li = document.createElement("li");
                  li.textContent = path;
                  pathsList.appendChild(li);
                });
              } else {
                pathsList.appendChild(document.createTextNode("(no files returned)"));
              }
              socket.emit("requestExports");
            }
          })
          .catch(function (err) {
            resultEl.classList.remove("hidden");
            errorEl.textContent = err.message || "Request failed";
            errorEl.classList.remove("hidden");
          })
          .finally(function () {
            btnGenerate.disabled = false;
            loadingEl.classList.add("hidden");
          });
      });
    })();
  </script>
</body>

</html>
