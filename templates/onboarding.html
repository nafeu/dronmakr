<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ pagename }} | dronmakr v{{ version }}</title>
  {% include '_app_favicons.html' %}
  <style>
    body { background: #111; color: #ff9505; font-family: monospace; margin: 0; padding: 2rem; }
    main { max-width: 50rem; margin: 0 auto; border: 1px solid #353531; border-radius: 6px; padding: 1rem; }
    h1 { margin-top: 0; font-size: 1rem; }
    p { color: #b6a58a; }
    .row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    input { flex: 1; padding: 0.6rem; background: #050505; border: 1px solid #353531; color: #ff9505; }
    button { padding: 0.6rem 0.8rem; background: #ff9505; color: #111; border: 1px solid #ff9505; cursor: pointer; }
    #message { margin-top: 0.8rem; min-height: 1.2rem; color: #ec4e20; }
  </style>
</head>
<body>
  <main>
    <h1>Set up your dronmakr files directory</h1>
    <p>Choose where dronmakr should create and manage `dronmakr-files` data directories.</p>
    <div class="row">
      <input id="filesRoot" value="{{ files_root }}" placeholder="/path/to/dronmakr-files">
      <button id="pickBtn" type="button">Pick</button>
      <button id="saveBtn" type="button">Save</button>
    </div>
    <div id="message"></div>
  </main>
  <script>
    const filesRoot = document.getElementById("filesRoot");
    const message = document.getElementById("message");
    document.getElementById("pickBtn").addEventListener("click", async () => {
      message.textContent = "";
      const res = await fetch("/api/settings/pick-folder", { method: "POST" });
      const data = await res.json();
      if (data.path) {
        filesRoot.value = data.path;
      } else if (data.cancelled) {
        message.textContent = "Folder selection cancelled.";
      } else if (data.error) {
        message.textContent = data.error;
      }
    });
    document.getElementById("saveBtn").addEventListener("click", async () => {
      message.textContent = "";
      const res = await fetch("/api/settings/files-root", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path: filesRoot.value }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        message.textContent = data.error || "Failed to save path";
        return;
      }
      window.location.href = "/";
    });
  </script>
</body>
</html>
